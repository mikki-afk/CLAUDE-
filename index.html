<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>占卜系统</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, "PingFang SC", "Hiragino Sans GB", sans-serif;
  background: #0a0a1e;
  color: #e0e0f0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
}
body::before {
  content: "";
  position: fixed; inset: 0;
  background: url('bg.jpeg') center center / cover no-repeat;
  opacity: 0.15; z-index: -1;
}
.home-container { max-width: 600px; width: 100%; padding: 20px; text-align: center; }
h1 { color: #d4a843; font-size: 32px; letter-spacing: 6px; margin-bottom: 8px; text-shadow: 0 0 20px rgba(212,168,67,0.4); }
.subtitle { color: #8898b0; font-size: 14px; letter-spacing: 2px; margin-bottom: 40px; }
.icon { font-size: 80px; margin: 30px 0; animation: float 3s ease-in-out infinite; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }

.options { display: flex; flex-direction: column; gap: 14px; }
.option {
  display: block; text-decoration: none;
  background: linear-gradient(135deg, rgba(40,30,70,0.8), rgba(20,15,45,0.9));
  border: 1px solid rgba(212,168,67,0.3);
  border-radius: 16px;
  padding: 24px 20px;
  transition: all 0.3s;
  position: relative; overflow: hidden;
}
.option:active { transform: scale(0.98); border-color: #d4a843; box-shadow: 0 0 20px rgba(212,168,67,0.2); }
.option .title { color: #d4a843; font-size: 20px; font-weight: bold; letter-spacing: 2px; }
.option .desc { color: #8898b0; font-size: 13px; margin-top: 6px; line-height: 1.6; }
.option .emoji { font-size: 36px; margin-bottom: 8px; }

.dual-frame {
  display: none;
  width: 100vw; height: 100vh;
  position: fixed; inset: 0; z-index: 100;
  background: #0a0a1e;
}
.dual-frame.active { display: flex; }
.dual-frame iframe {
  flex: 1; border: none; height: 100%;
}
.dual-frame .divider {
  width: 2px; background: linear-gradient(to bottom, transparent, #d4a843, transparent);
}
.dual-back {
  position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
  z-index: 200; background: rgba(10,10,30,0.9); color: #d4a843;
  border: 1px solid #d4a843; border-radius: 20px;
  padding: 8px 20px; font-size: 13px; cursor: pointer;
  display: none;
}
.dual-back.active { display: block; }

/* Mobile: stack vertically */
@media (max-width: 768px) {
  .dual-frame { flex-direction: column; }
  .dual-frame .divider { width: 100%; height: 2px; }
}
</style>
</head>
<body>

<div class="home-container" id="homeView">
  <div class="icon">✨</div>
  <h1>占卜系统</h1>
  <div class="subtitle">塔罗 · 雷诺曼 · 双系统解读</div>

  <div class="options">
    <a href="tarot.html" class="option">
      <div class="emoji">🔮</div>
      <div class="title">塔罗占卜</div>
      <div class="desc">韦特塔罗体系 · 78张牌 · 正逆位解读<br>告诉你「为什么」— 深入内心与灵魂课题</div>
    </a>

    <a href="lenormand.html" class="option">
      <div class="emoji">🃏</div>
      <div class="title">雷诺曼占卜</div>
      <div class="desc">36张牌 · 组合解读 · 无正逆位<br>告诉你「会发生什么」— 具体实际的预测</div>
    </a>

    <a href="#" onclick="openDual();return false" class="option">
      <div class="emoji">⚡</div>
      <div class="title">双系统并排</div>
      <div class="desc">同一个问题，塔罗 + 雷诺曼同时解读<br>从「为什么」到「会发生什么」全面分析</div>
    </a>
  </div>
</div>

<div class="dual-frame" id="dualFrame">
  <iframe src="tarot.html" id="tarotFrame"></iframe>
  <div class="divider"></div>
  <iframe src="lenormand.html" id="lenormandFrame"></iframe>
</div>
<button class="dual-back" id="dualBack" onclick="closeDual()">✕ 返回首页</button>

<script>
function openDual() {
  document.getElementById("homeView").style.display = "none";
  document.getElementById("dualFrame").classList.add("active");
  document.getElementById("dualBack").classList.add("active");
}
function closeDual() {
  document.getElementById("homeView").style.display = "block";
  document.getElementById("dualFrame").classList.remove("active");
  document.getElementById("dualBack").classList.remove("active");
}
</script>
</body>
</html>
