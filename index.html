<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>塔罗牌占卜系统</title>
<style>
:root {
  --bg: #0f0a1e;
  --bg2: #1a1333;
  --gold: #d4a843;
  --gold2: #f0d060;
  --purple: #6b3fa0;
  --text: #e8e0f0;
  --text2: #a89cc0;
  --card-bg: #231a3a;
  --card-border: #3d2a6e;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}
body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: -1;
  background: url('bg.jpeg') center center / cover no-repeat fixed;
  opacity: 0.25;
}
body::after {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: -1;
  background:
    linear-gradient(to bottom, rgba(15,10,30,0.3) 0%, transparent 30%, transparent 70%, rgba(15,10,30,0.5) 100%);
}
.container { max-width: 600px; margin: 0 auto; padding: 16px; }
h1, h2, h3 { color: var(--gold); }
button {
  background: linear-gradient(135deg, var(--purple), #4a2080);
  color: var(--gold2);
  border: 1px solid rgba(212,168,67,0.5);
  border-radius: 12px;
  padding: 14px 28px;
  font-size: 17px;
  cursor: pointer;
  width: 100%;
  margin: 6px 0;
  transition: all 0.3s;
  -webkit-tap-highlight-color: transparent;
  box-shadow: 0 2px 10px rgba(107,63,160,0.3);
  letter-spacing: 1px;
  position: relative;
  overflow: hidden;
}
button::after {
  content: "";
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: linear-gradient(transparent, rgba(255,255,255,0.03), transparent);
  transform: rotate(45deg);
  transition: 0.5s;
}
button:active {
  transform: scale(0.97);
  background: linear-gradient(135deg, #4a2080, var(--purple));
  box-shadow: 0 0 20px rgba(212,168,67,0.2);
}
.btn-sm { padding: 10px 18px; font-size: 15px; width: auto; display: inline-block; margin: 4px; }
.btn-back { background: transparent; border: 1px solid var(--text2); color: var(--text2); }
.screen { display: none; animation: fadeIn 0.4s; }
.screen.active { display: block; }
@keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

/* Banner */
.banner {
  text-align: center;
  padding: 40px 0 20px;
}
.banner h1 {
  font-size: 30px;
  margin-bottom: 8px;
  text-shadow: 0 0 20px rgba(212,168,67,0.4);
  letter-spacing: 4px;
}
.banner .subtitle { color: var(--text2); font-size: 14px; letter-spacing: 2px; }
.banner .crystal {
  font-size: 72px;
  margin: 20px 0;
  animation: crystalFloat 3s ease-in-out infinite;
  filter: drop-shadow(0 0 20px rgba(212,168,67,0.3));
}
@keyframes crystalFloat {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

/* Cards grid */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 12px;
  margin: 16px 0;
}
.card-item {
  background: linear-gradient(145deg, var(--card-bg), #1a1230);
  border: 1px solid var(--card-border);
  border-radius: 12px;
  padding: 14px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
}
.card-item::before {
  content: "";
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: conic-gradient(from 0deg, transparent, rgba(212,168,67,0.05), transparent, rgba(107,63,160,0.05), transparent);
  animation: cardShimmer 6s linear infinite;
}
@keyframes cardShimmer { 100% { transform: rotate(360deg); } }
.card-item:active { border-color: var(--gold); box-shadow: 0 0 15px rgba(212,168,67,0.3); }
.card-item .emoji { font-size: 36px; position: relative; z-index: 1; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }
.card-item .name { font-size: 13px; margin-top: 6px; color: var(--gold); position: relative; z-index: 1; }

/* Reading card display */
.reading-cards {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 12px;
  margin: 20px 0;
}
.tarot-card {
  width: 110px;
  height: 170px;
  perspective: 800px;
  cursor: pointer;
}
.tarot-card-inner {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.6s;
}
.tarot-card.flipped .tarot-card-inner { transform: rotateY(180deg); }
.tarot-card.reversed.flipped .tarot-card-inner { transform: rotateY(180deg) rotate(180deg); }
.tarot-card-front, .tarot-card-back {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  border-radius: 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.tarot-card-back {
  background: url('card-back.jpeg') center center / cover no-repeat;
  border: 2px solid var(--gold);
  box-shadow: inset 0 0 20px rgba(0,0,0,0.3), 0 4px 15px rgba(0,0,0,0.4), 0 0 10px rgba(212,168,67,0.15);
}
.tarot-card-back::before {
  content: "";
  position: absolute;
  inset: 4px;
  border: 1px solid rgba(212,168,67,0.4);
  border-radius: 6px;
}
.tarot-card-back::after {
  content: "";
}
.tarot-card-front {
  background: linear-gradient(170deg, #2a1e45 0%, #1a1230 50%, #231a3a 100%);
  border: 2px solid var(--card-border);
  transform: rotateY(180deg);
  padding: 8px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.4);
}
.tarot-card.flipped .tarot-card-front {
  border-color: var(--gold);
  box-shadow: 0 0 20px rgba(212,168,67,0.25), 0 4px 15px rgba(0,0,0,0.4);
}
.tarot-card-front .emoji { font-size: 40px; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.4)); }
.tarot-card-front .name { font-size: 11px; color: var(--gold); margin-top: 4px; text-align: center; text-shadow: 0 0 8px rgba(212,168,67,0.3); }
.tarot-card-front .orient { font-size: 12px; color: var(--text2); margin-top: 2px; }
/* Suit-colored glow on flip */
.tarot-card.flipped[data-suit="权杖"] .tarot-card-front { box-shadow: 0 0 20px rgba(255,100,30,0.3), 0 4px 15px rgba(0,0,0,0.4); border-color: #e07030; }
.tarot-card.flipped[data-suit="圣杯"] .tarot-card-front { box-shadow: 0 0 20px rgba(60,130,255,0.3), 0 4px 15px rgba(0,0,0,0.4); border-color: #4090e0; }
.tarot-card.flipped[data-suit="宝剑"] .tarot-card-front { box-shadow: 0 0 20px rgba(180,200,255,0.3), 0 4px 15px rgba(0,0,0,0.4); border-color: #90a8d0; }
.tarot-card.flipped[data-suit="星币"] .tarot-card-front { box-shadow: 0 0 20px rgba(80,200,80,0.3), 0 4px 15px rgba(0,0,0,0.4); border-color: #50b050; }
.tarot-card.flipped[data-suit="大阿卡纳"] .tarot-card-front { box-shadow: 0 0 25px rgba(212,168,67,0.4), 0 4px 15px rgba(0,0,0,0.4); border-color: var(--gold); }

/* Result */
.result-card {
  background: linear-gradient(145deg, var(--card-bg), #1a1230);
  border: 1px solid var(--card-border);
  border-radius: 14px;
  padding: 18px;
  margin: 14px 0;
  position: relative;
  overflow: hidden;
  animation: resultSlideIn 0.5s ease-out;
}
@keyframes resultSlideIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
.result-card::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}
.result-card h3 { font-size: 16px; margin-bottom: 10px; text-shadow: 0 0 10px rgba(212,168,67,0.2); }
.result-card .position-label {
  color: var(--gold);
  font-size: 12px;
  margin-bottom: 4px;
  letter-spacing: 2px;
  text-transform: uppercase;
}
.result-card .keywords {
  color: var(--gold2);
  font-size: 14px;
  margin: 8px 0;
  padding: 8px 12px;
  background: rgba(212,168,67,0.06);
  border-radius: 8px;
  border-left: 3px solid var(--gold);
}
.result-card .detail { color: var(--text); font-size: 14px; line-height: 1.8; }
.advice-box {
  background: linear-gradient(135deg, #1a1040, #2a1555, #1a1040);
  border: 1px solid var(--gold);
  border-radius: 14px;
  padding: 22px;
  margin: 16px 0;
  text-align: center;
  position: relative;
  overflow: hidden;
  box-shadow: 0 0 30px rgba(212,168,67,0.1);
}
.advice-box::before {
  content: "";
  position: absolute;
  inset: 4px;
  border: 1px solid rgba(212,168,67,0.15);
  border-radius: 10px;
  pointer-events: none;
}
.advice-box p { color: var(--text2); font-size: 14px; line-height: 1.8; }

/* Filter tabs */
.tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin: 12px 0;
}
.tab {
  padding: 8px 14px;
  border-radius: 20px;
  border: 1px solid var(--card-border);
  background: var(--card-bg);
  color: var(--text2);
  font-size: 13px;
  cursor: pointer;
}
.tab.active { border-color: var(--gold); color: var(--gold); background: #2a1a4a; }

/* Shuffle animation */
.shuffle-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(15,10,30,0.95);
  z-index: 100;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.shuffle-overlay.active { display: flex; }
.shuffle-text {
  color: var(--gold);
  font-size: 22px;
  margin-top: 24px;
  letter-spacing: 4px;
  text-shadow: 0 0 15px rgba(212,168,67,0.4);
  animation: textGlow 1.5s ease-in-out infinite;
}
@keyframes textGlow {
  0%,100% { opacity: 0.8; }
  50% { opacity: 1; text-shadow: 0 0 25px rgba(212,168,67,0.6); }
}
.shuffle-cards {
  position: relative;
  width: 120px;
  height: 170px;
}
.shuffle-cards .s-card {
  position: absolute;
  width: 80px;
  height: 120px;
  background: url('card-back.jpeg') center center / cover no-repeat;
  border: 2px solid var(--gold);
  border-radius: 8px;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  animation: shuffleAnim 0.5s infinite alternate;
  box-shadow: 0 4px 15px rgba(0,0,0,0.4), 0 0 10px rgba(212,168,67,0.1);
}
.shuffle-cards .s-card:nth-child(2) { animation-delay: 0.12s; }
.shuffle-cards .s-card:nth-child(3) { animation-delay: 0.24s; }
@keyframes shuffleAnim {
  0% { transform: translate(-50%, -50%) rotate(-8deg) translateX(-25px); }
  100% { transform: translate(-50%, -50%) rotate(8deg) translateX(25px); }
}

/* Meditation */
.meditation { text-align: center; padding: 30px 0; }
.meditation p {
  color: var(--text2);
  font-size: 18px;
  margin: 12px 0;
  line-height: 1.8;
  letter-spacing: 2px;
  animation: breathe 4s ease-in-out infinite;
}
@keyframes breathe {
  0%,100% { opacity: 0.7; }
  50% { opacity: 1; }
}

/* Tips */
.tip-box {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 12px;
  padding: 16px;
  margin: 10px 0;
  line-height: 1.7;
  font-size: 14px;
  color: var(--text);
}

/* Card detail modal */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(15,10,30,0.92);
  z-index: 200;
  overflow-y: auto;
  padding: 20px;
}
.modal-overlay.active { display: block; }
.modal-content {
  max-width: 500px;
  margin: 20px auto;
  background: linear-gradient(170deg, #1e1540, var(--bg2));
  border: 1px solid var(--gold);
  border-radius: 16px;
  padding: 24px;
  box-shadow: 0 0 40px rgba(212,168,67,0.1), 0 20px 40px rgba(0,0,0,0.5);
  position: relative;
  overflow: hidden;
}
.modal-content::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}
.modal-content .emoji { font-size: 56px; text-align: center; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4)); }
.modal-content h2 { text-align: center; font-size: 20px; margin: 8px 0 16px; text-shadow: 0 0 15px rgba(212,168,67,0.3); }
.modal-section { margin: 14px 0; padding: 10px 12px; background: rgba(255,255,255,0.02); border-radius: 8px; }
.modal-section h4 { color: var(--gold); font-size: 13px; margin-bottom: 6px; letter-spacing: 1px; }
.modal-section p { font-size: 14px; line-height: 1.7; color: var(--text2); }

input[type="text"] {
  width: 100%;
  padding: 12px 16px;
  border-radius: 10px;
  border: 1px solid var(--card-border);
  background: var(--card-bg);
  color: var(--text);
  font-size: 16px;
  margin: 8px 0;
}
input[type="text"]::placeholder { color: #665a80; }
</style>
</head>
<body>
<div class="container">

<!-- Home Screen -->
<div id="home" class="screen active">
  <div class="banner">
    <div class="crystal">🔮</div>
    <h1>塔罗牌占卜</h1>
    <div class="subtitle">基于韦特塔罗体系 · 78张完整牌组</div>
  </div>

  <button onclick="showScreen('browse')">📖 浏览塔罗牌</button>
  <button onclick="showTips()">✨ 塔罗小知识</button>
  <br>
  <a href="lenormand.html" style="display:block;text-align:center;color:var(--text2);margin-top:16px;font-size:14px">切换到雷诺曼占卜 →</a>
</div>

<!-- Spread Select -->
<div id="spread-select" class="screen">
  <h2>选择牌阵</h2>
  <button onclick="selectSpread('single')">🎴 单牌占卜<br><small style="color:var(--text2)">快速洞察，1张牌</small></button>
  <button onclick="selectSpread('three')">🕐 时间之流<br><small style="color:var(--text2)">过去·现在·未来，3张牌</small></button>
  <button onclick="selectSpread('relationship')">💕 关系十字<br><small style="color:var(--text2)">自己·对方·挑战·建议·结果，5张牌</small></button>
  <button onclick="selectSpread('celtic')">🌟 凯尔特十字<br><small style="color:var(--text2)">全面深度解读，10张牌</small></button>
  <br>
  <button class="btn-back" onclick="showScreen('home')">返回</button>
</div>

<!-- Question Input -->
<div id="question-input" class="screen">
  <h2>输入你的问题</h2>
  <p style="color:var(--text2);font-size:13px;margin:10px 0;line-height:1.6">
    提示：问题要单一、具体、短期（3-6个月）<br>
    避免问生老病死、具体时间和数字
  </p>
  <input type="text" id="questionField" placeholder="你想问什么？（可留空）">
  <h3 style="margin:16px 0 8px;font-size:16px">选择解读方向</h3>
  <div class="tabs" id="topicTabs">
    <div class="tab active" onclick="selectTopic('general',this)">🔮 综合</div>
    <div class="tab" onclick="selectTopic('love',this)">💕 感情</div>
    <div class="tab" onclick="selectTopic('work',this)">💼 事业</div>
  </div>
  <button onclick="startMeditation()">开始冥想</button>
  <button class="btn-back" onclick="showScreen('spread-select')">返回</button>
</div>

<!-- Meditation -->
<div id="meditation" class="screen">
  <div class="meditation">
    <div style="font-size:60px;margin-bottom:20px">🧘</div>
    <p id="meditationText"></p>
    <button id="meditationBtn" style="display:none" onclick="startShuffle()">我准备好了</button>
  </div>
</div>

<!-- Shuffle -->
<div class="shuffle-overlay" id="shuffleOverlay">
  <div class="shuffle-cards">
    <div class="s-card"></div>
    <div class="s-card"></div>
    <div class="s-card"></div>
  </div>
  <div class="shuffle-text">洗牌中...</div>
</div>

<!-- Reading -->
<div id="reading" class="screen">
  <h2 id="readingTitle"></h2>
  <p id="readingQuestion" style="color:var(--text2);font-size:13px;margin:4px 0 12px"></p>
  <p style="color:var(--text2);font-size:13px;text-align:center;margin-bottom:8px">点击卡牌翻开</p>
  <div class="reading-cards" id="readingCards"></div>
  <div id="readingResults"></div>
  <div id="readingAdvice"></div>
  <button onclick="showScreen('home')" style="margin-top:12px">返回首页</button>
  <button class="btn-back" onclick="showScreen('spread-select')">再占一次</button>
</div>

<!-- Browse -->
<div id="browse" class="screen">
  <h2>浏览塔罗牌</h2>
  <div class="tabs" id="browseTabs">
    <div class="tab active" onclick="filterCards('全部',this)">全部(78)</div>
    <div class="tab" onclick="filterCards('大阿卡纳',this)">大阿卡纳(22)</div>
    <div class="tab" onclick="filterCards('权杖',this)">🔥权杖(14)</div>
    <div class="tab" onclick="filterCards('圣杯',this)">🏆圣杯(14)</div>
    <div class="tab" onclick="filterCards('宝剑',this)">⚔️宝剑(14)</div>
    <div class="tab" onclick="filterCards('星币',this)">💰星币(14)</div>
  </div>
  <div class="cards-grid" id="cardsGrid"></div>
  <button class="btn-back" onclick="showScreen('home')">返回</button>
</div>

<!-- Tips -->
<div id="tips" class="screen">
  <h2>✨ 塔罗小知识</h2>
  <div id="tipsContent"></div>
  <button onclick="showTips()">换一批</button>
  <button class="btn-back" onclick="showScreen('home')">返回</button>
</div>

<!-- Card Detail Modal -->
<div class="modal-overlay" id="cardModal">
  <div class="modal-content" id="modalContent"></div>
  <button style="max-width:500px;margin:10px auto;display:block" onclick="closeModal()">关闭</button>
</div>

</div>

{n:0,name:"愚人 The Fool",suit:"大阿卡纳",el:"风",em:"🃏",astro:"天王星 ♅",u:"自由洒脱、天真勇敢、潜能无限、活在当下",r:"鲁莽冲动、不负责任、浮躁愚昧、风险失控",ul:"情侣重拾新鲜感，愿意为关系尝试新事物，用天真心态化解矛盾；单身勇敢开启新可能，不被过去束缚，主动结识他人；暧昧中纯粹心动，不掺杂功利考量，享受当下轻松甜蜜",rl:"冲动引发矛盾，缺乏思考的言行伤害对方；轻率择偶，因急于脱单轻信他人或忽视底线；空想不落地，只沉浸幻想不主动推进关系",uw:"主动突破舒适区，愿意尝试新任务学习新技能；怀揣热情启程，不因经验不足退缩；开放接受新机会，不局限于固定行业",rw:"鲁莽犯错，不提前规划凭冲动做事导致失误；盲目投入未做市场调研，忽视风险评估；轻率做选择，不了解岗位需求盲目入职"},
{n:1,name:"魔术师 The Magician",suit:"大阿卡纳",el:"风",em:"🎩",astro:"水星 ☿",u:"资源整合、沟通高效、创意落地、掌控全局",r:"能力虚耗、沟通障碍、欺骗隐瞒、行动力不足",ul:"用实际行动解决矛盾，共同规划未来；遇到用具体付出表达心意的人，无虚浮套路；双方能共享资源，互动有明确推进方向",rl:"一方频繁画饼却无兑现，沟通流于表面；遇浮夸追求者，靠甜言蜜语虚假包装吸引；关系仅靠利益维系，无真实情感联结",uw:"整合自身技能与人脉资源，核心岗位出彩；精准定位市场需求，将优势转化为盈利点；清晰梳理自身能力精准匹配岗位",rw:"空想方案不落地，忽视客观条件导致执行失误；无市场调研就跨界盲目投入；简历过度包装，夸大能力面试露怯"},
{n:2,name:"女祭司 The High Priestess",suit:"大阿卡纳",el:"水",em:"🌙",astro:"月亮 ☽",u:"直觉敏锐、冷静理性、深度洞察、保守秘密",r:"情感压抑、直觉失灵、过度封闭、虚伪隐瞒",ul:"深度心灵共鸣，能感知对方未说出口的需求，用理性沟通化解矛盾；清醒等待契合者，不盲目跟风恋爱；克制的心动试探，通过静默观察判断对方诚意",rl:"冷战式疏离，过度封闭内心拒绝坦诚沟通；多疑错失机会，因过往阴影放大焦虑；直觉误导，过度解读对方言行产生误解",uw:"精准洞察行业趋势与团队隐性问题；沉心钻研专业内容形成扎实能力；做选择前充分考量利弊，决策更具长远性",rw:"僵化错失机遇，固守旧有经验拒绝新方法；知识碎片化，仅收集信息不深度思考；直觉凌驾现实，忽视客观条件与数据"},
{n:3,name:"女皇 The Empress",suit:"大阿卡纳",el:"土",em:"👑",astro:"金星 ♀",u:"物质丰裕、情感滋养、社交魅力、创造力强",r:"虚荣浪费、懒惰懈怠、情感混乱、孕育受阻",ul:"滋养亲密关系，借慷慨付出与温柔包容增进亲密感，共同创造美好回忆；情感状态丰沛开放，易被美好邂逅吸引，自然展现魅力；双方用丰富创造力经营关系，自然加深了解",rl:"溺爱滋生矛盾，一方过度纵容或依赖对方；因追求完美浪漫脱离实际；过度消耗热情，用混乱的情感试探破坏信任",uw:"借丰富想象力为工作提创意方案；事业易得资源支持，凭慷慨合作态度建立优质人脉；在艺术、时尚、创意营销等岗位易获青睐",rw:"工作缺规划，依赖直觉行动无序消耗精力；经营凭浪漫幻想缺理性规划导致资源浪费；求职目标不明确，被表面丰富回报吸引"},
{n:4,name:"皇帝 The Emperor",suit:"大阿卡纳",el:"火",em:"🏰",astro:"白羊座 ♈",u:"领导力、责任担当、稳定秩序、成熟可靠",r:"控制欲强、不负责任、权力丧失、暴躁武断",ul:"一方具备责任感，能理性规划感情未来，用规则感维系关系稳定；理性择偶，明确核心需求不被短期好感裹挟；明确节奏推进关系，避免暧昧期的混乱",rl:"专制引发对抗，过度掌控感情限制社交；僵化择偶，固守必须符合权威标准的观点；掌控吓跑对方，强行主导关系节奏用命令式态度",uw:"具备清晰的目标规划与资源分配能力，带领团队高效完成；明确企业发展方向，建立完善运营体系；优先选择制度完善发展路径清晰的企业",rw:"以权威自居独断决策不听意见致内耗；缺乏全局规划随意更改决策失控陷危机；仅因体制内标签选择岗位盲目追稳定"},
{n:5,name:"教皇 The Hierophant",suit:"大阿卡纳",el:"土",em:"⛪",astro:"金牛座 ♉",u:"宗教权威、教育传承、传统保守、仁慈引导",r:"叛逆质疑、伪善僵化、过度教条、丑闻暴露",ul:"双方认同相似的感情观婚姻观，愿意遵循健康相处规则；在传统社交场景结识价值观契合者；通过深度沟通确认彼此核心需求推进关系",rl:"双方对感情认知未来规划差异巨大观念冲突；因固守必须符合某种条件的标准教条限制缘分；一方追求稳定传统一方追求自由随性价值观错位",uw:"得到领导行业前辈的认可与指导，权威助力成长；参考成功企业运营模式结合自身优势；认同目标公司企业文化与价值观获机会",rw:"所在团队固守旧有规则拒绝创新教条束缚；不顾自身实际照搬他人成功经验盲目跟风；为稳定选择与自身理念相悖的岗位价值观背离"},
{n:6,name:"恋人 The Lovers",suit:"大阿卡纳",el:"风",em:"💕",astro:"双子座 ♊",u:"真爱坦诚、心智共鸣、自主选择、善恶辩证",r:"诱惑沦陷、第三者介入、关系破裂、选择盲从",ul:"双方价值观生活目标高度一致，既能坦诚沟通化解矛盾又能彼此支持；遇灵魂共振良缘，相处无需刻意讨好；经过充分了解主动做出确定关系的选择",rl:"核心需求出现分歧或因信任缺失导致关系失去根基；在多个追求者中摇摆不定或因过度挑剔错选人；一方过度投入一方敷衍回应期待不一致",uw:"与同事合作伙伴理念一致能力互补合作共赢；找到价值观契合资源互补的合伙人精准破局；找到与自身职业理念能力高度匹配的岗位",rw:"与同事理念冲突权责不清合作失衡；合伙人价值观不合目标分歧错配陷危机；因薪资诱惑选择相悖岗位或在多个offer中纠结"},
{n:7,name:"战车 The Chariot",suit:"大阿卡纳",el:"水",em:"🏎️",astro:"巨蟹座 ♋",u:"掌控全局、异地出行、精神胜利、矛盾整合",r:"方向偏离、情绪失控、半途而废、外在受挫",ul:"双方明确共同目标，用坚定意志化解现实阻碍如异地家庭反对；主动争取缘分，明确择偶标准积极拓展社交圈；清晰规划关系发展节奏，用行动力打消对方顾虑",rl:"双方对感情未来规划不一致，缺乏耐心陷入争吵目标分歧；无清晰择偶方向跟风追求不符合需求的人；忽冷忽热行动无规划混乱消耗好感",uw:"明确工作目标整合资源高效行动攻坚突破瓶颈；清晰定位产品方向靠坚定执行力打开市场；明确职业目标针对性优化简历准备面试精准出击",rw:"无清晰工作目标盲目跟风做任务方向迷茫内耗；未明确市场需求就激进投入资源盲目扩张；无目标盲目投递简历匹配度低海投无果"},
{n:8,name:"力量 Strength",suit:"大阿卡纳",el:"火",em:"🦁",astro:"狮子座 ♌",u:"内在勇气、包容接纳、以柔克刚、韧性十足",r:"恐惧退缩、控制失效、野性失控、外强中干",ul:"用包容代替争吵，以耐心倾听理解对方，靠内在韧性修复关系；不刻意讨好凭坚定自我价值感吸引同频者；用真诚与耐心建立信任让感情自然升温",rl:"用冷战指责等强硬方式处理矛盾不愿妥协；因害怕孤独盲目迎合或因过度防备拒绝接触；急于确定关系用强势关心给对方压力",uw:"面对工作压力不急躁，用耐心梳理问题柔韧破局；以真诚态度打动合作伙伴用长期主义吸引客户；不怯场不盲从清晰表达能力与需求",rw:"为证明能力强行承接超出范围的工作蛮力致失误；因固执己见拒绝市场反馈对抗失机遇；过度强调薪资或职位忽视岗位适配度"},
{n:9,name:"隐士 The Hermit",suit:"大阿卡纳",el:"土",em:"🏔️",astro:"处女座 ♍",u:"孤独沉淀、智慧洞察、深思熟虑、内心指引",r:"孤僻自闭、逃避现实、判断失误、抑郁消极",ul:"彼此保留独立思考空间，不依赖过度黏连，借内省化解矛盾；专注个人成长不急于迎合用内在充实吸引同频伴侣；不追求快餐式互动靠深度交流了解彼此慢热沉淀见真心",rl:"过度沉浸自我世界忽视情感联结用独处逃避沟通；拒绝社交互动因害怕受伤将潜在机会拒之门外；回避主动互动用高冷掩盖内心不安冷漠消耗好感",uw:"借独立思考钻研专业难题用深度复盘找到创新解决方案；经市场调研与自我反思避开同质化竞争精准定位；复盘过往经历与能力优势精准投递适配岗位",rw:"拒绝团队沟通固执单打独斗脱离协作低效；无视市场反馈仅凭主观判断推进项目闭门造车；过度反思自身短板放大焦虑不敢尝试自我设限"},
{n:10,name:"命运之轮 Wheel of Fortune",suit:"大阿卡纳",el:"火",em:"🎡",astro:"木星 ♃",u:"时来运转、意外机遇、循环成长、顺应规律",r:"时机未到、厄运缠身、错失机会、恶性循环、抗拒变化",ul:"关系迎来突破进展，步入新阶段如解决长期矛盾；有意外桃花，相遇具命中注定之感；到关键抉择时刻顺势而为可快速确定关系走向",rl:"旧问题反复致感情波折难以打破困境；缘分未成熟易吸引不合适人把握不住机会；关系发展被动停滞因犹豫或行动不当错过推进窗口",uw:"工作现转折有升职或借新机会跳槽提升；外部环境助事业推进易获意外资源支持；求职意外收获理想机会",rw:"工作计划因意外反复或延迟计划停滞陷入瓶颈；创业进展不顺面临资金流断局势失控；易错过好机会机遇擦肩进展不顺"},
{n:11,name:"正义 Justice",suit:"大阿卡纳",el:"风",em:"⚖️",astro:"天秤座 ♎",u:"公平正义、理性裁决、平衡矛盾、坚守原则",r:"偏见不公、逃避责任、滥用规则、情绪化判断",ul:"双方以平等姿态相处，尊重彼此付出，以相互妥协维系关系的平衡与和谐；秉持真诚公正态度，自身积极品质吸引匹配之人；基于双方真实互动做判断，不被冲动或片面信息误导",rl:"关系失衡，一方觉付出未得对等回报，遇分歧易指责对方逃避自身责任；择偶标准不合理或有偏见，因过往经历难公平看待新关系；自身对感情期望过度或不合理，易误解对方行为",uw:"工作正直尽责处事公平，收获信任尊重，易在涉及判断或裁决事务中得支持；做决策兼顾各方因素合理分配资源，权衡风险收益；凭借契合岗位的真实能力获职位，求职进程公正透明",rw:"遇不公平环境如成果被夺为他人错误背锅；资源分配失衡引发合作破裂或内部信任危机；求职存不诚实行为或行业潜规则使公平竞争受阻"},
{n:12,name:"倒吊人 The Hanged Man",suit:"大阿卡纳",el:"水",em:"🙃",astro:"海王星 ♆",u:"自愿牺牲、换角思考、灵性成长、耐心等待",r:"不愿付出、急躁焦虑、错失领悟、被动受害",ul:"愿暂时放下自我立场从对方视角理解分歧，用退让换取关系长久；不急于脱单借独处反思情感需求修炼内在吸引力；不盲目推进关系用持续的细节付出传递诚意让感情自然升温",rl:"一方被迫妥协心生不满，另一方习以为常忽视反馈，关系陷入付出-抱怨循环；因害怕受伤拒绝新接触错失相遇机会；急于确定关系忽视对方节奏用牺牲感绑架对方导致降温",uw:"主动承担基础且耗时的工作，看似吃亏实则积累经验与人脉为后续晋升铺路；暂时降低盈利预期投入资源打磨产品为长期品牌建设奠基；不执着于高薪高位选择能积累核心技能的岗位",rw:"被迫接手额外工作却无成长空间，因不敢拒绝无效任务陷入内耗；明知项目需调整却因不愿承认失败硬撑持续投入无回报；既不愿从基础做起又无匹配高薪岗位的能力在挑剔与不甘中错失offer"},
{n:13,name:"死神 Death",suit:"大阿卡纳",el:"水",em:"💀",astro:"天蝎座 ♏",u:"彻底变革、旧去新来、浴火重生、接纳终结",r:"拖延终结、藕断丝连、恐惧改变、重生受阻",ul:"若矛盾根深蒂固终结错配关系为新生铺路，若真心契合借告别旧模式升级亲密；彻底放下前任清空过往情感执念为新缘分腾出空间；终结模糊状态要么确定关系要么体面告别",rl:"明知关系已破裂仍因恐惧孤独强行维系陷入内耗纠缠难断；无法走出上一段感情伤害拒绝新接触困于过去阴影；因害怕失去不敢推进或终止关系陷入僵局反复无进展",uw:"旧工作内容僵化迎来岗位调整或工作方法升级，或告别不合适岗位开启新职业方向；旧业务模式亏损果断终止后基于经验启动新盈利项目；终结错误投递方向明确目标后迎来新面试机遇",rw:"明知当前工作无成长待遇不公仍因恐惧改变拒绝跳槽能力逐渐退化；旧项目持续赔钱却不愿接受失败投入更多资金填坑损失扩大；拒绝反思自身短板反复投递同类岗位始终无回应"},
{n:14,name:"节制 Temperance",suit:"大阿卡纳",el:"火",em:"🏺",astro:"射手座 ♐",u:"内在和谐、沟通顺畅、健康治愈、理财合理",r:"沟通阻滞、情感空虚、健康失衡、过度放纵",ul:"双方懂得付出与索取的调和，不过度依赖也不疏离，矛盾时能理性沟通各退一步；不急于脱单而降低标准也不封闭自我，以适度期待面对感情；不急躁表白施压也不冷淡拖延，用适度主动传递心意让关系自然升温",rl:"一方过度付出压抑需求另一方过度索取忽视对方，或因小事极端争吵冷战缺乏调和；要么因焦虑饥不择食要么因恐惧过度挑剔始终难遇契合之人；要么过度热情吓跑对方要么过度被动让关系降温",uw:"合理分配时间精力，不盲目加班透支健康也不敷衍工作，效率与状态双优；不过度投入某一环节也不吝啬必要成本，实现成本-收益平衡；不脱离自身能力空想高薪也不局限安全区放弃成长，精准投递稳步准备",rw:"要么工作狂式透支身体要么摆烂躺平荒废能力，或因过度在意他人评价焦虑内耗；要么盲目扩张投入全部资金要么过度保守错失发展机遇；要么眼高手低只投天花板岗位要么盲目海投无目标面试屡屡碰壁"},
{n:15,name:"恶魔 The Devil",suit:"大阿卡纳",el:"土",em:"😈",astro:"摩羯座 ♑",u:"物质沉迷、关系异化、自我奴役、隐秘禁忌",r:"挣脱束缚、反思欲望、虚假自由、更深堕落",ul:"靠物质占有欲维系关系缺乏真情，或陷入虐恋难抽身；因外貌财富忽视人品被欲望裹挟择偶；仅因对方有利用价值接近无真实情感联结利益化互动",rl:"认清关系本质主动结束消耗型感情，或共同摆脱欲望捆绑觉醒后解绑；不再被外在条件束缚重视内在契合摆脱择偶执念；识破利益伪装主动终止无意义互动清醒断联",uw:"为高薪忍受有毒环境或靠不正当手段竞争丧失职业底线；忽视长期规划靠投机取巧盈利风险极高沉溺短期利益；因表面光鲜选择不适合的行业忽视成长空间被诱惑选错路",rw:"拒绝无底线要求主动跳槽至健康环境坚守原则拒绝违规操作；放弃短期投机重新规划长期可持续方向觉醒转型；拒绝诱惑型岗位选择契合价值观与成长的工作明确核心需求"},
{n:16,name:"塔 The Tower",suit:"大阿卡纳",el:"火",em:"🗼",astro:"火星 ♂",u:"意外灾难、全面崩塌、强制觉醒、信仰破灭",r:"灾难减轻、幸存者困境、虚假重建、延迟打击",ul:"背叛曝光核心矛盾爆发关系断崖式终结无法修复；认清暧昧对象的欺骗虚假关系破灭快速抽离；对方真实面目暴露幻想彻底打破无继续发展可能",rl:"明知关系已破裂仍因恐惧孤独强行维系陷入更深内耗；明知对方不合适仍不愿接受现实反复纠缠困于虚假期待；忽视对方的负面信号用幻想维持表面互动自欺欺人",uw:"公司裁员项目骤停行业政策巨变突发危机冲击原有工作模式失效；资金链断裂核心团队解散产品被市场淘汰项目彻底崩盘；已谈妥的offer取消目标公司突发经营危机机会突然落空",rw:"明知行业公司有风险仍拒绝学习新技能寻找新机会坐等危机降临；项目已无盈利可能仍靠借贷维持债务越积越多硬撑虚假运营；多次投递无果仍不调整目标或拒绝转型固守无效方向"},
{n:17,name:"星星 The Star",suit:"大阿卡纳",el:"风",em:"⭐",astro:"水瓶座 ♒",u:"灵性连接、希望笃定、创意灵感、纯净和谐",r:"理想幻灭、现实脱节、行动匮乏、迷茫无措",ul:"双方借沟通探索深层情感，相处平和浪漫互给予精神力量；易结识心灵契合者感情以灵魂吸引为起点；以积极心态看待关系不确定性成为期待双方愿探索可能",rl:"过度理想化关系无视矛盾问题积累破坏和谐乐观盲目；依不切实际标准择偶难与现实的人建立情感链接幻想阻碍缘分；因内心迷茫反复无常让对方感受不到稳定期待消极消耗热情",uw:"工作迸发创意契合发展方向获认可嘉奖灵感助力成就；于困境寻突破转机吸引资源支持事业现复苏曙光希望点亮前路；在漫长求职后迎来适配机会符合能力或理想方向曙光浮现",rw:"环境或心态消极灵感受抑对工作提不起实质兴趣消极压抑；无清晰规划滥用资源努力偏离需求难见回报资源错配迷茫；无明确求职方向投递行为盲目浪费时间精力方向迷失"},
{n:18,name:"月亮 The Moon",suit:"大阿卡纳",el:"水",em:"🌕",astro:"双鱼座 ♓",u:"潜意识显现、恐惧不安、欺骗隐瞒、情绪波动",r:"真相暴露、情绪爆发、恐惧消散、直面现实",ul:"被放大的恐惧主导判断过度解读对方言行，因隐性不安拒绝坦诚沟通猜忌引发冷战；因过往情感阴影放大焦虑拒绝新社交恐惧阻碍相遇；被混乱的直觉误导过度猜忌对方意图误解消耗好感",rl:"能感知对方未说出口的情绪借潜意识联结化解隐性矛盾深层情感共鸣；靠潜意识感知筛选契合对象易遇灵魂共振的伴侣直觉吸引缘分；眼神细节中传递心意靠直觉捕捉彼此好感隐性情愫流动",uw:"因害怕失败被否定不敢坚持直觉判断盲目跟风他人方案恐惧影响决策；过度怀疑市场反馈合作伙伴因隐性不安推迟行动错失发展窗口；忽视内心对岗位的排斥感仅因表面光鲜盲目投递自我欺骗",rw:"靠潜意识感知捕捉工作中的隐性问题用细腻观察找到突破口直觉破解难题；从市场未被言说的痛点切入开发契合深层需求的产品洞察隐性需求；凭内在感知选择与自身价值观潜力契合的方向入职后适配度高"},
{n:19,name:"太阳 The Sun",suit:"大阿卡纳",el:"火",em:"☀️",astro:"太阳 ☉",u:"生命力旺盛、快乐坦诚、成功荣耀、贵人相助",r:"自信受挫、热情减退、骄傲自负、人际隔阂",ul:"彼此毫无保留用热情与真诚维系关系，矛盾当面化解无隐藏隔阂坦诚甜蜜；因自身状态积极自然吸引同频者相处轻松无压力自信吸引良缘；双方主动表露心意不搞暧昧拉扯关系快速向确定方向推进明朗化升温",rl:"因生活琐事消磨活力沟通减少或隐藏不满导致关系降温热情消退冷战；因自我否定不敢主动或过度在意缺点难以展现真实魅力自卑错失缘分；一方态度闪躲另一方患得患失关系停滞在不确定状态模糊化内耗",uw:"凭借高效行动力与积极心态出色完成项目获领导认可与晋升奖励成果亮眼；市场反馈积极客户认可度高业务规模稳步扩张盈利显著项目蓬勃发展；面试中自信展现优势与岗位高度匹配快速收到录用通知顺利获offer",rw:"因心态消极动力不足工作频频出错或因害怕失败不敢挑战错失表现机会效率低下；市场遇冷或团队活力不足盈利增长停滞陷入运营困境项目遇瓶颈；因自信不足准备不充分或目标模糊面试难以打动面试官屡屡碰壁"},
{n:20,name:"审判 Judgement",suit:"大阿卡纳",el:"火",em:"📯",astro:"冥王星 ♇",u:"因果显现、灵魂觉醒、公正裁决、重大转机",r:"拒绝反思、逃避责任、因果延迟、判断失误",ul:"正视感情中存在的问题共同反思相处模式主动修复裂痕让关系更稳固；清晰认知自身对感情的核心诉求告别盲目择偶明确想要什么适合什么；客观看待分开的原因不沉溺遗憾或怨恨接纳关系结局为新感情腾出空间",rl:"对感情中的问题视而不见用冷战敷衍掩盖分歧长期积压不满导致裂痕扩大；因过往感情挫折自我否定或在择偶中随波逐流不清楚自身需求反复错过适配对象；无法放下前任反复回忆过往甚至主动打扰对方陷入断联-纠缠循环",uw:"正视工作中存在的问题复盘反思寻求改进迎来重大职业转折；审视企业经营中的问题果断调整战略方向把握新机遇；反思过去求职中的不足明确方向做出关键职业决策",rw:"对工作中的问题视而不见拒绝反省过去的失误犹豫不决错过好机会；逃避企业经营中的核心问题延误调整时机因果延迟终将爆发；不愿面对自身短板盲目自信或过度自我否定判断失误"},
{n:21,name:"世界 The World",suit:"大阿卡纳",el:"土",em:"🌍",astro:"土星 ♄",u:"终极成功、资源整合、内外和谐、长期稳定",r:"整合失败、停滞不前、美中不足、距离感",ul:"经历磨合后达成深度契合彼此支持成长形成良性循环如步入婚姻长期稳定共生；完成个人成长闭环内心丰盈自然吸引同频者无需刻意迎合自我圆满遇良缘；经历充分了解双方需求价值观高度匹配自然进入确定关系的圆满阶段水到渠成",rl:"因一方需求未被满足目标分歧导致付出回馈失衡如长期冷战承诺落空闭环断裂；个人成长未完成过度依赖外界认可择偶时要么妥协要么挑剔难寻匹配对象；只关注表面吸引忽视深层需求匹配始终无法推进到稳定阶段卡在瓶颈",uw:"凭借全局规划与资源整合高效达成目标获团队认可与成果回报项目圆满收尾；完成产品迭代市场验证或盈利闭环企业进入稳定发展期具备开启新业务基础；找到能力兴趣价值三者契合的岗位入职后快速融入实现双向成就职业适配圆满",rw:"因缺乏全局规划资源错配或中途放弃导致目标未达成甚至拖累后续工作项目烂尾；产品未达市场需求资金链断裂或团队协作失衡阶段目标落空企业陷入生存困境；仅看重薪资或稳定性忽视能力匹配与价值认同入职后难以融入频繁跳槽"},

{n:1,name:"权杖王牌 Ace of Wands",suit:"权杖",el:"火",em:"🔥",u:"新机遇、生命力旺盛、主动行动、目标聚焦",r:"动力不足、冲动受挫、目标迷茫、热情消退",ul:"点燃关系新火种共同尝试冒险项目激发激情；单身直觉指引邂逅心动之人一见钟情；暧昧中直接表达心意不玩推拉大胆追求",rl:"激情耗尽后疲惫陷入假性亲密缺乏新鲜感；盲目消耗机会对感情提不起兴趣；混乱情感拉扯新关系迟迟没有进展",uw:"开辟新赛道主动申请核心项目精准捕捉风口；创业精准定位市场需求快速启动；突破性展现能力获稀缺offer充满干劲",rw:"冲动决策失误资源错配项目启动困难；虚构项目经历面试露馅缺乏方向和动力；创意受阻灵感枯竭延迟启动"},
{n:2,name:"权杖二 Two of Wands",suit:"权杖",el:"火",em:"🔥",u:"主动权衡、目标明确、掌控力强、野心可控",r:"选择困难、野心受挫、行动力不足、患得患失",ul:"共绘长远蓝图规划未来主动规划感情方向；清醒筛选适配者不盲目社交有清晰愿景；理性推进关系对关系有明确方向",rl:"空想逃避现实回避分歧对感情未来迷茫；恐惧封闭自我害怕迈出下一步；混乱博弈维系多个暧昧犹豫不决",uw:"主动争取跨部门突破制定长远规划有远见地布局事业；布局长远验证需求再扩张考虑新发展；精准匹配机会",rw:"因怕失败放弃核心项目害怕改变不敢规划；盲目扩张局限于眼前安逸不愿突破；过度纠结患得患失落空"},
{n:3,name:"权杖三 Three of Wands",suit:"权杖",el:"火",em:"🔥",u:"阶段性成功、职场晋升、远方机遇、异地海外发展",r:"成果未落地、冲动受挫、靠山流失、目标迷茫",ul:"共行深化联结规划行动感情进入新阶段；主动拓展获良缘异地恋有进展；行动推进显真心共同展望未来",rl:"行动脱节生隔阂各做各的缺乏共同目标；无效社交耗精力感情发展不如预期；行动混乱耗好感异地带来困扰",uw:"项目落地推进交付初见成效业务拓展顺利；试点成功扩版图放眼更大市场；明确方向获适配机会",rw:"项目停滞无成果扩展计划受挫；盲目扩张亏回报比预期慢；方向混乱视野受限"},
{n:4,name:"权杖四 Four of Wands",suit:"权杖",el:"火",em:"🔥",u:"家庭和睦、婚姻契机、事业稳定、成果共享、安全感强",r:"关系破裂、家庭矛盾、事业动荡、成果流失、安全感缺失",ul:"以稳定深化联结共同完成根基事如订婚同居；在熟圈寻良缘关系得到祝福；借实事定关系里程碑式进展",rl:"用表面掩盖裂痕靠仪式粉饰关系缺乏安全感；无效社交无深度重要节点被推迟；无进展耗好感家庭压力",uw:"巩固成果获认可标准化流程项目阶段性成功；稳根基谋扩张团队庆祝；选稳平台谋发展工作环境和谐",rw:"忙而无实消耗口碑团队氛围紧张；盲目扩大规模成果未被认可；盲选不稳失方向缺乏归属感"},
{n:5,name:"权杖五 Five of Wands",suit:"权杖",el:"火",em:"🔥",u:"意见不合、争吵内卷、竞争激烈、效率低下、情绪暴躁",r:"冲突暂歇、竞争缓和、主动解决、警惕反扑、欲望降温",ul:"冲突促契合不回避分歧梳理矛盾各抒己见；竞争显真心筛选认可者竞争对手出现；互动激好感",rl:"对抗耗感情翻旧账冷战逃避冲突；恶性竞争失方向内心挣扎；冲突冷好感达成妥协",uw:"竞争促成长学他人优点职场竞争激烈；竞争破僵局差异化创新项目面临挑战；竞争显优势",rw:"内耗拖进度抢功劳竞争压力缓解；对抗陷危机团队达成共识；竞争乱节奏选择退出竞争"},
{n:6,name:"权杖六 Six of Wands",suit:"权杖",el:"火",em:"🔥",u:"竞争胜利、外界认可、主导关系、自信彰显、荣耀加身",r:"胜利落空、地位下滑、主导权丧失、他人倒戈、努力白费",ul:"共庆成果增默契达成目标感情顺利令人羡慕；高光吸引同频人得到朋友祝福；互赏优势定关系中有成就感",rl:"傲慢耗损感情自视甚高不被看好；炫耀吓跑良缘虚荣心作祟；虚夸冷好感过于在意他人眼光",uw:"成果亮眼获晋升主导项目被认可业绩突出；品牌打响拓市场项目成功；优势突出获青睐",rw:"傲慢失机遇轻视任务努力不被认可；虚耗口碑陷困境项目失利；虚夸失信任因骄傲导致失误"},
{n:7,name:"权杖七 Seven of Wands",suit:"权杖",el:"火",em:"🔥",u:"直面挑战、意志力强、顶住压力、单方面坚守、警惕小人",r:"扛压失败、主动放弃、决策失误、优势丧失、阻力反噬",ul:"共守难关增羁绊面对外界压力不退缩为感情坚定立场；坚守标准遇良缘；坚定心意促进展",rl:"妥协退让生裂痕逃避在压力下放弃感情；妥协标准陷内耗筋疲力尽；摇摆不定耗好感无法继续坚持",uw:"坚守核心破困局聚焦问题面对竞争坚守阵地；逆势坚守拓生路捍卫成果和地位；坚守方向获机会",rw:"妥协退让失机遇不抗压竞争中落败；盲目对抗陷危机扛不住压力；摇摆不定失方向失去优势"},
{n:8,name:"权杖八 Eight of Wands",suit:"权杖",el:"火",em:"🔥",u:"行动高效、异地海外发展、感情快速升温、无阻碍、新鲜感强",r:"计划中断、行动延迟、感情短暂失联、内耗严重、责任心缺失",ul:"高效共振促深化快速达共识感情快速发展；主动出击遇良缘异地恋迎来好消息；快速破冰定关系加速推进",rl:"拖延内耗伤感情回避问题沟通不畅消息延迟；盲目行动耗精力感情进展缓慢；混乱拉扯耗好感误会未解",uw:"高效执行出成果快速拆解项目快速推进出差或调动；快速迭代占先机效率大增；精准行动获offer",rw:"低效拖延误事反复修改项目延期；盲目加速陷危机信息传达混乱；混乱行动失机会计划被打乱"},
{n:9,name:"权杖九 Nine of Wands",suit:"权杖",el:"火",em:"🔥",u:"谨慎多疑、创伤羁绊、自我保护、有限坚持、最后考验",r:"焦虑加剧、担心应验、掉以轻心、伤疤忘痛、底气不足",ul:"共抗考验增默契用定期沟通应对感情经历考验但不放弃；沉淀自我遇良缘保持警惕保护关系；耐心观察定心意",rl:"疲惫内耗伤感情冷战循环在感情中身心俱疲；焦虑将就陷困境过度防备不信任对方；怀疑拉扯耗好感",uw:"坚守深耕获认可专注领域最后冲刺坚持就是胜利；蓄力破局打磨产品虽然疲惫但坚持；沉淀能力获机会",rw:"倦怠敷衍失机遇不主动工作压力到极限想放弃；疲惫硬撑陷危机过度紧张影响状态；自我怀疑失方向"},
{n:10,name:"权杖十 Ten of Wands",suit:"权杖",el:"火",em:"🔥",u:"责任过载、身心疲惫、单方面付出、多劳多得、迷失初衷",r:"无力承担、被迫放弃、责任转移、利益损失、健康预警",ul:"共担责任固根基一起制定计划感情成负担但需学会分担；责任显担当遇良缘付出过多身心疲惫；责任共识定关系压力大",rl:"负重失衡伤感情一方独承担学会放手不再硬撑；逃避责任失良缘重新分配责任；承诺虚浮耗好感",uw:"扛责破局获信赖主动承担工作量超负荷需要分担；使命驱动渡难关一个人扛太多；显担当获青睐学会说不",rw:"逃避责任失信任开始把任务分给别人；盲目扛责陷绝境减轻工作负担；避责显短板"},
{n:11,name:"权杖侍从 Page of Wands",suit:"权杖",el:"火",em:"🔥",u:"热情探索、好奇心旺盛、新消息、冒险精神",r:"三分钟热度、缺乏耐心、坏消息、鲁莽冲动",ul:"对新感情充满好奇和热情大胆追求心动的人；收到关于感情的好消息；用热情打动对方",rl:"对感情三分钟热度新鲜感过后失去兴趣；感情中冲动行事缺乏耐心；收到关于感情的坏消息",uw:"积极学习新技能对新项目充满热情收到好消息；冒险精神带来新机遇；好奇心驱动探索新领域",rw:"做事缺乏耐心虎头蛇尾冲动决策缺乏思考；新项目半途而废缺乏持续性；鲁莽行事导致失误"},
{n:12,name:"权杖骑士 Knight of Wands",suit:"权杖",el:"火",em:"🔥",u:"行动力强、冒险精神、热情澎湃、勇往直前",r:"急躁冲动、方向迷失、热情消退、鲁莽行事",ul:"热烈追求轰轰烈烈的爱情充满激情和冒险；感情中充满行动力主动出击；快速推进关系",rl:"感情来得快去得也快冲动之下做出后悔的决定；急躁导致感情破裂；方向迷失不知道想要什么",uw:"雷厉风行推进工作行动力爆棚敢于冒险创新；快速执行拿结果；勇于开拓新业务",rw:"做事急躁不够周全换工作太频繁缺乏稳定性；冲动决策导致项目失败；热情消退半途而废"},
{n:13,name:"权杖皇后 Queen of Wands",suit:"权杖",el:"火",em:"🔥",u:"自信魅力、热情大方、独立能干、社交达人",r:"嫉妒自私、控制欲强、情绪化、缺乏自信",ul:"在感情中自信且有魅力热情经营关系吸引力强；独立自信的状态让人着迷；社交中光芒四射容易吸引追求者",rl:"嫉妒心重控制对方情绪化让关系紧张；缺乏自信在感情中患得患失；自私只考虑自己的感受",uw:"工作中散发领导魅力社交能力强人缘好；独立能干业绩出色；热情感染团队带动氛围",rw:"职场中嫉妒同事控制欲影响团队情绪化办事；缺乏自信不敢争取机会；人际关系紧张"},
{n:14,name:"权杖国王 King of Wands",suit:"权杖",el:"火",em:"🔥",u:"领导魄力、远见卓识、大胆决断、激励他人",r:"专横霸道、急功近利、独断专行、暴躁易怒",ul:"在感情中有担当有魄力引领关系走向更好的方向；成熟自信给人安全感；大格局让对方信赖",rl:"大男子主义或过于强势不考虑对方感受；急功近利不愿花时间经营；暴躁易怒伤害感情",uw:"有远见的领导者大胆决策带领团队突破；激励他人共同奋斗；战略眼光精准判断方向",rw:"管理风格过于独断急功近利忽略团队感受；刚愎自用不听建议；暴躁管理让团队离心"},

{n:1,name:"圣杯王牌 Ace of Cups",suit:"圣杯",el:"水",em:"🏆",u:"心动萌芽、纯粹热爱、人际善意、灵感涌现、美好期许",r:"情感干涸、付出无回报、虚假期待、灵感缺失、机会延迟",ul:"爱意焕新甜如初见主动浪漫为关系注入新活力；心灵共振遇良缘新恋情降临；真诚破冰定关系情感连接深刻",rl:"情感冷漠失温度对感情关上心门害怕受伤；封闭自我失机遇不愿敞开自己；心意阻隔耗好感直觉迟钝",uw:"热爱驱动创佳绩主动探索对工作充满热爱；初心指引拓新路新项目带来满足；热爱匹配获机遇创意灵感涌现",rw:"情感疏离无动力对工作失去热情感到空虚；初心迷失陷困境缺乏情感投入；盲目选择失方向"},
{n:2,name:"圣杯二 Two of Cups",suit:"圣杯",el:"水",em:"🏆",u:"双向奔赴、信任契约、合作默契、平等尊重、长期导向",r:"关系失衡、信任破裂、沟通不畅、契约解除、控制欲强",ul:"平等互动增默契不卑不亢两情相悦心灵契合；双向心动遇良缘关系平等互相尊重；互释善意定关系甜蜜恋爱",rl:"失衡付出冷感情一方包揽感情失衡付出多；单向执念耗精力沟通出问题面临分离；错位互动耗好感",uw:"协作共赢创佳绩分工平等找到好的合作伙伴双方默契；伙伴契合拓新路互利共赢；双向适配获机会",rw:"失衡协作拖进度合作关系出现裂痕；伙伴错位陷危机理念不合；单向妥协失价值伙伴关系破裂"},
{n:3,name:"圣杯三 Three of Cups",suit:"圣杯",el:"水",em:"🏆",u:"集体欢庆、成果共享、人脉旺盛、财运好、情感多元",r:"表面客套、拉帮结派、情感隐患暧昧、合作破裂、快乐虚假",ul:"共庆扩容增联结朋友祝福的感情；社交旺运遇良缘社交中遇到心仪对象；集体升温定关系分享喜悦",rl:"表面和谐藏裂痕第三者介入的风险；虚假社交耗精力朋友圈影响感情；多角拉扯陷困境社交中的暧昧",uw:"团队庆功聚人心合作愉快项目庆功；流量财运双丰收同事关系融洽；共鸣互动获青睐",rw:"拉帮结派冷氛围办公室小团体矛盾；流量财运难持久过度社交影响工作；表面迎合失机会团队不和"},
{n:4,name:"圣杯四 Four of Cups",suit:"圣杯",el:"水",em:"🏆",u:"不满足现状、被动等待、潜在机遇、审视需求、备胎属性",r:"主动行动、珍惜现有、机遇落地、突破瓶颈",ul:"审视需求促深化沟通深层需求对感情麻木无感身在福中不知福；拒绝将就等良缘忽视对方的好；清醒判断定去留",rl:"纠结内耗伤感情不主动解决重新发现对方的好；盲目妥协陷困境走出情感低谷；被动拉扯耗好感珍惜眼前人",uw:"筛选机会谋发展争取有价值任务对工作感到厌倦；理性取舍定方向眼前有机会却看不到；明确目标选适配缺乏动力",rw:"被动承接耗精力走出倦怠期重新发现工作意义；盲目扩张陷危机抓住新机会；迷茫妥协失价值"},
{n:5,name:"圣杯五 Five of Cups",suit:"圣杯",el:"水",em:"🏆",u:"情感失去、被动悲伤、忽视希望、暂时困境",r:"走出负面、发现机会、主动疗愈、转机落地",ul:"陷负面情绪僵局抱怨翻旧账感情中的伤痛和遗憾只看到失去的；困情伤拒新遇忽略还拥有的；拉扯耗双方沉浸悲痛",rl:"直面矛盾修关系从失恋中走出来；疗愈情伤等良缘接受结果准备好迎接新感情；理性告别无遗憾放下遗憾",uw:"避失误陷停滞归咎市场项目失败后沉浸在失落中；困挫折乱决策只关注损失忽视机会；落选内耗失信心",rw:"认失误谋改进复盘从失败中恢复；纳挫折调方向吸取教训重新出发；对落选找差距看到新可能"},
{n:6,name:"圣杯六 Six of Cups",suit:"圣杯",el:"水",em:"🏆",u:"纯爱付出、旧识重逢、贵人相助、安全感强、怀旧温馨",r:"付出不被珍惜、孤独无援、回忆负面、依赖失效",ul:"守护滋养稳关系彼此体谅初恋般纯真感情旧情人重逢；善意吸引同频人温馨甜蜜的回忆；温情互动定关系",rl:"失衡付出冷感情一方过度迁就沉溺过去无法前进；善意透支遇错人用过去标准衡量现在；单向温情耗好感",uw:"互助共赢创佳绩主动分享回归初心找到工作热情；信任伙伴拓新路老客户回来与旧同事合作；真诚展现获青睐",rw:"单向付出拖进度沉迷过去辉煌不愿面对现实；信任错付陷危机怀旧心态阻碍进步；善意伪装失机会"},
{n:7,name:"圣杯七 Seven of Cups",suit:"圣杯",el:"水",em:"🏆",u:"欲望泛滥、白日梦、烂桃花、被欺骗、不切实际",r:"幻想破灭、认清现实、主动取舍、灵感落地",ul:"空想耗感情只幻想对感情有不切实际的幻想选择太多反而迷失；迷茫误良缘；空想冷好感",rl:"共绘未来增联结规划看清感情真相不再幻想；明期待遇良缘做出务实的选择；共鸣憧憬定关系脚踏实地",uw:"空想误效率不落地选择太多眼花缭乱沉迷空想不付诸行动；空想陷危机；迷茫失方向",rw:"构想看破瓶颈定目标从空想回到现实明确目标专注执行；愿景引方向调研市场；目标清获机会"},
{n:8,name:"圣杯八 Eight of Cups",suit:"圣杯",el:"水",em:"🏆",u:"主动离开、断舍离、追寻理想、精神成长、理性清醒",r:"藕断丝连、犹豫不前、被过去牵绊、前任影响、放弃不彻底",ul:"断耗寻同频察觉消耗不将就主动离开不再满足的关系；舍错等对的拒绝不合适追寻真正想要的感情；止损定方向",rl:"耗着不放手明知有裂痕不敢分明知不合适却不舍得离开；将就陷内耗接受不符人害怕孤独将就凑合；纠结耗双方",uw:"辞旧谋新局察觉无成长离开不再满足的工作追求热爱的事；舍旧拓新途关停业务；拒错择对的选优质机会",rw:"守旧陷停滞不敢跳槽在不喜欢的工作中将就没有勇气做出改变；恋旧陷危机硬撑原模式；将就失价值"},
{n:9,name:"圣杯九 Nine of Cups",suit:"圣杯",el:"水",em:"🏆",u:"心愿达成、满足感、享受成果、幸福快乐",r:"贪心不足、虚荣炫耀、内心空虚、物质主义",ul:"感情中心愿达成满足幸福的状态如愿以偿；关系甜蜜和谐双方都感到被满足；享受感情中的小确幸",rl:"对感情期望过高永远不满足用物质衡量爱情；虚荣心作祟在意外人眼光；内心空虚用物质填补情感空缺",uw:"工作目标达成享受努力的成果心满意足；获得应有的回报和认可；事业上的心愿实现",rw:"取得成绩后骄傲自满过度追求物质回报忽略初心；成功后失去方向感；贪心不足永远不满意"},
{n:10,name:"圣杯十 Ten of Cups",suit:"圣杯",el:"水",em:"🏆",u:"家庭幸福、情感圆满、和谐美满、长久之爱",r:"家庭矛盾、关系破裂、理想与现实落差、不和谐",ul:"感情圆满幸福家庭和睦长久稳定的爱情；关系达到最美好的状态彼此成就；情感上的终极圆满",rl:"家庭矛盾频发理想中的爱情与现实差距大；关系出现裂痕难以修复；对完美家庭的期望落空",uw:"团队如家般和谐事业与生活平衡工作带来幸福感；职业上达成圆满的成就；工作环境温暖有归属感",rw:"工作影响家庭关系团队不和对工作环境不满；事业与家庭失衡；工作上的圆满被打破"},
{n:11,name:"圣杯侍从 Page of Cups",suit:"圣杯",el:"水",em:"🏆",u:"情感萌芽、浪漫天真、创意灵感、好消息",r:"情绪化、不成熟、幻想过多、逃避现实",ul:"初恋般的心动纯真浪漫的表白收到爱的信号；对感情充满好奇和期待；用天真的方式表达爱意",rl:"对感情过于幼稚天真情绪化让对方难以招架；沉浸在不切实际的幻想中；逃避感情中的现实问题",uw:"有创意新想法收到好消息用直觉解决问题；工作中灵感涌现；带着热爱做事充满创造力",rw:"想法不成熟难以落地情绪影响工作表现；创意无法实现；过于理想化不切实际"},
{n:12,name:"圣杯骑士 Knight of Cups",suit:"圣杯",el:"水",em:"🏆",u:"浪漫追求、温柔体贴、带着爱意前行、理想主义",r:"不切实际、花言巧语、情感操控、逃避承诺",ul:"浪漫的追求者出现用心呵护感情温柔而坚定；带着真心追求爱情；用浪漫的方式打动对方",rl:"嘴上说爱却不付诸行动花言巧语不真诚逃避承诺；用浪漫包装欺骗；说得多做得少不愿担责",uw:"带着热爱做事用创意推动项目追求理想工作；用情感智慧处理职场关系；创意型工作者",rw:"过于理想化不切实际说得多做得少；工作中缺乏务实精神；逃避困难只追求表面的美好"},
{n:13,name:"圣杯皇后 Queen of Cups",suit:"圣杯",el:"水",em:"🏆",u:"温柔共情、直觉敏锐、情感丰富、关怀体贴",r:"情绪过载、过度敏感、忽视自我、情感依赖",ul:"深情且体贴的伴侣直觉感知对方需求温暖治愈；用同理心经营感情；能感知对方未说出口的需求",rl:"过度付出忽视自己需求情绪化让关系疲惫；过度敏感容易受伤；为了讨好对方失去自我",uw:"用同理心处理团队关系直觉判断准确创意工作出色；善于营造和谐的工作氛围；情感智慧型领导",rw:"情绪影响判断力过度在意他人看法忽视自身需求；过度共情导致精力耗尽；工作中缺乏理性"},
{n:14,name:"圣杯国王 King of Cups",suit:"圣杯",el:"水",em:"🏆",u:"情感成熟、冷静理性、包容大度、情商高手",r:"情感压抑、表面冷静内心波涛、情绪操控、逃避感受",ul:"成熟稳重的伴侣理性处理感情问题包容且深情；用智慧和耐心经营关系；情感上的定海神针",rl:"压抑真实感受不愿表达用冷漠掩饰内心波动；用情绪操控对方；表面平静实则逃避深层情感问题",uw:"高情商领导善于平衡团队情绪冷静决策；用成熟的方式处理职场人际关系；值得信赖的管理者",rw:"表面冷静内心焦虑用情绪操控团队不愿表达真实想法；压抑情绪导致决策失误；缺乏真诚"},
// === SWORDS (14) ===
{n:1,name:"宝剑王牌 Ace of Swords",suit:"宝剑",el:"风",em:"⚔️",u:"茅塞顿开、目标明确、言语犀利、计划潜力、求职有利",r:"思维混沌、计划失败、沟通障碍、欲言又止、言语伤人",ul:"遇分歧不冷战精准指出问题核心用理性方案解决；不被外貌物质迷惑明确三观契合的核心需求果断拒绝不符者；果断定关系坦诚表达想认真发展的心意",rl:"纠结内耗遇矛盾逃避沟通或情绪化争吵问题越积越多；迷茫择偶无清晰标准来者不拒或过度挑剔；犹豫不决忽冷忽热好感在不清不楚中消散",uw:"果断破局遇项目瓶颈快速分析核心问题精准策略推进；清醒决策察觉行业变化果断调整方向抢占先机；明确目标瞄准契合岗位简历突出匹配能力",rw:"犹豫误事拖延观望反复修改无定论怕出错不敢行动；盲目决策无调研跟风扩张或固执己见拒听建议；迷茫妥协海投岗位简历无重点面试无逻辑"},
{n:2,name:"宝剑二 Two of Swords",suit:"宝剑",el:"风",em:"⚔️",u:"选择纠结、两难困境、自我防御、防御心强、回避矛盾",r:"果断抉择、放下戒备、直面矛盾、突破僵局、信号显现",ul:"纠结在亲密与距离间摇摆既怕选错又怕失去情感在拉扯中冷却；防御心强对陌生人刻意保持距离怕受伤拒绝所有感情；怕错停滞明明有好感却卡在主动表白怕被拒的矛盾里",rl:"果断抉择不再纠结选定并定计划遇矛盾主动聊核心诉求；放下戒备不再因怕受伤拒绝社交敢主动分享用真诚拉近距离；主动突破不再怕被拒坦诚心意给彼此时间了解",uw:"选择两难卡在项目A还是B既怕扛不住压力又怕耽误晋升；方向纠结想法停在空想不敢动；拿到两个offer反复纠结错过机会",rw:"果断选方向推进选定后制定计划主动要资源高效执行；定方向小步试错根据反馈调整；不犹豫抓适配机会主动学岗位技能"},
{n:3,name:"宝剑三 Three of Swords",suit:"宝剑",el:"风",em:"⚔️",u:"精神刺痛、多方面伤害、表达受限、理性伤感、短暂痛苦",r:"伤痛缓解、开始疗愈、旧伤复发、关系裂痕、谨慎释怀",ul:"遭遇背叛忽视等伤害不敢质问默默压抑吵架翻旧伤却不敢说难过；失恋刺痛怕再受伤拒绝所有社交困在伤痛回忆；表白被拒觉得自己不够好反复回想哪里做错",rl:"不再压抑被忽视的委屈主动谈话直面伤痛修复信任；不再拒绝社交试着和朋友出去敢说我在调整；释怀残留被拒的刺痛消退能坦然说谢谢你",uw:"项目失败被公开批评觉得自己没能力反复纠结如果当初再努力点；投入资金打水漂觉得创业不适合自己；连续收到拒信觉得自己什么都不会不敢再投递",rw:"不再纠结失败的错列可改进的点主动向领导要小任务重建信心；不再归为自己笨分析原因先做低成本试手；不再因拒信自我否定问面试官哪里需改进针对性学习"},
{n:4,name:"宝剑四 Four of Swords",suit:"宝剑",el:"风",em:"⚔️",u:"精神休整、感情冷静期、职场瓶颈、暗中蓄力",r:"结束休整、主动改善、新机会落地、关系缓和、警惕风险",ul:"吵架后主动说先冷静明天再好好聊冷静期各自想自己的问题；失恋后给自己缓冲期每天写释怀的话等情绪平复再接触新人；觉得进展太快主动说先当朋友多聊聊观察是否契合",rl:"吵架没冷静就强行沟通翻旧账指责或冷静期超过一周避而不谈；失恋没整理好就被催着相亲敷衍回应；没观察透就急着表白被拒后又强行拉近距离",uw:"项目结束后花时间整理问题清单向领导提优化建议等状态满格再接新任务；淡季梳理数据优化流程培训员工；停步分析拒信原因针对性学习更新简历只投适配度高的岗",rw:"项目刚结束就硬接新任务精力不足导致失误；淡季没优化就跟风开分店资金超储备；没改短板继续投同款岗位或停太久错过招聘旺季"},
{n:5,name:"宝剑五 Five of Swords",suit:"宝剑",el:"风",em:"⚔️",u:"无意义争斗、言语攻击、暗中算计、小人隐患、胜利者孤独",r:"纷争暂歇、表面和好、后悔反思、局势反转、隔阂残留",ul:"因琐事争执非要争对错翻旧账反驳忽视对方情绪赢了辩论却冷了关系；竞争心态耽误良缘急于表现忽略对方需求；观点对立激烈反驳非要让对方认同好感在争执中消散",rl:"意识到争对错伤感情后主动放低姿态一起商量解决方案；放下比较专注自身特质真诚聊天反而吸引同频者；换位思考主动说没考虑过你的角度聊天氛围缓和",uw:"为评优晋升和同事暗中较劲刻意隐瞒工作信息否定他人建议；和合伙人在利润分配上互不让步合作陷僵局；面试强行反驳面试官观点给面试官留下固执印象",rw:"主动和同事分享信息倾听不同意见整合最优方案；和合伙人坦诚沟通各自妥协合作重新推进；不强行反驳客观阐述观点结合岗位需求展现灵活度"},
{n:6,name:"宝剑六 Six of Swords",suit:"宝剑",el:"风",em:"⚔️",u:"困境逃离、异地过渡、低调疗愈、守护责任、欲速则不达",r:"风险加剧、旧冲突复发、过渡失败、情绪失控、抗压能力弱",ul:"经历信任危机后给彼此缓冲期心态平和后一起制定少指责多倾听的规则；走出失恋阴影释放情绪同时梳理教训待内心平静后再自然接触新人；察觉对方忽冷忽热正视不合适的现实礼貌告别不纠缠不内耗",rl:"争吵后不愿复盘翻旧账加剧矛盾或假装和好积压不满；失恋后长期沉浸拒绝接触新人否定一切可能；明知不合适却不愿放手用回忆自我欺骗好感在犹豫中消散",uw:"从高压岗位调岗不急于出成绩先熟悉新流程融入新团队；原有业务亏损果断砍掉非核心项目聚焦有潜力的领域；收到与规划不符但薪资高的offer分析成长空间不被短期利益诱惑",rw:"换岗后怕出错不敢行动或怀念旧岗抵触新工作适应缓慢；亏损仍不愿放弃持续投入拒绝转型耗尽资源；为快速就业接受无成长的岗位短时间离职浪费时间"},
{n:7,name:"宝剑七 Seven of Swords",suit:"宝剑",el:"风",em:"⚔️",u:"走捷径、创意变通、暧昧套路、短期成功、侥幸心理",r:"投机败露、被揭穿、创意枯竭、尴尬羞愧、风险失控",ul:"面对长期冷战不硬讲道理借共同回忆打开沟通缺口温和表达需求；精准破冰观察心仪对象兴趣借组队活动自然接触聊对方擅长话题；适度主动察觉对方犹豫时用分享日常加轻量邀约传递心意保留自身节奏",rl:"算计消耗信任翻旧账挑弱点或用冷暴力逼妥协猜忌查手机；投机心态只看条件忽略三观用套路伪装相处后暴露被反感；过度掌控强迫秒回不尊重节奏用试探性冷战逼让步好感在压抑中消散",uw:"面对复杂项目拆解任务优先攻克关键环节借共同利益说服同事配合；资金有限轻资产合作避开强势领域聚焦细分需求差异化打开市场；精准定位研究目标岗位需求突出匹配经历准备针对性问题",rw:"为抢功劳篡改同事方案隐瞒失误或敷衍完成短期蒙混长期暴露能力不足；不做调研跟风投资或用违规手段追求短期利润被监管查处；简历夸大伪造证书面试追问细节露馅错失岗位被列入黑名单"},
{n:8,name:"宝剑八 Eight of Swords",suit:"宝剑",el:"风",em:"⚔️",u:"自我设限、迷茫无方向、他人评价束缚、原地打转、焦虑内耗",r:"摘下眼罩、找到出口、主动突破、困境缓解、自我觉醒",ul:"回避冲突怕吵架不敢聊核心问题明明在意却装无所谓自我怀疑；因过去失恋怕受伤拒绝相亲聚会看到好感者也不敢靠近困在安全区；怕表错情压抑心意对方主动约也找借口推脱反复复盘却不敢行动",rl:"盲目突破刚化解争吵就逼定婚期或擅自翻手机查岗越界让信任崩塌；为脱单硬参加所有聚会不看三观契合度相处没几天就逼自己喜欢；没看清心意就当众表白被拒后纠缠或突然释怀调整节奏重新接触",uw:"怕做不好不敢接有挑战的项目有想法也不敢在会议说觉得学历经验不够不敢争取晋升；想推新产品却怕亏损只空想失败后果不敢投入也不敢放弃；心仪岗位要求差一点就不敢投觉得肯定选不上",rw:"怕没前途裸辞跳槽没找好下家入职后发现差太远又失业；没做调研就跟风开干资金快速耗光；海投所有岗面试说不出为什么想做或认清优势补技能后精准投递"},
{n:9,name:"宝剑九 Nine of Swords",suit:"宝剑",el:"风",em:"⚔️",u:"噩梦失眠、精神内耗、自我折磨、回避真相、逼近的危机",r:"正视创伤、找到根源、开始疗愈、睡眠改善、理性面对",ul:"遭遇背叛长期忽视后情绪彻底崩溃对方想沟通就摔门躲用封闭回避真相；刚被断崖式分手痛苦爆发拒绝朋友陪伴关在房间刷伤感视频；表白被直白拒绝痛苦爆发回避适配度问题看到对方就低头躲",rl:"不再回避背叛真相一起分析忽视沟通缺失也反思自己没及时表达需求；不再归咎对方渣想是不是自己过度黏人主动约朋友聊失恋问题；被拒后不再自我否定坦然说祝你找到合适的人接受不合适的真相",uw:"负责项目彻底黄了被停职痛苦爆发却回避失误在家酗酒拒绝复盘会议；项目半年没盈利资金链要断却回避决策错误躲着合伙人不沟通；连续面试被拒都被说能力不足不再投递简历每天躺着刷手机",rw:"不再回避项目失败原因列核心失误找领导主动认错用行动补短板；不再回避亏损根源慢慢拉回盈利；不再回避技能短板主动学习更新简历投递适配度高的岗"},
{n:10,name:"宝剑十 Ten of Swords",suit:"宝剑",el:"风",em:"⚔️",u:"彻底终结、人生低谷、新生铺垫、以史为鉴、不破不立",r:"回光返照、反复纠缠、未彻底结束、挣扎求生、后遗症残留",ul:"知道三观不合长期冷暴力无法挽回不纠缠好聚好散分开后给自己清空期；彻底放下多年暗恋反复内耗的感情开始用清空姿态准备遇见新可能；明确对方无意后不追问主动说祝你找到更合适的人体面收尾",rl:"对方出轨坚决要分还哭求复合跟踪纠缠甚至威胁把自己逼到崩溃也让对方厌恶；多年暗恋没结果还保留对方所有动态每天刷拒绝所有追求者困在过去；对方说只当朋友还找借口约见面发暧昧消息陷入热情冷淡自我怀疑循环",uw:"项目停摆不抱怨主动整理资料给接手人向领导申请调岗用清空心态重启；线下店连续亏损不硬撑果断转让用剩余资金做线上轻资产项目从零铺垫；执着进大厂连续失败终于接受能力不匹配转向有成长空间的中型公司",rw:"项目被叫停还偷偷继续投入时间修改方案希望改变主意结果耽误新任务被批评降职；每月亏损还借钱囤货装修说再撑就会好最后连翻身本金都没留；非高薪不投明明经验不足面试屡败还不降预期错过黄金期待业在家"},
{n:11,name:"宝剑侍从 Page of Swords",suit:"宝剑",el:"风",em:"⚔️",u:"好奇好学、理性初显、敏捷应变、探索能力、信息接收",r:"冲动冒失、轻信盲从、半途而废、言语失度、焦虑内耗",ul:"一起发现新乐队立刻去听主动约咖啡馆聊新书不尬聊也不冒失表白；遇好感者主动分享但评估三观不被颜值迷惑用理性保留好奇心接近；对方忙时不天天发消息只说记得休息有空时再约拉近距离",rl:"一时兴起提换相处模式不顾对方习惯或轻信别人建议盲目模仿冷战考验让对方委屈；见人就主动搭话不看三观过度分享隐私新鲜感过了就冷淡；口无遮拦聊前任糗事让对方不适或故意忽冷忽热让人捉摸不透",uw:"遇到新任务新工具不怯步先查教程学基础再小步试错不懂就问前辈敏捷学习快速上手；有新想法不盲目投钱低成本试错每天记录用户反馈用好奇调整方向；看到感兴趣岗位先补基础技能简历突出学习力面试主动说愿意尝试新挑战",rw:"遇到新活立刻接不看自己是否会做项目没学透就干漏洞百出被批评；轻信某行业好赚钱不做调研就砸钱开干没特色很快亏损没耐心调整直接放弃；看到高薪岗就投不补技能面试夸夸其谈被问细节答不上"},
{n:12,name:"宝剑骑士 Knight of Swords",suit:"宝剑",el:"风",em:"⚔️",u:"果敢有魄力、理性清醒、高效务实、快速破局、精准执行",r:"冲动鲁莽、理性缺位、言语失度、过度透支、焦虑失衡",ul:"遇到分歧不纠结快速理清问题对症下药既追求速度也用热情带动对方一起解决；看到心仪对象敢主动靠近快速评估三观合适就果断推进不拖拉；观察到好感信号后快速行动但保留分寸用果敢加理性节奏让关系自然升温",rl:"冲动做事遇机会不管能不能做都抢没做过管理却硬接团队项目推进时不沟通不规划导致涣散延期；没做调研砸全部资金开分店客流惨淡不愿止损资金链断裂；看到高薪岗位就投不看适配入职后做不了立刻离职陷入循环",uw:"遇到跨部门项目紧急任务先分析自身优势如何匹配接了就定阶段目标抓核心节点果敢抓机破瓶颈；有新市场想法先做小范围试点用户调研发现问题果断止损不固执理性拓局控风险；瞄准有成长空间的岗位不眼高手低也不畏首畏尾用果敢态度打动面试官",rw:"遇到机会不管能不能做都抢没做过管理却硬接团队项目不沟通不规划导致涣散；没做调研砸全部资金开分店客流惨淡不愿止损资金链断裂；看到高薪就投不看适配入职后做不了立刻离职陷入循环"},
{n:13,name:"宝剑皇后 Queen of Swords",suit:"宝剑",el:"风",em:"⚔️",u:"清醒洞察、理性共情、边界清晰、精准掌控、非感性指引",r:"过度理性、锐利伤人、情绪压抑、冷漠失衡、焦虑内耗",ul:"理性引领稳感情下属遇挫折先肯定努力再帮拆解问题做决策兼顾目标和成员优势；不被条件表象迷惑用理性评估对方是否靠谱既敞开心扉也保持警惕；不急着确认关系用理性评估契合度观察对方行动而非言语让好感在证实中沉淀",rl:"过度严苛吹毛求疵只看结果不关心过程或决策偏执听不进不同意见导致延期；对追求者过度挑剔只看条件匹配忽略相处感受遇心动者也保持距离怕投入会受伤；过度试探频繁追问给对方施压或压抑心意装冷淡让人捉摸不透",uw:"下属遇挫折先肯定努力再帮拆解问题做团队决策兼顾项目目标和成员优势理性引领创佳绩；面对市场变化先分析数据找趋势再调整方向客户投诉先安抚再给方案不推诿；面试不空谈举曾帮团队优化流程解决难题的例子用理性智慧打动面试官",rw:"过度严苛吹毛求疵只看结果不关心过程或决策偏执听不进不同意见导致延期还怪团队；为降成本缩减售后客户反馈就推脱老客户流失或盲目扩张没调研就砸钱开分店；面试只讲我要什么不提能为公司创造什么被问规划答只想升职加薪面试官觉得功利"},
{n:14,name:"宝剑国王 King of Swords",suit:"宝剑",el:"风",em:"⚔️",u:"务实战略家、可靠领导者、高效决策者、全局稳健、理性责任",r:"过度保守、决策迟缓、责任逃避、视野狭隘、执行僵化",ul:"主动牵头聊购房育儿长期计划遇矛盾先控情绪再从长久角度找解法全局规划稳未来；带着找能共担长期目标的人标准社交遇好感者先聊规划价值观用全局视角筛选同频者；主动约聊职业发展未来定居地观察对方是否有长期共识适配就坦诚不合适就礼貌告别",rl:"不敢聊未来回避婚期买房等现实问题感情原地打转或决策反复定好旅行又取消让对方没安全感；对新社交方式抵触只在熟人圈打转遇好感者也不敢主动怕打破现状错失可能；迟迟不推进聊了半年还停在寒暄让对方觉得没诚意或决策摇摆一会说想进一步一会又疏远",uw:"做项目先定战略目标再拆分阶段任务全局把控创佳绩；拓展新业务前做市场调研测算回本周期先在老客户群试卖再决定是否量产稳健拓局；瞄准契合长期规划的岗位不只看短期薪资面试说希望成长为行业资深顾问",rw:"不敢尝试新方法一直用旧软件效率低也不愿学新工具或决策迟缓方案改了五版还不敢定错过最佳时机；怕风险不敢创新只卖老产品被竞品淘汰或突然冒进没调研砸钱开分店资金链断裂；只投稳定但无成长的岗重复做行政琐事学不到技能或拿到offer纠结薪资迟迟不入职最后被顶替"},
// === PENTACLES (14) ===
{n:1,name:"星币王牌 Ace of Pentacles",suit:"星币",el:"土",em:"💰",u:"进账馈赠、靠谱机会、现实安全感、可落地计划、承诺潜力",r:"破财浪费、机会错失、承诺缺失、现实条件不足、短视功利",ul:"不冲动闪婚或摆烂而是一起定短期小目标遇分歧先分析对根基是否有利再温和协商；不盲目相亲先夯实自身基础遇好感者先理性了解不急于投入；不冲动表白聊未来小计划确认适配度在理性了解中积累好感不盲目沦陷",rl:"刚在一起就谈婚论嫁忽略性格磨合或凭感觉花钱大手大脚不规划感情在冲动或敷衍中松动；为脱单天天相亲不提升自己遇好感就急着投入发现三观不合浪费时间；刚认识就表白施压或过度付出讨好不看对方态度",uw:"遇新项目调岗机会先分析是否匹配自身技能不贪快用扎实表现站稳新岗位；有新方向不冲动投钱启动资金只投核心环节确保试错成本可控；遇新行业新岗位机会不空想高薪先抓奠基机会",rw:"遇新活就抢不看自己能否做好接了又敷衍结果出错浪费了真正适合的机会；有想法就立刻投钱不做调研不控成本；看到新行业热门就投不补技能没offer或入职后做不了陷入循环"},
{n:2,name:"星币二 Two of Pentacles",suit:"星币",el:"土",em:"💰",u:"偏财机会、副业兼职、现实权衡、资源周转、左右逢源",r:"两头空、财务崩盘、感情露馅、投机失败、强颜欢笑",ul:"一边忙工作一边不忽视感情遇到陪家人还是陪伴侣的冲突提前商量不偏颇；想脱单但不盲目相亲不因找对象打乱自己节奏保持松弛感；对方忙时不天天发消息打扰有空时再约拉近距离",rl:"一头扎进工作几天不联系或过度黏人不让对方有私人空间遇冲突只考虑自己；为脱单每天相亲没时间提升自己压力大到抵触社交；对方忙时天天追问有空时又突然冷淡忽冷忽热让人捉摸不透",uw:"手上同时有两项工作先列优先级遇临时任务跟领导沟通保证现有任务质量不盲目接活；一边抓产品研发一边客户维护资金有限时留一部分做营销确保有产品也有销路；同时收到两个offer分析是否契合规划",rw:"活一多就东做一点西做一点遇临时任务不敢拒绝结果所有活都没做好；把所有钱投进研发不做营销产品做出来没人买或只抓短期订单不打磨质量；既想高薪又想稳定看到offer就接不看适配做一个月就扛不住辞职"},
{n:3,name:"星币三 Three of Pentacles",suit:"星币",el:"土",em:"💰",u:"分工协作、专业指导、学习进阶、隐性价值、踏实关系",r:"无效沟通、专业缺失、目标偏离、隐性价值错失、关系隐患",ul:"一起规划日常与未来存钱买房分工明确不起争执遇问题不独断一起看案例选方案；不孤立不迎合用靠谱吸引同频者不刻意讨好；一起做实际事拼乐高筹备聚会过程中观察对方好感在默契中升温",rl:"做事谁都不管或谁都要管规划未来各执己见不妥协分工混乱；参加活动总躲角落不主动交流别人邀组队找借口拒绝错失展现机会；一起做事要么大包大揽不尊重想法要么敷衍应付不投入好感在不被重视中消散",uw:"团队做项目策划定方案执行跑落地数据盯效果遇卡点时根据数据调整方向及时跟进协作攻坚；合伙人各司其职互补推进稳盈利；面试说之前做项目时负责数据整理配合同事优化方案入职后快速融入",rw:"团队做项目没人牵头策划不管执行执行不管数据遇问题互相推责项目延期；权责混乱都管又都不管新品上市前没控好成本上市后没盯销量；面试说习惯自己做不用配合入职后拒绝协作不跟同事同步进度"},
{n:4,name:"星币四 Four of Pentacles",suit:"星币",el:"土",em:"💰",u:"正财运、存款房产、保守稳定、安全感、占有欲",r:"破财、消费失控、稳定打破、被迫改变、安全感缺失",ul:"双方平衡守护与磨合不偏执旧模式也不冒然改变一起攒应急基金消费观不同就折中规划用务实维系稳定；不急于脱单降低标准也不封闭自我以踏实能共守生活为标准先稳自身再适度接触；不急躁表白也不冷漠拖延看对方是否靠谱适度分享节奏关系自然升温",rl:"过度守旧拒磨合或挥霍无度指责对方抠缺乏平衡感情在固执或浪费中降温；怕受伤封闭社交或焦虑将就只看表面难遇契合者极端守旧；过度防备查岗猜忌或盲目投入被辜负关系在极端中消散",uw:"深耕核心技能不冒进稳步提升保口碑不贪快求晋升守成成长平衡；先做好现有业务再规划扩张资金投核心环节不碰陌生领域守稳谋进；选稳定有成长的岗位突出务实态度不贪短期利益先固根基",rw:"守旧不学新技能被超越或冒进抢活做不好陷入停滞或失误循环；拒变被市场淘汰或盲目扩张断资金链项目倒闭极端守成崩盘；眼高手低追高薪却无能力或盲目接临时岗无积淀职业断档"},
{n:5,name:"星币五 Five of Pentacles",suit:"星币",el:"土",em:"💰",u:"物质困境、精神匮乏、双重挑战、困局显现、机会隐现",r:"困局松动、状态回升、希望重建、渐进改善、积极信心",ul:"双方懂得压力与感情的调和不互相指责也不独自硬扛用共担维系感情温度；不急于脱单而降低标准也不封闭拒绝机会以能共扛困难心态务实为择友核心先稳自己再适度接触；对方遇难题时不只用加油敷衍让关系在务实互动中自然升温",rl:"一方过度抱怨施压另一方逃避冷战或因钱压力极端争吵缺乏共担意识；因焦虑饥不择食只看条件或因怕添压力过度封闭始终难遇契合者；一聊困难未来就转移话题过度冷漠或过度依赖让对方扛压力",uw:"调和自保与成长不躺平也不盲目内卷用靠谱能扛保住机会不怨天尤人承压破局；调和生存与长远用精简控险稳步回血精简求生；不脱离现实空想高薪也不局限无成长岗优先选能学技能稳定过渡的工作先立足再谋发展",rw:"摆烂混日子或过度焦虑内耗怕被辞却不学技能工作敷衍还抱怨；借高利贷硬撑不砍亏损业务或彻底摆烂极端应对崩盘；眼高手低只投高薪岗没能力或盲目海投临时岗干几天就辞目标割裂碰壁"},
{n:6,name:"星币六 Six of Pentacles",suit:"星币",el:"土",em:"💰",u:"双向付出、利益对等、阶级差异下的联结、平衡给予与索取",r:"失衡消耗、欺骗性索取、利益失衡、单向拉扯、价值错位",ul:"平衡给予与索取不单方面牺牲消费观不同就协商折中不强迫对方妥协双向付出；以尊重对等能互相滋养为标准不攀附条件也不委屈将就靠真实状态吸引同频者；你约我吃饭我回请喝咖啡你分享日常我认真回应不冷不热不越界好感在你来我往中沉淀",rl:"一方一味付出包揽家务牺牲事业另一方理所当然或一方过度索取不考虑对方压力关系满是怨怼；图对方条件委屈讨好或等别人无条件付出不愿提升遇到的人要么看不上你要么你看不上；你天天主动发消息邀约对方敷衍回应或对方只享受你的好不回请你在患得患失中疲惫放弃",uw:"平衡个人成长与团队共赢做项目按贡献分任务成果共享不抢功不推责互利协作；和合伙人按投入分利益按能力担责任决策沟通充分盈利优先补团队福利资源对等；不盲目要高薪先看自己能为公司创造什么凭能力匹配岗位不空想价值适配",rw:"领导抢下属功劳或老员工推活给新人多干少得少干多得大家没干劲任务拖延成果敷衍；合伙人投入少却想多占股或只拿分红不担责决策一人独断客户流失资金亏损；没经验却要高薪或有能力却选低价值岗入职后适配差快速离职价值错位"},
{n:7,name:"星币七 Seven of Pentacles",suit:"星币",el:"土",em:"💰",u:"耐心沉稳、复盘沉淀、长远规划、现实落地、评估与改进",r:"急躁冒进、逃避反思、焦虑迷茫、拔苗助长、成果流失",ul:"一起走过一段日子后坐下来聊更深入的问题根据复盘调整比如以后有矛盾不冷战当天说开；不盲目相亲复盘之前相处问题先专注提升自己遇有好感的人也先慢慢了解不急于推进；相处一段时间后不凭感觉拉扯理性想对方是否契合自己评估心意确定节奏",rl:"刚在一起就逼谈婚论嫁或总纠结对方爱不爱我用查手机逼承诺找安全感不愿花时间磨合；为快速脱单天天相亲不看三观只看条件相处没几天就逼自己喜欢发现不合适急求结果；既不评估心意也不明确节奏过度试探让对方猜不透好感在不清不楚中慢慢消散",uw:"平衡任务完成与能力成长做完项目梳理优势漏洞学沟通技巧补短板不混日子复盘工作谋提升；兼顾销量与产品优化小众款卖得好就加产滞销款减库存不硬撑评估数据调方向；明确卡壳问题补行业知识练表达不海投精准适配复盘面试补短板",rw:"刚入职就抢活表现不练技能做项目只图快不重质没成果就抱怨影响口碑急求晋升；产品刚有销量就开分店加生产线不评估资金供应链最后资金链断盲目扩张；不明确职业目标海投岗位接不对口offer入职即想辞盲投乱试"},
{n:8,name:"星币八 Eight of Pentacles",suit:"星币",el:"土",em:"💰",u:"专业深耕、专注行动、价值显化、职业精进、手工艺人精神",r:"三心二意、急功近利、成果幻灭、疲劳过度、能力被质疑",ul:"真正投入去理解对方为共同目标一起努力在磨合中越来越契合；不为脱单而焦虑专注把自己生活过好吸引志同道合的人；不浮于表面花时间深入了解对方观察态度好感在深入互动中沉淀",rl:"沉迷手机不理对方各自忙各自的表面陪伴心不在焉让对方觉得被冷落；为快速脱单降低标准盲目投入甚至伪装自己最后发现不合适；对这个有好感又被另一个吸引脚踏两只船或热度快速消退让对方失望",uw:"接到任务先理清思路系统推进遇卡点查资料请教专家不怕麻烦完成度高口碑好；不追求快速扩张把产品服务打磨到极致积累口碑建立品牌；不跳槽在岗位上深度学习积累专业能力为发展做好准备",rw:"接任务敷衍做不钻研遇难点就推给别人质量差被批评；只追求销量不打磨产品不控质量快速收钱但投诉多口碑差；3个月觉得没成长就跳槽频繁换工作职业履历混乱无专业深度"},
{n:9,name:"星币九 Nine of Pentacles",suit:"星币",el:"土",em:"💰",u:"物质丰盛、独立自足、现实满足、品质生活",r:"物质失落、过度奢侈、享乐陷阱、浮躁不安、价值迷茫",ul:"既拥有经济独立也珍惜陪伴时间不因物质忽视感情不因陪伴放弃事业；不急于脱单先让自己经济独立生活充实吸引到的对象质量更高；不因缺爱降低标准攀附条件用独立自信吸引同频者",rl:"因金钱分配争执或一方经济依赖导致失去话语权感情失去平衡；用购物奢侈品填补情感空缺最后物质没了孤独感更强；被对方条件外貌吸引忽视内在三观最后发现不合适已投入太多",uw:"完全靠自己能力赚钱不依赖他人有安全感和自由度独立贡献稳收入；产品销售好现金流稳定不需要依赖融资能自主决策财务独立稳发展；凭专业能力被认可获得稳定收入有底气选择好的工作机会",rw:"靠拍领导马屁升职没真本事或依赖同事完成任务无独立性；产品滞销销售差财务困难需要外部支持失去独立性；找不到好工作被迫接受低薪岗无成长岗失去职业自主权"},
{n:10,name:"星币十 Ten of Pentacles",suit:"星币",el:"土",em:"💰",u:"物质圆满、家族传承、世俗展现、财富积累、代际传承",r:"财富分裂、家族纠纷、遗产纠纷、传承困境、物质消散",ul:"一起攒钱买房养老规划为未来世代打好基础感情在共同建设中更稳固；经济独立家庭和睦的人更吸引优质对象用家族圆满吸引同频者；聊未来家庭规划养老计划看对方是否有相同的家族价值观",rl:"为家产分配争执或家族成员介入导致矛盾感情在物质纠纷中破裂；物质条件好但人品差或与家族关系紧张不知道要不要继续；只看对方家庭条件家产忽视感受最后发现三观不合",uw:"事业上有稳定积累同时照顾好家庭形成良性循环事业家庭齐发展；把企业做大做强为子女留下资产实现家族财富传承；找到稳定工作有养老金和福利为家族长期财富考虑",rw:"因家庭琐事影响工作或被家族期待束缚难以专注事业；创办人去世后子女为企业走向争执或不愿继承导致企业衰落；只看短期薪资不考虑养老福利后来后悔"},
{n:11,name:"星币侍从 Page of Pentacles",suit:"星币",el:"土",em:"💰",u:"务实探索、灵动成长、学习态度、初心者精神、现实导向",r:"懒惰拖延、消极被动、学习困难、执行力弱、缺乏主动",ul:"一起参加兴趣班读书分享在共同成长中增进感情；不伪装展现学习态度成长潜力吸引欣赏你的人；一起参加课程讲座学习新技能好感在实际互动中沉淀",rl:"一方躺平不愿成长或因学习工作冷落对方感情在倦怠中消散；等着别人来追不主动参加社交和学习错过遇见的机会；对关系应付说好的约会临时取消让对方觉得不重视",uw:"积极参加培训学习新技能主管乐意培养提拔学习型员工受器重；虽然经验不足但学习态度好执行力强快速成长初心投入；面试说想学新技能入职后积极学习快速上手谦虚态度获机会",rw:"学新东西时拖延做任务敷衍领导逐渐不重用懒惰消极被放弃；计划很好但执行不力拖延严重最后项目夭折；等着公司来招聘不主动学习入职后被动执行"},
{n:12,name:"星币骑士 Knight of Pentacles",suit:"星币",el:"土",em:"💰",u:"稳健务实、长线行动、可靠执行、踏实奋进、现实成效",r:"保守停滞、行动缓慢、机会错失、完美主义、效率低下",ul:"说到做到不浮夸一起规划生活存钱买房制定旅行计划感情在实际行动中更稳固；找对象看重稳定性执行力不被花言巧语迷惑踏实择偶不浮躁；不只说漂亮话用实际行动表达按时赴约送贴心礼物",rl:"感情推进太慢拖延确认关系或拖延婚期让对方失去耐心；完美主义对对象要求高导致一直单身或错过合适的人；推进太慢对方感觉不到诚心好感在等待中消散",uw:"接到任务能稳步推进不急不躁最后高质量完成获领导认可稳健执行；不急于扩张而是稳步发展积累客户建立口碑长线规划；在岗位上扎根深入积累经验获得晋升踏实工作促晋升",rw:"做项目拖延决策迟缓导致错过最佳时机被同事超越行动缓慢失效率；看到好的扩张机会犹豫不决最后被竞品抢先保守错失机会；要求太高迟迟不选岗位或虽然入职也频繁想换工作"},
{n:13,name:"星币皇后 Queen of Pentacles",suit:"星币",el:"土",em:"💰",u:"务实滋养、价值创造、守护者、现实关怀、物质充盈的温暖",r:"操控物质、过度付出、忽视自我、焦虑掌控、平衡失缺",ul:"不只物质上照顾家人也在情感上关怀把家打理得温暖舒适用心经营家庭；自己有事业有生活品质吸引有品味有责任感的对象独立成熟；记住对方喜好送贴心礼物体贴照顾好感在被照顾中升温",rl:"为维持家庭过度牺牲失去自己或因付出过多对另一半有怨言过度付出失自我；总是为物质条件操心不敢谈恋爱或用物质衡量一切物质焦虑束缚；用物质讨好对方或对对方选择过度干涉让对方觉得被控制",uw:"既能处理好工作也能照顾家庭平衡两者成为职场和家庭的支柱职业女性获认可；产品服务有温度用心对待客户建立口碑和忠诚度创建有温度的品牌；找到既能发展事业又能照顾家庭的工作职业稳定家庭兼顾",rw:"过度埋头工作忽视家庭或过度照顾家庭放弃事业过度投入失平衡；对员工客户过度控制导致团队没有活力客户不满过度操控陷困境；为照顾家庭放弃职业发展导致职业断档被家庭束缚失事业"},
{n:14,name:"星币国王 King of Pentacles",suit:"星币",el:"土",em:"💰",u:"权威掌控、价值传承、商业头脑、现实成功、物质保障",r:"专制固执、过度贪婪、信任缺失、失衡控制、传承困难",ul:"经济独立有远见规划未来用稳定和承诺维系感情稳定可靠给安全感；有事业成就能给对方物质保障更吸引优质对象成熟事业心；不急于确认关系用实际承诺和行动表达让对方感受到诚心慢条斯理稳推进",rl:"过度掌控对方或对对方要求过高感情在压制中窒息权威过度伤感情；只追求物质条件或过度掌控对方最后没人想和你相处贪财短视；总是猜忌对方检查隐私最后导致对方反感不信任崩信任",uw:"经营手段高明公正决策团队服从且敬重领导地位受拥护；有远见的商业决策稳健扩张最后成为行业领头人商业帝国创建者；有相关高管经验能带领团队获得高位职位",rw:"决策独断听不进建议或对下属要求过高导致团队反弹专制决策树敌；过度扩张盲目投资或过度榨取员工客户最后失去信任贪心导致亏损；虽升到高位但因专制不信任下属导致团队涣散领导力缺失"},

function selectTopic(topic, el) {
  currentTopic = topic;
  document.querySelectorAll("#topicTabs .tab").forEach(t => t.classList.remove("active"));
  el.classList.add("active");
}

// ============ MEDITATION ============
function startMeditation() {
  showScreen("meditation");
  const texts = ["请闭上眼睛，深呼吸三次...", "让心静下来，专注于你的问题...", "放下杂念，感受内心的声音...","当你准备好了，点击下方按钮。"];
  const el = document.getElementById("meditationText");
  const btn = document.getElementById("meditationBtn");
  el.textContent = "";
  btn.style.display = "none";
  let i = 0;
  function next() {
    if (i < texts.length) {
      el.textContent = texts[i];
      i++;
      setTimeout(next, 1500);
    } else {
      btn.style.display = "block";
    }
  }
  next();
}

// ============ SHUFFLE & DRAW ============
function startShuffle() {
  const overlay = document.getElementById("shuffleOverlay");
  overlay.classList.add("active");
  setTimeout(() => {
    overlay.classList.remove("active");
    drawCards();
  }, 2000);
}

function drawCards() {
  const shuffled = [...DECK].sort(() => Math.random() - 0.5);
  drawnCards = [];
  flippedCount = 0;
  for (let i = 0; i < currentSpread.count; i++) {
    drawnCards.push({
      card: shuffled[i],
      reversed: Math.random() < 0.5,
      position: currentSpread.positions[i]
    });
  }
  renderReading();
  showScreen("reading");
}

// ============ RENDER READING ============
function renderReading() {
  const q = document.getElementById("questionField").value.trim();
  document.getElementById("readingTitle").textContent = currentSpread.name;
  document.getElementById("readingQuestion").textContent = q ? "问题：" + q : "";
  
  const container = document.getElementById("readingCards");
  container.innerHTML = "";
  drawnCards.forEach((d, i) => {
    const div = document.createElement("div");
    div.className = "tarot-card" + (d.reversed ? " reversed" : "");
    div.setAttribute("data-suit", d.card.suit);
    div.innerHTML = `
      <div class="tarot-card-inner">
        <div class="tarot-card-back"></div>
        <div class="tarot-card-front">
          <div style="font-size:10px;color:var(--text2);letter-spacing:1px">${d.position}</div>
          <div class="emoji">${d.card.em}</div>
          <div class="name">${d.card.name.split(" ")[0]}</div>
          <div class="orient">${d.reversed ? "逆位 ↓" : "正位 ↑"}</div>
        </div>
      </div>`;
    div.onclick = () => flipCard(div, i);
    container.appendChild(div);
  });
  
  document.getElementById("readingResults").innerHTML = "";
  document.getElementById("readingAdvice").innerHTML = "";
}

function flipCard(el, index) {
  if (el.classList.contains("flipped")) return;
  el.classList.add("flipped");
  flippedCount++;
  
  const d = drawnCards[index];
  const c = d.card;
  const rev = d.reversed;
  const t = currentTopic;
  
  let keywords = rev ? c.r : c.u;
  let detail;
  if (t === "love") detail = rev ? c.rl : c.ul;
  else if (t === "work") detail = rev ? c.rw : c.uw;
  else detail = rev ? c.r : c.u;

  const astroInfo = c.astro ? ` | ${c.astro}` : "";
  const html = `
    <div class="result-card">
      <div class="position-label">[ ${d.position} ]</div>
      <h3>${c.em} ${c.name} ${rev ? "(逆位)" : "(正位)"}</h3>
      <div style="font-size:12px;color:var(--text2)">元素：${c.el} | 牌组：${c.suit}${astroInfo}</div>
      <div class="keywords">关键词：${keywords}</div>
      <div class="detail">${detail}</div>
    </div>`;
  document.getElementById("readingResults").innerHTML += html;
  
  if (flippedCount === drawnCards.length) {
    showAdvice();
  }
}

function getCardMeaning(card, reversed, topic) {
  if (topic === "love") return reversed ? card.rl : card.ul;
  if (topic === "work") return reversed ? card.rw : card.uw;
  return reversed ? card.r : card.u;
}

// 检测问题类型
function detectQuestionType(q) {
  if (!q) return "general";
  const loveWords = ["喜欢","爱","心动","在一起","复合","分手","暧昧","对象","恋","感情","他","她","前任","脱单","结婚","表白","追","撩","约会","冷战","吵架","出轨","第三者","备胎","暗恋","单身"];
  const workWords = ["工作","辞职","跳槽","升职","加薪","面试","offer","创业","项目","老板","同事","事业","转行","裁员","绩效","领导","职场","考试","学业","考研","留学"];
  const choiceWords = ["该不该","要不要","选","还是","应不应该","值不值得","好不好","合不合适","能不能"];
  const feelingWords = ["喜欢我","爱我","想我","在意我","心里有我","对我","怎么看我","什么感觉","什么态度","有没有感情"];
  const futureWords = ["会不会","能不能","有没有","可不可以","还会","将来","未来","以后","结果","前途","前景","机会"];

  if (feelingWords.some(w => q.includes(w))) return "feeling";
  if (choiceWords.some(w => q.includes(w))) return "choice";
  if (futureWords.some(w => q.includes(w))) return "future";
  if (loveWords.some(w => q.includes(w))) return "love";
  if (workWords.some(w => q.includes(w))) return "work";
  return "general";
}

// 根据问题类型+牌面生成针对性趋势解读
function generateVerdict(qType, cards, topic) {
  const last = cards[cards.length - 1];
  const lc = last.card;
  const lr = last.reversed;
  const cardName = lc.name.split(" ")[0];
  const meaning = getCardMeaning(lc, lr, topic);
  const shortMeaning = meaning.split("；")[0].split("，")[0];
  const revCount = cards.filter(d => d.reversed).length;
  const total = cards.length;
  const positiveRatio = (total - revCount) / total;

  // 元素能量
  const suitEnergy = {"权杖":"热情与行动","圣杯":"情感与直觉","宝剑":"思考与沟通","星币":"务实与稳定","大阿卡纳":"人生重大课题"};
  const energy = suitEnergy[lc.suit] || "综合能量";

  let verdict = "", emoji = "", color = "";

  if (qType === "feeling") {
    // 问对方感觉/喜不喜欢
    if (lc.suit === "圣杯" && !lr) { verdict = `牌面显示对方内心确实有情感，${cardName}正位代表${shortMeaning}——这份感情是真实的`; emoji = "💗"; color = "#e080a0"; }
    else if (lc.suit === "圣杯" && lr) { verdict = `对方内心有感觉，但情感表达受阻，${cardName}逆位提示${shortMeaning}——不是没有感情，而是还没准备好或者在压抑`; emoji = "💭"; color = "#a0a0c0"; }
    else if (lc.suit === "权杖" && !lr) { verdict = `对方对你有明确的热情和兴趣，${cardName}正位代表${shortMeaning}——不只是心动，还有行动上的积极`; emoji = "🔥"; color = "#e0a040"; }
    else if (lc.suit === "权杖" && lr) { verdict = `对方可能有心动，但热情不够强烈或正在消退，${cardName}逆位提示${shortMeaning}——喜欢但缺乏主动追求的行动力`; emoji = "🌙"; color = "#a0a0c0"; }
    else if (lc.suit === "宝剑" && !lr) { verdict = `对方在理性地思考你们之间的关系，${cardName}正位代表${shortMeaning}——有在认真考虑，但更多是用头脑而不是心在衡量`; emoji = "🧊"; color = "#90a8d0"; }
    else if (lc.suit === "宝剑" && lr) { verdict = `对方内心有纠结甚至在回避这个问题，${cardName}逆位提示${shortMeaning}——不是不在意，而是还没理清自己的想法`; emoji = "🌫️"; color = "#a0a0c0"; }
    else if (lc.suit === "星币" && !lr) { verdict = `对方在意你，但更关注现实层面的匹配度，${cardName}正位代表${shortMeaning}——感情有但会先考虑现实条件是否合适`; emoji = "🌿"; color = "#50b080"; }
    else if (lc.suit === "星币" && lr) { verdict = `对方对你有好感但被现实问题困住了，${cardName}逆位提示${shortMeaning}——不是不喜欢，而是现实顾虑让TA犹豫不前`; emoji = "⚠️"; color = "#e0a040"; }
    else if (!lr) { verdict = `${cardName}正位揭示：${shortMeaning}——这是一个重要的信号，结合你们的实际互动来理解`; emoji = "✨"; color = "#d4a843"; }
    else { verdict = `${cardName}逆位提示：${shortMeaning}——对方的态度可能需要时间或契机才能转变`; emoji = "🌙"; color = "#a0a0c0"; }
  } else if (qType === "choice") {
    // 问该不该/要不要
    if (positiveRatio >= 0.7) { verdict = `牌面整体偏向支持行动。${cardName}${lr?"逆位":"正位"}提示：${shortMeaning}——但最终决定权在你自己`; emoji = "🌟"; color = "#50d080"; }
    else if (positiveRatio >= 0.4) { verdict = `牌面显示这个选择有利有弊，不是简单的该或不该。${cardName}${lr?"逆位":"正位"}提示：${shortMeaning}——建议权衡后再做决定`; emoji = "⚖️"; color = "#e0c040"; }
    else { verdict = `牌面提示当前时机可能不够成熟。${cardName}${lr?"逆位":"正位"}提示：${shortMeaning}——不代表永远不行，而是现在可能需要调整或等待`; emoji = "⏳"; color = "#e0a040"; }
  } else if (qType === "future") {
    // 问会不会/能不能
    if (positiveRatio >= 0.7) { verdict = `按当前趋势发展，可能性较大。${cardName}${lr?"逆位":"正位"}指向：${shortMeaning}——记住未来不是定论，你的行动会影响结果`; emoji = "🌟"; color = "#50d080"; }
    else if (positiveRatio >= 0.4) { verdict = `存在可能性，但过程中会有波折。${cardName}${lr?"逆位":"正位"}指向：${shortMeaning}——需要你主动应对中间的挑战`; emoji = "🔅"; color = "#e0c040"; }
    else { verdict = `按当前趋势，会有阻碍需要面对。${cardName}${lr?"逆位":"正位"}指向：${shortMeaning}——这不是终点，而是提示你需要换个方式`; emoji = "🔄"; color = "#e0a040"; }
  } else {
    // 一般问题
    if (positiveRatio >= 0.7) { verdict = `整体趋势积极。${cardName}${lr?"逆位":"正位"}的核心信息：${shortMeaning}`; emoji = "🌟"; color = "#50d080"; }
    else if (positiveRatio >= 0.4) { verdict = `趋势中有机遇也有挑战。${cardName}${lr?"逆位":"正位"}提示：${shortMeaning}`; emoji = "🔅"; color = "#e0c040"; }
    else { verdict = `当前趋势提示需要调整。${cardName}${lr?"逆位":"正位"}提示：${shortMeaning}——这是改变方向的信号`; emoji = "🔄"; color = "#e0a040"; }
  }
  return { verdict, emoji, color };
}

function showAdvice() {
  const q = document.getElementById("questionField").value.trim();
  const t = currentTopic;
  const revCount = drawnCards.filter(d => d.reversed).length;
  const total = drawnCards.length;
  const qType = detectQuestionType(q);

  // === 1. 生成针对性趋势判断 ===
  const { verdict, emoji: verdictEmoji, color: verdictColor } = generateVerdict(qType, drawnCards, t);

  // === 2. 能量判断 ===
  let energy;
  if (revCount === 0) energy = "所有牌正位，整体能量非常积极";
  else if (revCount === total) energy = "全部逆位，强烈提示需要暂停反思";
  else if (revCount > total/2) energy = "逆位偏多，部分方面需要调整";
  else energy = "正位为主，整体趋势向好";

  // === 3. 花色+元素深度分析 ===
  const els = {};
  const suits = {};
  drawnCards.forEach(d => {
    els[d.card.el] = (els[d.card.el]||0) + 1;
    suits[d.card.suit] = (suits[d.card.suit]||0) + 1;
  });
  const dominant = Object.keys(els).sort((a,b) => els[b]-els[a])[0];
  const elDetail = {
    "火": "行动力和热情是关键——需要大胆去做",
    "水": "情感和直觉是关键——倾听内心的声音",
    "风": "沟通和思考是重点——理清思路好好沟通",
    "土": "现实条件和稳定性是核心——脚踏实地"
  };
  const elHint = elDetail[dominant] || "涉及重要的人生课题";

  // 花色缺失分析（牌阵参考书方法）
  let suitAnalysis = "";
  if (total >= 3) {
    const allElements = ["火","水","风","土"];
    const missing = allElements.filter(e => !els[e]);
    if (missing.length > 0) {
      const missingMap = {"火":"缺少火元素——行动力和热情不足，可能需要更主动","水":"缺少水元素——情感联结较弱，可能忽视了内心真实感受","风":"缺少风元素——沟通和理性思考不够，可能需要多交流","土":"缺少土元素——现实基础不稳，可能过于理想化忽视实际"};
      suitAnalysis = missing.map(m => missingMap[m]).join("；");
    }
    // 同花色多张牌分析
    const suitNames = {"权杖":"权杖(行动)","圣杯":"圣杯(情感)","宝剑":"宝剑(思维)","星币":"星币(物质)","大阿卡纳":"大阿卡纳(命运)"};
    const dominantSuit = Object.keys(suits).sort((a,b) => suits[b]-suits[a])[0];
    if (suits[dominantSuit] >= 2 && total >= 3) {
      const suitEmphasis = {"权杖":"多张权杖牌出现，强调行动和热情的能量，事情需要靠主动出击来推进","圣杯":"多张圣杯牌出现，情感是这个问题的核心，需要关注内心感受和关系","宝剑":"多张宝剑牌出现，思维和沟通是关键，可能存在需要理清的矛盾或困惑","星币":"多张星币牌出现，现实条件和物质基础是重点，需要务实面对","大阿卡纳":"多张大阿卡纳出现，这个问题涉及人生重要课题，影响深远"};
      if (suitEmphasis[dominantSuit]) {
        suitAnalysis = (suitAnalysis ? suitAnalysis + "。\n" : "") + suitEmphasis[dominantSuit];
      }
    }
  }

  // === 4. 根据牌阵+问题讲故事 ===
  let story = "";
  const qLabel = q ? `关于「${q}」，` : "";

  if (total === 1) {
    const d = drawnCards[0];
    const m = getCardMeaning(d.card, d.reversed, t);
    story = `${qLabel}${d.card.em} ${d.card.name.split(" ")[0]}${d.reversed?"(逆位)":"(正位)"}揭示的核心信息：\n\n${m}\n\n这张牌反映的是当前的能量状态和趋势方向，不是简单的是或否。请结合你的实际处境来理解这张牌想告诉你的。`;
  } else if (total === 3) {
    const [past, now, future] = drawnCards;
    const pm = getCardMeaning(past.card, past.reversed, t);
    const nm = getCardMeaning(now.card, now.reversed, t);
    const fm = getCardMeaning(future.card, future.reversed, t);
    story = `${qLabel}三张牌串联起一条完整的故事线：\n\n`
      + `【过去·根源】${past.card.name.split(" ")[0]}${past.reversed?"(逆)":""}：${pm.split("；")[0]}\n\n`
      + `【现在·核心】${now.card.name.split(" ")[0]}${now.reversed?"(逆)":""}：${nm.split("；")[0]}\n\n`
      + `【未来·趋势】${future.card.name.split(" ")[0]}${future.reversed?"(逆)":""}：${fm}\n\n`
      + `过去的影响塑造了现在的状态，而未来牌指出的是按当前趋势的走向——你的行动可以改变它。`;
  } else if (total === 5) {
    const [you, them, challenge, suggest, outcome] = drawnCards;
    story = `${qLabel}五张牌从多角度揭示关系全貌：\n\n`
      + `【你的状态】${you.card.name.split(" ")[0]}${you.reversed?"(逆)":""}：${getCardMeaning(you.card, you.reversed, t).split("；")[0]}\n\n`
      + `【对方状态】${them.card.name.split(" ")[0]}${them.reversed?"(逆)":""}：${getCardMeaning(them.card, them.reversed, t).split("；")[0]}\n\n`
      + `【核心挑战】${challenge.card.name.split(" ")[0]}${challenge.reversed?"(逆)":""}：${getCardMeaning(challenge.card, challenge.reversed, t).split("；")[0]}\n\n`
      + `【行动建议】${suggest.card.name.split(" ")[0]}${suggest.reversed?"(逆)":""}：${getCardMeaning(suggest.card, suggest.reversed, t).split("；")[0]}\n\n`
      + `【走向趋势】${outcome.card.name.split(" ")[0]}${outcome.reversed?"(逆)":""}：${getCardMeaning(outcome.card, outcome.reversed, t)}\n\n`
      + `关系中双方的状态决定了挑战的本质，而建议牌指出了破局方向。`;
  } else {
    drawnCards.forEach(d => {
      const m = getCardMeaning(d.card, d.reversed, t).split("；")[0];
      story += `【${d.position}】${d.card.name.split(" ")[0]}${d.reversed?"(逆)":""}：${m}\n\n`;
    });
    const last = drawnCards[drawnCards.length - 1];
    const lastM = getCardMeaning(last.card, last.reversed, t);
    story += `最终结果 ${last.card.name.split(" ")[0]} 的完整指引：${lastM}\n\n`;
    story += `十张牌层层递进，最终结果牌是当前趋势的指引，选择权始终在你手中。`;
  }

  // === 5. 组合输出 ===
  let html = `<div class="advice-box">`;

  // 趋势判断
  html += `<div style="text-align:center;margin-bottom:16px">`;
  if (q) html += `<div style="font-size:14px;color:var(--text2);margin-bottom:8px">关于「${q}」</div>`;
  html += `<div style="font-size:36px;margin:8px 0">${verdictEmoji}</div>
    <div style="font-size:15px;color:${verdictColor};line-height:1.8;padding:0 10px">${verdict}</div>
  </div>
  <hr style="border:none;border-top:1px solid rgba(212,168,67,0.2);margin:14px 0">`;

  // 牌阵解读指南
  let spreadGuide = "";
  if (total === 1) {
    spreadGuide = "单牌揭示的是问题的核心能量与趋势方向。它像一面镜子，照见你内心深处已有的答案。正位不一定代表「是」，逆位不一定代表「否」——要看牌义和你的问题之间的关系。";
  } else if (total === 3) {
    spreadGuide = "三张牌构成一条故事线：过去揭示根源，现在反映核心状态，未来指出趋势走向。未来不是定论，你的行动可以改变它。";
  } else if (total === 5) {
    spreadGuide = "五张牌从多角度揭示关系全貌：双方状态揭示内心，挑战牌指出最需面对的问题，建议牌给出行动方向，结果牌是当前趋势而非命运。";
  } else {
    spreadGuide = "十张牌层层递进：现状与挑战揭示核心矛盾，潜意识和过去揭示深层原因，希望与恐惧揭示内心真实渴望，最终结果是趋势指引。";
  }
  html += `<h3 style="color:var(--gold);margin-bottom:8px;font-size:14px">🧭 牌阵解读原理</h3>
    <p style="text-align:left;line-height:1.8;font-size:13px;color:var(--text2);margin-bottom:12px">${spreadGuide}</p>
    <hr style="border:none;border-top:1px solid rgba(212,168,67,0.2);margin:14px 0">`;

  // 牌面故事解读
  html += `<h3 style="color:var(--gold);margin-bottom:10px;font-size:15px">📖 牌面解读</h3>
    <p style="text-align:left;line-height:1.9;font-size:14px;margin-bottom:12px">${story.replace(/\n/g,"<br>")}</p>
    <hr style="border:none;border-top:1px solid rgba(212,168,67,0.2);margin:14px 0">`;

  // 能量和元素
  html += `<h3 style="color:var(--gold);margin-bottom:8px;font-size:14px">🔮 能量分析</h3>
    <p style="font-size:13px;margin-bottom:8px">${energy}。${elHint}。</p>`;

  // 花色深度分析
  if (suitAnalysis) {
    html += `<p style="font-size:13px;color:var(--text2);line-height:1.8;margin-bottom:8px">${suitAnalysis}。</p>`;
  }

  // 占星提示（如果有大阿卡纳牌）
  const majorCards = drawnCards.filter(d => d.card.astro);
  if (majorCards.length > 0) {
    const astroHints = majorCards.map(d => `${d.card.name.split(" ")[0]}对应${d.card.astro}`).join("，");
    html += `<p style="font-size:12px;color:var(--text2);margin-top:6px">占星对应：${astroHints}</p>`;
  }

  html += `<hr style="border:none;border-top:1px solid rgba(212,168,67,0.2);margin:14px 0">`;

  html += `<p style="font-style:italic;font-size:12px;color:var(--text2);line-height:1.8">
      解牌原则：不铁口直断，不替人做决定。<br>
      塔罗仅提供趋势，选择权在你自己。<br>
      即使结果不理想，也会指出改变的方向。
    </p>
  </div>`;

  document.getElementById("readingAdvice").innerHTML = html;
}

// ============ BROWSE ============
function filterCards(suit, el) {
  if (el) {
    document.querySelectorAll("#browseTabs .tab").forEach(t => t.classList.remove("active"));
    el.classList.add("active");
  }
  const grid = document.getElementById("cardsGrid");
  const cards = suit === "全部" ? DECK : DECK.filter(c => c.suit === suit);
  grid.innerHTML = cards.map(c => `
    <div class="card-item" onclick="showCardDetail(${DECK.indexOf(c)})">
      <div class="emoji">${c.em}</div>
      <div class="name">${c.name.split(" ")[0]}</div>
      <div style="font-size:11px;color:var(--text2)">${c.el}元素</div>
    </div>`).join("");
}

function showCardDetail(idx) {
  const c = DECK[idx];
  document.getElementById("modalContent").innerHTML = `
    <div class="emoji">${c.em}</div>
    <h2>${c.name}</h2>
    <div style="text-align:center;color:var(--text2);font-size:13px;margin-bottom:16px">
      ${c.suit} | ${c.el}元素 | #${c.n}${c.astro ? " | "+c.astro : ""}
    </div>
    <div class="modal-section"><h4>正位关键词</h4><p>${c.u}</p></div>
    <div class="modal-section"><h4>逆位关键词</h4><p>${c.r}</p></div>
    <div class="modal-section"><h4>💕 感情 · 正位</h4><p>${c.ul}</p></div>
    <div class="modal-section"><h4>💕 感情 · 逆位</h4><p>${c.rl}</p></div>
    <div class="modal-section"><h4>💼 事业 · 正位</h4><p>${c.uw}</p></div>
    <div class="modal-section"><h4>💼 事业 · 逆位</h4><p>${c.rw}</p></div>`;
  document.getElementById("cardModal").classList.add("active");
}

function closeModal() {
  document.getElementById("cardModal").classList.remove("active");
}

// ============ TIPS ============
function showTips() {
  showScreen("tips");
  const shuffled = [...TIPS].sort(() => Math.random() - 0.5).slice(0, 3);
  document.getElementById("tipsContent").innerHTML = shuffled.map((t,i) =>
    `<div class="tip-box">${i+1}. ${t}</div>`
  ).join("");
}

// ============ INIT ============
filterCards("全部");
</script>
