<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>占卜系统</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, "PingFang SC", "Hiragino Sans GB", sans-serif;
  background: #0a0a1e;
  color: #e0e0f0;
  min-height: 100vh;
  position: relative;
}
body::before {
  content: "";
  position: fixed; inset: 0;
  background: url('bg.jpeg') center center / cover no-repeat;
  opacity: 0.15; z-index: -1;
}
.container { max-width: 640px; margin: 0 auto; padding: 20px; }
h1 { color: #d4a843; font-size: 32px; letter-spacing: 6px; text-shadow: 0 0 20px rgba(212,168,67,0.4); }
h2 { color: #d4a843; font-size: 20px; margin-bottom: 12px; }
h3 { color: #d4a843; font-size: 16px; }
.subtitle { color: #8898b0; font-size: 14px; letter-spacing: 2px; }
.icon { font-size: 80px; margin: 30px 0; animation: fl 3s ease-in-out infinite; }
@keyframes fl { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }

button {
  background: linear-gradient(135deg, rgba(60,40,100,0.9), rgba(30,20,60,0.9));
  color: #e8cc6e;
  border: 1px solid rgba(212,168,67,0.4);
  border-radius: 14px;
  padding: 16px 24px;
  font-size: 17px;
  cursor: pointer;
  width: 100%;
  margin: 6px 0;
  transition: all 0.3s;
  letter-spacing: 1px;
  -webkit-tap-highlight-color: transparent;
}
button:active { transform: scale(0.97); border-color: #d4a843; }
.btn-back { background: transparent; border: 1px solid #8898b0; color: #8898b0; }
.screen { display: none; animation: fadeIn 0.4s; }
.screen.active { display: block; }
@keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

.options { display: flex; flex-direction: column; gap: 14px; }
.option {
  display: block; text-decoration: none; color: inherit;
  background: linear-gradient(135deg, rgba(40,30,70,0.8), rgba(20,15,45,0.9));
  border: 1px solid rgba(212,168,67,0.3);
  border-radius: 16px;
  padding: 24px 20px;
  transition: all 0.3s;
  text-align: center;
}
.option:active { transform: scale(0.98); border-color: #d4a843; box-shadow: 0 0 20px rgba(212,168,67,0.2); }
.option .title { color: #d4a843; font-size: 20px; font-weight: bold; letter-spacing: 2px; }
.option .desc { color: #8898b0; font-size: 13px; margin-top: 6px; line-height: 1.6; }
.option .emoji { font-size: 36px; margin-bottom: 8px; }

input[type="text"] {
  width:100%; padding:14px 16px; border-radius:12px;
  border:1px solid rgba(42,64,112,0.6); background:rgba(26,42,72,0.8);
  color:#e0e8f0; font-size:16px; margin:10px 0;
}
input::placeholder { color:#506080; }

/* Dual reading cards */
.dual-section {
  background: linear-gradient(145deg, rgba(26,42,72,0.6), rgba(16,25,46,0.8));
  border: 1px solid rgba(42,64,112,0.6);
  border-radius: 14px;
  padding: 18px;
  margin: 16px 0;
}
.dual-section h3 { margin-bottom: 10px; }
.dual-cards {
  display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin: 12px 0;
}
.d-card {
  width: 80px; height: 115px; perspective: 800px; cursor: pointer;
}
.d-card-inner {
  width:100%; height:100%; position:relative;
  transform-style:preserve-3d; transition:transform 0.6s;
}
.d-card.flipped .d-card-inner { transform: rotateY(180deg); }
.d-card.reversed.flipped .d-card-inner { transform: rotateY(180deg) rotate(180deg); }
.d-card-front, .d-card-back {
  position:absolute; width:100%; height:100%;
  backface-visibility:hidden; border-radius:8px;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
}
.d-card-back {
  background: url('card-back.jpeg') center/cover no-repeat;
  border: 2px solid #d4a843;
  box-shadow: 0 3px 10px rgba(0,0,0,0.4);
}
.d-card-front {
  background: linear-gradient(170deg, #1e2e50, #142040);
  border: 2px solid rgba(42,64,112,0.6);
  transform: rotateY(180deg); padding: 4px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.4);
}
.d-card.flipped .d-card-front { border-color: #d4a843; box-shadow: 0 0 15px rgba(212,168,67,0.2); }
.d-card-front .emoji { font-size: 24px; }
.d-card-front .name { font-size: 9px; color: #d4a843; margin-top: 2px; text-align:center; }
.d-card-front .orient { font-size: 9px; color: #8898b0; }

.result-item {
  background: rgba(26,42,72,0.4);
  border-radius: 10px;
  padding: 12px;
  margin: 8px 0;
  border-left: 3px solid #d4a843;
}
.result-item .pos { font-size: 11px; color: #d4a843; letter-spacing: 1px; }
.result-item .detail { font-size: 13px; line-height: 1.7; margin-top: 4px; color: #c0c8d8; }

.cross-box {
  background: linear-gradient(135deg, rgba(20,15,40,0.9), rgba(30,25,55,0.9));
  border: 1px solid #d4a843;
  border-radius: 14px;
  padding: 20px;
  margin: 16px 0;
  box-shadow: 0 0 25px rgba(212,168,67,0.1);
}

.shuffle-overlay { display:none; position:fixed; inset:0; background:rgba(10,10,30,0.95); z-index:100; flex-direction:column; align-items:center; justify-content:center; }
.shuffle-overlay.active { display:flex; }
.shuffle-text { color:#d4a843; font-size:22px; margin-top:20px; letter-spacing:4px; }
</style>
</head>

{n:31,name:"太阳",em:"☀️",core:"成功、光明",love:"感情光明美好",work:"事业成功；升职加薪"},
{n:32,name:"月亮",em:"🌙",core:"名誉、直觉",love:"浪漫神秘的感情",work:"声誉提升；获得赞誉"},
{n:33,name:"钥匙",em:"🔑",core:"解答、确定",love:"关键转折；命中注定",work:"关键信息；决定性突破"},
{n:34,name:"鱼",em:"🐟",core:"金钱、丰盛",love:"经济独立的伴侣",work:"收入增加；生意兴隆"},
{n:35,name:"锚",em:"⚓",core:"稳定、持久",love:"长久稳定的关系",work:"工作稳定；长期合同"},
{n:36,name:"十字架",em:"✝️",core:"负担、考验",love:"感情的重担和痛苦",work:"工作压力大；艰难挑战"},
];

// ============ STATE ============
let dualTopic = "general";
let tarotDrawn = [];
let lenDrawn = [];
let verdictDrawn = null;
let verdictFlipped = false;
let tarotFlipped = 0;
let lenFlipped = 0;

function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  window.scrollTo(0, 0);
}

function setDualTopic(t, el) {
  dualTopic = t;
  document.querySelectorAll(".dt-btn").forEach(b => { b.style.borderColor = "rgba(212,168,67,0.4)"; b.style.color = "#e8cc6e"; });
  el.style.borderColor = "#d4a843"; el.style.color = "#d4a843";
}

function detectDualType(q) {
  if (!q) return "general";
  const loveWords = ["喜欢","爱","心动","在一起","复合","分手","暧昧","对象","恋","感情","他","她","前任","脱单","结婚","表白","追","告白","冷战","吵架","出轨","第三者","暗恋","单身","约会","对我"];
  if (loveWords.some(w => q.includes(w))) return "love";
  const workWords = ["工作","辞职","跳槽","升职","加薪","面试","offer","创业","项目","老板","同事","事业","转行","裁员","考试","学业","考研","留学","pr","PR"];
  if (workWords.some(w => q.includes(w))) return "work";
  return "general";
}

function startDualShuffle() {
  document.getElementById("shuffleOverlay").classList.add("active");
  setTimeout(() => {
    document.getElementById("shuffleOverlay").classList.remove("active");
    dualDraw();
  }, 2000);
}

function dualDraw() {
  const q = document.getElementById("dualQuestion").value.trim();
  document.getElementById("dualQ").textContent = q ? "问题：" + q : "";

  const qType = detectDualType(q);
  const allTarot = [...TAROT].sort(() => Math.random() - 0.5);
  // 第一张做定调牌，剩下的做牌阵
  verdictDrawn = {card: allTarot[0], rev: Math.random() < 0.5};
  const tShuf = allTarot.slice(1); // 去掉定调牌避免重复
  const lShuf = [...LENORMAND].sort(() => Math.random() - 0.5);
  verdictFlipped = false;

  if (qType === "love") {
    // 感情：塔罗关系十字5牌 + 雷诺曼5牌
    tarotDrawn = [
      {card: tShuf[0], pos: "你的状态", rev: Math.random() < 0.5},
      {card: tShuf[1], pos: "对方状态", rev: Math.random() < 0.5},
      {card: tShuf[2], pos: "关系挑战", rev: Math.random() < 0.5},
      {card: tShuf[3], pos: "建议行动", rev: Math.random() < 0.5},
      {card: tShuf[4], pos: "未来走向", rev: Math.random() < 0.5},
    ];
    lenDrawn = [
      {card: lShuf[0], pos: "过去"},
      {card: lShuf[1], pos: "近期"},
      {card: lShuf[2], pos: "核心"},
      {card: lShuf[3], pos: "挑战"},
      {card: lShuf[4], pos: "结果"},
    ];
    document.getElementById("tarotTitle").textContent = "🔮 塔罗解读（为什么）— 关系十字";
    document.getElementById("tarotDesc").textContent = "关系十字：你→对方→挑战→建议→走向 | 点击翻牌";
    document.getElementById("lenTitle").textContent = "🃏 雷诺曼解读（会怎样）— 五牌";
    document.getElementById("lenDesc").textContent = "五牌：过去→近期→核心→挑战→结果 | 点击翻牌";
  } else {
    // 事业/选择/一般：塔罗时间之流3牌 + 雷诺曼3牌
    tarotDrawn = [
      {card: tShuf[0], pos: "过去", rev: Math.random() < 0.5},
      {card: tShuf[1], pos: "现在", rev: Math.random() < 0.5},
      {card: tShuf[2], pos: "未来", rev: Math.random() < 0.5},
    ];
    lenDrawn = [
      {card: lShuf[0], pos: "主题"},
      {card: lShuf[1], pos: "修饰·过去"},
      {card: lShuf[2], pos: "修饰·未来"},
    ];
    document.getElementById("tarotTitle").textContent = "🔮 塔罗解读（为什么）— 时间之流";
    document.getElementById("tarotDesc").textContent = "时间之流：过去→现在→未来 | 点击翻牌";
    document.getElementById("lenTitle").textContent = "🃏 雷诺曼解读（会怎样）— 三牌";
    document.getElementById("lenDesc").textContent = "三牌组合：主题+修饰 | 点击翻牌";
  }

  tarotFlipped = 0; lenFlipped = 0;
  renderDualCards();
  showScreen("dual-reading");
}

function renderDualCards() {
  // Verdict card
  const vc = document.getElementById("verdictCard");
  vc.innerHTML = "";
  const vd = verdictDrawn;
  const vDiv = document.createElement("div");
  vDiv.className = "d-card" + (vd.rev ? " reversed" : "");
  vDiv.style.width = "100px";
  vDiv.style.height = "145px";
  vDiv.innerHTML = `<div class="d-card-inner"><div class="d-card-back"></div><div class="d-card-front"><div style="font-size:8px;color:#8898b0">定调</div><div class="emoji" style="font-size:32px">${vd.card.em}</div><div class="name" style="font-size:11px">${vd.card.name}</div><div class="orient">${vd.rev?"逆位↓":"正位↑"}</div></div></div>`;
  vDiv.onclick = () => flipVerdict(vDiv);
  vc.appendChild(vDiv);
  document.getElementById("verdictResult").innerHTML = "";

  // Tarot cards
  const tc = document.getElementById("tarotCards");
  tc.innerHTML = "";
  tarotDrawn.forEach((d, i) => {
    const div = document.createElement("div");
    div.className = "d-card" + (d.rev ? " reversed" : "");
    div.innerHTML = `<div class="d-card-inner"><div class="d-card-back"></div><div class="d-card-front"><div style="font-size:8px;color:#8898b0">${d.pos}</div><div class="emoji">${d.card.em}</div><div class="name">${d.card.name}</div><div class="orient">${d.rev?"逆位↓":"正位↑"}</div></div></div>`;
    div.onclick = () => flipTarot(div, i);
    tc.appendChild(div);
  });

  // Lenormand cards
  const lc = document.getElementById("lenCards");
  lc.innerHTML = "";
  lenDrawn.forEach((d, i) => {
    const div = document.createElement("div");
    div.className = "d-card";
    div.innerHTML = `<div class="d-card-inner"><div class="d-card-back"></div><div class="d-card-front"><div style="font-size:8px;color:#8898b0">${d.pos}</div><div class="emoji">${d.card.em}</div><div class="name">${d.card.name}</div><div style="font-size:8px;color:#8898b0">#${d.card.n}</div></div></div>`;
    div.onclick = () => flipLen(div, i);
    lc.appendChild(div);
  });

  document.getElementById("tarotResults").innerHTML = "";
  document.getElementById("lenResults").innerHTML = "";
  document.getElementById("crossAnalysis").innerHTML = "";
}

function flipVerdict(el) {
  if (el.classList.contains("flipped")) return;
  el.classList.add("flipped");
  verdictFlipped = true;
  const v = verdictDrawn;
  const c = v.card;
  const r = v.rev;
  const t = dualTopic;

  // 根据牌面判断趋势方向
  const posCards = [0,1,3,6,8,10,14,17,19,21]; // 积极牌
  const negCards = [12,13,15,16,18]; // 挑战牌
  let isPositive = posCards.includes(c.n);
  let isNeg = negCards.includes(c.n);
  if (r) { isPositive = !isPositive; isNeg = !isNeg; }

  let verdictText, verdictEmoji, verdictColor;
  const meaning = t === "love" ? (r ? c.rl : c.ul) : t === "work" ? (r ? c.rw : c.uw) : (r ? c.r : c.u);

  if (isPositive && !isNeg) {
    verdictEmoji = "🌟"; verdictColor = "#50d080";
    verdictText = `趋势积极！${c.em}${c.name}${r?"逆位":"正位"}定调：${meaning}`;
  } else if (isNeg) {
    verdictEmoji = "⚠️"; verdictColor = "#e0a040";
    verdictText = `有挑战需面对。${c.em}${c.name}${r?"逆位":"正位"}定调：${meaning}`;
  } else {
    verdictEmoji = "🌙"; verdictColor = "#a0a0c0";
    verdictText = `趋势中性，需看后续牌面。${c.em}${c.name}${r?"逆位":"正位"}定调：${meaning}`;
  }

  document.getElementById("verdictResult").innerHTML = `
    <div style="margin-top:12px;text-align:center">
      <div style="font-size:32px;margin:6px 0">${verdictEmoji}</div>
      <div style="font-size:16px;font-weight:bold;color:${verdictColor};margin-bottom:6px">${isPositive && !isNeg ? "偏向积极" : isNeg ? "有阻碍" : "需综合判断"}</div>
      <p style="font-size:13px;color:#c0c8d8;line-height:1.7">${verdictText}</p>
    </div>`;
  checkAllFlipped();
}

function getTarotMeaning(card, rev, topic) {
  if (topic === "love") return rev ? card.rl : card.ul;
  if (topic === "work") return rev ? card.rw : card.uw;
  return rev ? card.r : card.u;
}

function getLenMeaning(card, topic) {
  if (topic === "love") return card.love;
  if (topic === "work") return card.work;
  return card.core;
}

function flipTarot(el, i) {
  if (el.classList.contains("flipped")) return;
  el.classList.add("flipped");
  tarotFlipped++;
  const d = tarotDrawn[i];
  const m = getTarotMeaning(d.card, d.rev, dualTopic);
  document.getElementById("tarotResults").innerHTML += `
    <div class="result-item">
      <div class="pos">[ ${d.pos} ] ${d.card.em} ${d.card.name} ${d.rev?"逆位":"正位"}</div>
      <div class="detail">${m}</div>
    </div>`;
  checkAllFlipped();
}

function flipLen(el, i) {
  if (el.classList.contains("flipped")) return;
  el.classList.add("flipped");
  lenFlipped++;
  const d = lenDrawn[i];
  const m = getLenMeaning(d.card, dualTopic);
  document.getElementById("lenResults").innerHTML += `
    <div class="result-item">
      <div class="pos">[ ${d.pos} ] ${d.card.em} ${d.card.name} #${d.card.n}</div>
      <div class="detail">${m}</div>
    </div>`;
  checkAllFlipped();
}

function checkAllFlipped() {
  if (tarotFlipped === tarotDrawn.length && lenFlipped === lenDrawn.length) showCrossAnalysis();
}

function showCrossAnalysis() {
  const q = document.getElementById("dualQuestion").value.trim();
  const t = dualTopic;

  // Tarot summary
  const tarotStory = tarotDrawn.map(d => {
    const m = getTarotMeaning(d.card, d.rev, t);
    return `${d.pos}：${d.card.em}${d.card.name}${d.rev?"(逆)":""} — ${m}`;
  }).join("；");

  // Lenormand combo
  const lenCombo = lenDrawn.map(d => d.card.em + d.card.name).join(" + ");
  const lenStory = lenDrawn.map(d => {
    const m = getLenMeaning(d.card, t);
    return `${d.card.em}${d.card.name}：${m}`;
  }).join("；");

  // Positive/negative analysis
  const tRev = tarotDrawn.filter(d => d.rev).length;
  const lenNeg = [6,7,8,10,21,23,36];
  const lenPos = [2,4,9,16,18,24,25,31,33,35];
  const lNeg = lenDrawn.filter(d => lenNeg.includes(d.card.n)).length;
  const lPos = lenDrawn.filter(d => lenPos.includes(d.card.n)).length;

  let tarotTrend = tRev <= 1 ? "偏积极" : "有阻碍需调整";
  let lenTrend = lPos > lNeg ? "偏积极" : lNeg > lPos ? "有挑战" : "中性平稳";

  let crossResult = "";
  if (tarotTrend === "偏积极" && lenTrend === "偏积极") {
    crossResult = "两个系统结果一致偏积极 — 无论从内心动机还是实际发展来看，趋势都是向好的。信息互相确认，可以更有信心。";
  } else if (tarotTrend !== "偏积极" && lenTrend !== "偏积极") {
    crossResult = "两个系统都提示存在挑战 — 不仅内心有纠结，实际发展也有阻碍。建议先处理内在问题（塔罗提示），再应对外在局势（雷诺曼提示）。";
  } else if (tarotTrend === "偏积极") {
    crossResult = "塔罗偏积极但雷诺曼提示有挑战 — 内心状态是好的，但实际发展可能遇到阻碍。说明方向对了，但需要应对具体的外在困难。";
  } else {
    crossResult = "塔罗提示有阻碍但雷诺曼偏积极 — 实际发展在往好的方向走，但内心还有纠结或恐惧。需要先解决内心的障碍，才能更好地抓住机会。";
  }

  let html = `<div class="cross-box">
    <h3 style="text-align:center;margin-bottom:14px">🔗 交叉分析</h3>`;

  if (q) html += `<p style="text-align:center;color:#8898b0;font-size:13px;margin-bottom:12px">关于「${q}」</p>`;

  html += `<div style="margin:12px 0">
    <p style="font-size:13px;margin-bottom:6px"><strong style="color:#d4a843">🔮 塔罗（为什么）：</strong><span style="color:#c0c8d8">${tarotStory}</span></p>
    <p style="font-size:12px;color:#8898b0;margin-bottom:10px">塔罗趋势：${tarotTrend}</p>
  </div>
  <div style="margin:12px 0">
    <p style="font-size:13px;margin-bottom:6px"><strong style="color:#d4a843">🃏 雷诺曼（会怎样）：</strong><span style="color:#c0c8d8">${lenCombo} — ${lenStory}</span></p>
    <p style="font-size:12px;color:#8898b0;margin-bottom:10px">雷诺曼趋势：${lenTrend}</p>
  </div>
  <hr style="border:none;border-top:1px solid rgba(212,168,67,0.2);margin:14px 0">
  <p style="font-size:14px;line-height:1.8;color:#e0e0f0">${crossResult}</p>
  <p style="margin-top:14px;font-style:italic;font-size:12px;color:#8898b0;line-height:1.8">
    塔罗照见内心，雷诺曼预见事件。<br>选择权始终在你手中。
  </p></div>`;

  document.getElementById("crossAnalysis").innerHTML = html;
}
</script>
</body>
</html>
