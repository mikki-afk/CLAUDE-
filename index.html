<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>塔罗牌占卜系统</title>
<style>
:root {
  --bg: #0f0a1e;
  --bg2: #1a1333;
  --gold: #d4a843;
  --gold2: #f0d060;
  --purple: #6b3fa0;
  --text: #e8e0f0;
  --text2: #a89cc0;
  --card-bg: #231a3a;
  --card-border: #3d2a6e;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}
body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: -1;
  background: url('bg.jpeg') center center / cover no-repeat fixed;
  opacity: 0.25;
}
body::after {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: -1;
  background:
    linear-gradient(to bottom, rgba(15,10,30,0.3) 0%, transparent 30%, transparent 70%, rgba(15,10,30,0.5) 100%);
}
.container { max-width: 600px; margin: 0 auto; padding: 16px; }
h1, h2, h3 { color: var(--gold); }
button {
  background: linear-gradient(135deg, var(--purple), #4a2080);
  color: var(--gold2);
  border: 1px solid rgba(212,168,67,0.5);
  border-radius: 12px;
  padding: 14px 28px;
  font-size: 17px;
  cursor: pointer;
  width: 100%;
  margin: 6px 0;
  transition: all 0.3s;
  -webkit-tap-highlight-color: transparent;
  box-shadow: 0 2px 10px rgba(107,63,160,0.3);
  letter-spacing: 1px;
  position: relative;
  overflow: hidden;
}
button::after {
  content: "";
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: linear-gradient(transparent, rgba(255,255,255,0.03), transparent);
  transform: rotate(45deg);
  transition: 0.5s;
}
button:active {
  transform: scale(0.97);
  background: linear-gradient(135deg, #4a2080, var(--purple));
  box-shadow: 0 0 20px rgba(212,168,67,0.2);
}
.btn-sm { padding: 10px 18px; font-size: 15px; width: auto; display: inline-block; margin: 4px; }
.btn-back { background: transparent; border: 1px solid var(--text2); color: var(--text2); }
.screen { display: none; animation: fadeIn 0.4s; }
.screen.active { display: block; }
@keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

/* Banner */
.banner {
  text-align: center;
  padding: 40px 0 20px;
}
.banner h1 {
  font-size: 30px;
  margin-bottom: 8px;
  text-shadow: 0 0 20px rgba(212,168,67,0.4);
  letter-spacing: 4px;
}
.banner .subtitle { color: var(--text2); font-size: 14px; letter-spacing: 2px; }
.banner .crystal {
  font-size: 72px;
  margin: 20px 0;
  animation: crystalFloat 3s ease-in-out infinite;
  filter: drop-shadow(0 0 20px rgba(212,168,67,0.3));
}
@keyframes crystalFloat {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

/* Cards grid */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 12px;
  margin: 16px 0;
}
.card-item {
  background: linear-gradient(145deg, var(--card-bg), #1a1230);
  border: 1px solid var(--card-border);
  border-radius: 12px;
  padding: 14px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
}
.card-item::before {
  content: "";
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: conic-gradient(from 0deg, transparent, rgba(212,168,67,0.05), transparent, rgba(107,63,160,0.05), transparent);
  animation: cardShimmer 6s linear infinite;
}
@keyframes cardShimmer { 100% { transform: rotate(360deg); } }
.card-item:active { border-color: var(--gold); box-shadow: 0 0 15px rgba(212,168,67,0.3); }
.card-item .emoji { font-size: 36px; position: relative; z-index: 1; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }
.card-item .name { font-size: 13px; margin-top: 6px; color: var(--gold); position: relative; z-index: 1; }

/* Reading card display */
.reading-cards {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 12px;
  margin: 20px 0;
}
.tarot-card {
  width: 110px;
  height: 170px;
  perspective: 800px;
  cursor: pointer;
}
.tarot-card-inner {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.6s;
}
.tarot-card.flipped .tarot-card-inner { transform: rotateY(180deg); }
.tarot-card.reversed.flipped .tarot-card-inner { transform: rotateY(180deg) rotate(180deg); }
.tarot-card-front, .tarot-card-back {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  border-radius: 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.tarot-card-back {
  background: url('card-back.jpeg') center center / cover no-repeat;
  border: 2px solid var(--gold);
  box-shadow: inset 0 0 20px rgba(0,0,0,0.3), 0 4px 15px rgba(0,0,0,0.4), 0 0 10px rgba(212,168,67,0.15);
}
.tarot-card-back::before {
  content: "";
  position: absolute;
  inset: 4px;
  border: 1px solid rgba(212,168,67,0.4);
  border-radius: 6px;
}
.tarot-card-back::after {
  content: "";
}
.tarot-card-front {
  background: linear-gradient(170deg, #2a1e45 0%, #1a1230 50%, #231a3a 100%);
  border: 2px solid var(--card-border);
  transform: rotateY(180deg);
  padding: 8px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.4);
}
.tarot-card.flipped .tarot-card-front {
  border-color: var(--gold);
  box-shadow: 0 0 20px rgba(212,168,67,0.25), 0 4px 15px rgba(0,0,0,0.4);
}
.tarot-card-front .emoji { font-size: 40px; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.4)); }
.tarot-card-front .name { font-size: 11px; color: var(--gold); margin-top: 4px; text-align: center; text-shadow: 0 0 8px rgba(212,168,67,0.3); }
.tarot-card-front .orient { font-size: 12px; color: var(--text2); margin-top: 2px; }
/* Suit-colored glow on flip */
.tarot-card.flipped[data-suit="权杖"] .tarot-card-front { box-shadow: 0 0 20px rgba(255,100,30,0.3), 0 4px 15px rgba(0,0,0,0.4); border-color: #e07030; }
.tarot-card.flipped[data-suit="圣杯"] .tarot-card-front { box-shadow: 0 0 20px rgba(60,130,255,0.3), 0 4px 15px rgba(0,0,0,0.4); border-color: #4090e0; }
.tarot-card.flipped[data-suit="宝剑"] .tarot-card-front { box-shadow: 0 0 20px rgba(180,200,255,0.3), 0 4px 15px rgba(0,0,0,0.4); border-color: #90a8d0; }
.tarot-card.flipped[data-suit="星币"] .tarot-card-front { box-shadow: 0 0 20px rgba(80,200,80,0.3), 0 4px 15px rgba(0,0,0,0.4); border-color: #50b050; }
.tarot-card.flipped[data-suit="大阿卡纳"] .tarot-card-front { box-shadow: 0 0 25px rgba(212,168,67,0.4), 0 4px 15px rgba(0,0,0,0.4); border-color: var(--gold); }

/* Result */
.result-card {
  background: linear-gradient(145deg, var(--card-bg), #1a1230);
  border: 1px solid var(--card-border);
  border-radius: 14px;
  padding: 18px;
  margin: 14px 0;
  position: relative;
  overflow: hidden;
  animation: resultSlideIn 0.5s ease-out;
}
@keyframes resultSlideIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
.result-card::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}
.result-card h3 { font-size: 16px; margin-bottom: 10px; text-shadow: 0 0 10px rgba(212,168,67,0.2); }
.result-card .position-label {
  color: var(--gold);
  font-size: 12px;
  margin-bottom: 4px;
  letter-spacing: 2px;
  text-transform: uppercase;
}
.result-card .keywords {
  color: var(--gold2);
  font-size: 14px;
  margin: 8px 0;
  padding: 8px 12px;
  background: rgba(212,168,67,0.06);
  border-radius: 8px;
  border-left: 3px solid var(--gold);
}
.result-card .detail { color: var(--text); font-size: 14px; line-height: 1.8; }
.advice-box {
  background: linear-gradient(135deg, #1a1040, #2a1555, #1a1040);
  border: 1px solid var(--gold);
  border-radius: 14px;
  padding: 22px;
  margin: 16px 0;
  text-align: center;
  position: relative;
  overflow: hidden;
  box-shadow: 0 0 30px rgba(212,168,67,0.1);
}
.advice-box::before {
  content: "";
  position: absolute;
  inset: 4px;
  border: 1px solid rgba(212,168,67,0.15);
  border-radius: 10px;
  pointer-events: none;
}
.advice-box p { color: var(--text2); font-size: 14px; line-height: 1.8; }

/* Filter tabs */
.tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin: 12px 0;
}
.tab {
  padding: 8px 14px;
  border-radius: 20px;
  border: 1px solid var(--card-border);
  background: var(--card-bg);
  color: var(--text2);
  font-size: 13px;
  cursor: pointer;
}
.tab.active { border-color: var(--gold); color: var(--gold); background: #2a1a4a; }

/* Shuffle animation */
.shuffle-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(15,10,30,0.95);
  z-index: 100;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.shuffle-overlay.active { display: flex; }
.shuffle-text {
  color: var(--gold);
  font-size: 22px;
  margin-top: 24px;
  letter-spacing: 4px;
  text-shadow: 0 0 15px rgba(212,168,67,0.4);
  animation: textGlow 1.5s ease-in-out infinite;
}
@keyframes textGlow {
  0%,100% { opacity: 0.8; }
  50% { opacity: 1; text-shadow: 0 0 25px rgba(212,168,67,0.6); }
}
.shuffle-cards {
  position: relative;
  width: 120px;
  height: 170px;
}
.shuffle-cards .s-card {
  position: absolute;
  width: 80px;
  height: 120px;
  background: url('card-back.jpeg') center center / cover no-repeat;
  border: 2px solid var(--gold);
  border-radius: 8px;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  animation: shuffleAnim 0.5s infinite alternate;
  box-shadow: 0 4px 15px rgba(0,0,0,0.4), 0 0 10px rgba(212,168,67,0.1);
}
.shuffle-cards .s-card:nth-child(2) { animation-delay: 0.12s; }
.shuffle-cards .s-card:nth-child(3) { animation-delay: 0.24s; }
@keyframes shuffleAnim {
  0% { transform: translate(-50%, -50%) rotate(-8deg) translateX(-25px); }
  100% { transform: translate(-50%, -50%) rotate(8deg) translateX(25px); }
}

/* Meditation */
.meditation { text-align: center; padding: 30px 0; }
.meditation p {
  color: var(--text2);
  font-size: 18px;
  margin: 12px 0;
  line-height: 1.8;
  letter-spacing: 2px;
  animation: breathe 4s ease-in-out infinite;
}
@keyframes breathe {
  0%,100% { opacity: 0.7; }
  50% { opacity: 1; }
}

/* Tips */
.tip-box {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 12px;
  padding: 16px;
  margin: 10px 0;
  line-height: 1.7;
  font-size: 14px;
  color: var(--text);
}

/* Card detail modal */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(15,10,30,0.92);
  z-index: 200;
  overflow-y: auto;
  padding: 20px;
}
.modal-overlay.active { display: block; }
.modal-content {
  max-width: 500px;
  margin: 20px auto;
  background: linear-gradient(170deg, #1e1540, var(--bg2));
  border: 1px solid var(--gold);
  border-radius: 16px;
  padding: 24px;
  box-shadow: 0 0 40px rgba(212,168,67,0.1), 0 20px 40px rgba(0,0,0,0.5);
  position: relative;
  overflow: hidden;
}
.modal-content::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}
.modal-content .emoji { font-size: 56px; text-align: center; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4)); }
.modal-content h2 { text-align: center; font-size: 20px; margin: 8px 0 16px; text-shadow: 0 0 15px rgba(212,168,67,0.3); }
.modal-section { margin: 14px 0; padding: 10px 12px; background: rgba(255,255,255,0.02); border-radius: 8px; }
.modal-section h4 { color: var(--gold); font-size: 13px; margin-bottom: 6px; letter-spacing: 1px; }
.modal-section p { font-size: 14px; line-height: 1.7; color: var(--text2); }

input[type="text"] {
  width: 100%;
  padding: 12px 16px;
  border-radius: 10px;
  border: 1px solid var(--card-border);
  background: var(--card-bg);
  color: var(--text);
  font-size: 16px;
  margin: 8px 0;
}
input[type="text"]::placeholder { color: #665a80; }
</style>
</head>
<body>
<div class="container">

<!-- Home Screen -->
<div id="home" class="screen active">
  <div class="banner">
    <div class="crystal">🔮</div>
    <h1>塔罗牌占卜</h1>
    <div class="subtitle">基于韦特塔罗体系 · 78张完整牌组</div>
  </div>
  <button onclick="showScreen('spread-select')">🌙 开始占卜</button>
  <button onclick="showScreen('browse')">📖 浏览塔罗牌</button>
  <button onclick="showTips()">✨ 塔罗小知识</button>
</div>

<!-- Spread Select -->
<div id="spread-select" class="screen">
  <h2>选择牌阵</h2>
  <button onclick="selectSpread('single')">🎴 单牌占卜<br><small style="color:var(--text2)">快速洞察，1张牌</small></button>
  <button onclick="selectSpread('three')">🕐 时间之流<br><small style="color:var(--text2)">过去·现在·未来，3张牌</small></button>
  <button onclick="selectSpread('relationship')">💕 关系十字<br><small style="color:var(--text2)">自己·对方·挑战·建议·结果，5张牌</small></button>
  <button onclick="selectSpread('celtic')">🌟 凯尔特十字<br><small style="color:var(--text2)">全面深度解读，10张牌</small></button>
  <br>
  <button class="btn-back" onclick="showScreen('home')">返回</button>
</div>

<!-- Question Input -->
<div id="question-input" class="screen">
  <h2>输入你的问题</h2>
  <p style="color:var(--text2);font-size:13px;margin:10px 0;line-height:1.6">
    提示：问题要单一、具体、短期（3-6个月）<br>
    避免问生老病死、具体时间和数字
  </p>
  <input type="text" id="questionField" placeholder="你想问什么？（可留空）">
  <h3 style="margin:16px 0 8px;font-size:16px">选择解读方向</h3>
  <div class="tabs" id="topicTabs">
    <div class="tab active" onclick="selectTopic('general',this)">🔮 综合</div>
    <div class="tab" onclick="selectTopic('love',this)">💕 感情</div>
    <div class="tab" onclick="selectTopic('work',this)">💼 事业</div>
  </div>
  <button onclick="startMeditation()">开始冥想</button>
  <button class="btn-back" onclick="showScreen('spread-select')">返回</button>
</div>

<!-- Meditation -->
<div id="meditation" class="screen">
  <div class="meditation">
    <div style="font-size:60px;margin-bottom:20px">🧘</div>
    <p id="meditationText"></p>
    <button id="meditationBtn" style="display:none" onclick="startShuffle()">我准备好了</button>
  </div>
</div>

<!-- Shuffle -->
<div class="shuffle-overlay" id="shuffleOverlay">
  <div class="shuffle-cards">
    <div class="s-card"></div>
    <div class="s-card"></div>
    <div class="s-card"></div>
  </div>
  <div class="shuffle-text">洗牌中...</div>
</div>

<!-- Reading -->
<div id="reading" class="screen">
  <h2 id="readingTitle"></h2>
  <p id="readingQuestion" style="color:var(--text2);font-size:13px;margin:4px 0 12px"></p>
  <p style="color:var(--text2);font-size:13px;text-align:center;margin-bottom:8px">点击卡牌翻开</p>
  <div class="reading-cards" id="readingCards"></div>
  <div id="readingResults"></div>
  <div id="readingAdvice"></div>
  <button onclick="showScreen('home')" style="margin-top:12px">返回首页</button>
  <button class="btn-back" onclick="showScreen('spread-select')">再占一次</button>
</div>

<!-- Browse -->
<div id="browse" class="screen">
  <h2>浏览塔罗牌</h2>
  <div class="tabs" id="browseTabs">
    <div class="tab active" onclick="filterCards('全部',this)">全部(78)</div>
    <div class="tab" onclick="filterCards('大阿卡纳',this)">大阿卡纳(22)</div>
    <div class="tab" onclick="filterCards('权杖',this)">🔥权杖(14)</div>
    <div class="tab" onclick="filterCards('圣杯',this)">🏆圣杯(14)</div>
    <div class="tab" onclick="filterCards('宝剑',this)">⚔️宝剑(14)</div>
    <div class="tab" onclick="filterCards('星币',this)">💰星币(14)</div>
  </div>
  <div class="cards-grid" id="cardsGrid"></div>
  <button class="btn-back" onclick="showScreen('home')">返回</button>
</div>

<!-- Tips -->
<div id="tips" class="screen">
  <h2>✨ 塔罗小知识</h2>
  <div id="tipsContent"></div>
  <button onclick="showTips()">换一批</button>
  <button class="btn-back" onclick="showScreen('home')">返回</button>
</div>

<!-- Card Detail Modal -->
<div class="modal-overlay" id="cardModal">
  <div class="modal-content" id="modalContent"></div>
  <button style="max-width:500px;margin:10px auto;display:block" onclick="closeModal()">关闭</button>
</div>

</div>

<script>

{n:0,name:"愚人 The Fool",suit:"大阿卡纳",el:"风",em:"🃏",u:"自由洒脱、天真勇敢、潜能无限、活在当下",r:"鲁莽冲动、不负责任、浮躁愚昧、风险失控",ul:"情侣重拾新鲜感，愿意为关系尝试新事物，用天真心态化解矛盾；单身勇敢开启新可能，不被过去束缚，主动结识他人；暧昧中纯粹心动，不掺杂功利考量，享受当下轻松甜蜜",rl:"冲动引发矛盾，缺乏思考的言行伤害对方；轻率择偶，因急于脱单轻信他人或忽视底线；空想不落地，只沉浸幻想不主动推进关系",uw:"主动突破舒适区，愿意尝试新任务学习新技能；怀揣热情启程，不因经验不足退缩；开放接受新机会，不局限于固定行业",rw:"鲁莽犯错，不提前规划凭冲动做事导致失误；盲目投入未做市场调研，忽视风险评估；轻率做选择，不了解岗位需求盲目入职"},
{n:1,name:"魔术师 The Magician",suit:"大阿卡纳",el:"风",em:"🎩",u:"资源整合、沟通高效、创意落地、掌控全局",r:"能力虚耗、沟通障碍、欺骗隐瞒、行动力不足",ul:"用实际行动解决矛盾，共同规划未来；遇到用具体付出表达心意的人，无虚浮套路；双方能共享资源，互动有明确推进方向",rl:"一方频繁画饼却无兑现，沟通流于表面；遇浮夸追求者，靠甜言蜜语虚假包装吸引；关系仅靠利益维系，无真实情感联结",uw:"整合自身技能与人脉资源，核心岗位出彩；精准定位市场需求，将优势转化为盈利点；清晰梳理自身能力精准匹配岗位",rw:"空想方案不落地，忽视客观条件导致执行失误；无市场调研就跨界盲目投入；简历过度包装，夸大能力面试露怯"},
{n:2,name:"女祭司 The High Priestess",suit:"大阿卡纳",el:"水",em:"🌙",u:"直觉敏锐、冷静理性、深度洞察、保守秘密",r:"情感压抑、直觉失灵、过度封闭、虚伪隐瞒",ul:"深度心灵共鸣，能感知对方未说出口的需求，用理性沟通化解矛盾；清醒等待契合者，不盲目跟风恋爱；克制的心动试探，通过静默观察判断对方诚意",rl:"冷战式疏离，过度封闭内心拒绝坦诚沟通；多疑错失机会，因过往阴影放大焦虑；直觉误导，过度解读对方言行产生误解",uw:"精准洞察行业趋势与团队隐性问题；沉心钻研专业内容形成扎实能力；做选择前充分考量利弊，决策更具长远性",rw:"僵化错失机遇，固守旧有经验拒绝新方法；知识碎片化，仅收集信息不深度思考；直觉凌驾现实，忽视客观条件与数据"},
{n:3,name:"女皇 The Empress",suit:"大阿卡纳",el:"土",em:"👑",u:"物质丰裕、情感滋养、社交魅力、创造力强",r:"虚荣浪费、懒惰懈怠、情感混乱、孕育受阻",ul:"滋养亲密关系，借慷慨付出与温柔包容增进亲密感，共同创造美好回忆；情感状态丰沛开放，易被美好邂逅吸引，自然展现魅力；双方用丰富创造力经营关系，自然加深了解",rl:"溺爱滋生矛盾，一方过度纵容或依赖对方；因追求完美浪漫脱离实际；过度消耗热情，用混乱的情感试探破坏信任",uw:"借丰富想象力为工作提创意方案；事业易得资源支持，凭慷慨合作态度建立优质人脉；在艺术、时尚、创意营销等岗位易获青睐",rw:"工作缺规划，依赖直觉行动无序消耗精力；经营凭浪漫幻想缺理性规划导致资源浪费；求职目标不明确，被表面丰富回报吸引"},
{n:4,name:"皇帝 The Emperor",suit:"大阿卡纳",el:"火",em:"🏰",u:"领导力、责任担当、稳定秩序、成熟可靠",r:"控制欲强、不负责任、权力丧失、暴躁武断",ul:"一方具备责任感，能理性规划感情未来，用规则感维系关系稳定；理性择偶，明确核心需求不被短期好感裹挟；明确节奏推进关系，避免暧昧期的混乱",rl:"专制引发对抗，过度掌控感情限制社交；僵化择偶，固守必须符合权威标准的观点；掌控吓跑对方，强行主导关系节奏用命令式态度",uw:"具备清晰的目标规划与资源分配能力，带领团队高效完成；明确企业发展方向，建立完善运营体系；优先选择制度完善发展路径清晰的企业",rw:"以权威自居独断决策不听意见致内耗；缺乏全局规划随意更改决策失控陷危机；仅因体制内标签选择岗位盲目追稳定"},
{n:5,name:"教皇 The Hierophant",suit:"大阿卡纳",el:"土",em:"⛪",u:"宗教权威、教育传承、传统保守、仁慈引导",r:"叛逆质疑、伪善僵化、过度教条、丑闻暴露",ul:"双方认同相似的感情观婚姻观，愿意遵循健康相处规则；在传统社交场景结识价值观契合者；通过深度沟通确认彼此核心需求推进关系",rl:"双方对感情认知未来规划差异巨大观念冲突；因固守必须符合某种条件的标准教条限制缘分；一方追求稳定传统一方追求自由随性价值观错位",uw:"得到领导行业前辈的认可与指导，权威助力成长；参考成功企业运营模式结合自身优势；认同目标公司企业文化与价值观获机会",rw:"所在团队固守旧有规则拒绝创新教条束缚；不顾自身实际照搬他人成功经验盲目跟风；为稳定选择与自身理念相悖的岗位价值观背离"},
{n:6,name:"恋人 The Lovers",suit:"大阿卡纳",el:"风",em:"💕",u:"真爱坦诚、心智共鸣、自主选择、善恶辩证",r:"诱惑沦陷、第三者介入、关系破裂、选择盲从",ul:"双方价值观生活目标高度一致，既能坦诚沟通化解矛盾又能彼此支持；遇灵魂共振良缘，相处无需刻意讨好；经过充分了解主动做出确定关系的选择",rl:"核心需求出现分歧或因信任缺失导致关系失去根基；在多个追求者中摇摆不定或因过度挑剔错选人；一方过度投入一方敷衍回应期待不一致",uw:"与同事合作伙伴理念一致能力互补合作共赢；找到价值观契合资源互补的合伙人精准破局；找到与自身职业理念能力高度匹配的岗位",rw:"与同事理念冲突权责不清合作失衡；合伙人价值观不合目标分歧错配陷危机；因薪资诱惑选择相悖岗位或在多个offer中纠结"},
{n:7,name:"战车 The Chariot",suit:"大阿卡纳",el:"水",em:"🏎️",u:"掌控全局、异地出行、精神胜利、矛盾整合",r:"方向偏离、情绪失控、半途而废、外在受挫",ul:"双方明确共同目标，用坚定意志化解现实阻碍如异地家庭反对；主动争取缘分，明确择偶标准积极拓展社交圈；清晰规划关系发展节奏，用行动力打消对方顾虑",rl:"双方对感情未来规划不一致，缺乏耐心陷入争吵目标分歧；无清晰择偶方向跟风追求不符合需求的人；忽冷忽热行动无规划混乱消耗好感",uw:"明确工作目标整合资源高效行动攻坚突破瓶颈；清晰定位产品方向靠坚定执行力打开市场；明确职业目标针对性优化简历准备面试精准出击",rw:"无清晰工作目标盲目跟风做任务方向迷茫内耗；未明确市场需求就激进投入资源盲目扩张；无目标盲目投递简历匹配度低海投无果"},
{n:8,name:"力量 Strength",suit:"大阿卡纳",el:"火",em:"🦁",u:"内在勇气、包容接纳、以柔克刚、韧性十足",r:"恐惧退缩、控制失效、野性失控、外强中干",ul:"用包容代替争吵，以耐心倾听理解对方，靠内在韧性修复关系；不刻意讨好凭坚定自我价值感吸引同频者；用真诚与耐心建立信任让感情自然升温",rl:"用冷战指责等强硬方式处理矛盾不愿妥协；因害怕孤独盲目迎合或因过度防备拒绝接触；急于确定关系用强势关心给对方压力",uw:"面对工作压力不急躁，用耐心梳理问题柔韧破局；以真诚态度打动合作伙伴用长期主义吸引客户；不怯场不盲从清晰表达能力与需求",rw:"为证明能力强行承接超出范围的工作蛮力致失误；因固执己见拒绝市场反馈对抗失机遇；过度强调薪资或职位忽视岗位适配度"},
{n:9,name:"隐士 The Hermit",suit:"大阿卡纳",el:"土",em:"🏔️",u:"孤独沉淀、智慧洞察、深思熟虑、内心指引",r:"孤僻自闭、逃避现实、判断失误、抑郁消极",ul:"彼此保留独立思考空间，不依赖过度黏连，借内省化解矛盾；专注个人成长不急于迎合用内在充实吸引同频伴侣；不追求快餐式互动靠深度交流了解彼此慢热沉淀见真心",rl:"过度沉浸自我世界忽视情感联结用独处逃避沟通；拒绝社交互动因害怕受伤将潜在机会拒之门外；回避主动互动用高冷掩盖内心不安冷漠消耗好感",uw:"借独立思考钻研专业难题用深度复盘找到创新解决方案；经市场调研与自我反思避开同质化竞争精准定位；复盘过往经历与能力优势精准投递适配岗位",rw:"拒绝团队沟通固执单打独斗脱离协作低效；无视市场反馈仅凭主观判断推进项目闭门造车；过度反思自身短板放大焦虑不敢尝试自我设限"},
{n:10,name:"命运之轮 Wheel of Fortune",suit:"大阿卡纳",el:"火",em:"🎡",u:"时来运转、意外机遇、循环成长、顺应规律",r:"时机未到、厄运缠身、错失机会、恶性循环、抗拒变化",ul:"关系迎来突破进展，步入新阶段如解决长期矛盾；有意外桃花，相遇具命中注定之感；到关键抉择时刻顺势而为可快速确定关系走向",rl:"旧问题反复致感情波折难以打破困境；缘分未成熟易吸引不合适人把握不住机会；关系发展被动停滞因犹豫或行动不当错过推进窗口",uw:"工作现转折有升职或借新机会跳槽提升；外部环境助事业推进易获意外资源支持；求职意外收获理想机会",rw:"工作计划因意外反复或延迟计划停滞陷入瓶颈；创业进展不顺面临资金流断局势失控；易错过好机会机遇擦肩进展不顺"},
{n:11,name:"正义 Justice",suit:"大阿卡纳",el:"风",em:"⚖️",u:"公平正义、理性裁决、平衡矛盾、坚守原则",r:"偏见不公、逃避责任、滥用规则、情绪化判断",ul:"双方以平等姿态相处，尊重彼此付出，以相互妥协维系关系的平衡与和谐；秉持真诚公正态度，自身积极品质吸引匹配之人；基于双方真实互动做判断，不被冲动或片面信息误导",rl:"关系失衡，一方觉付出未得对等回报，遇分歧易指责对方逃避自身责任；择偶标准不合理或有偏见，因过往经历难公平看待新关系；自身对感情期望过度或不合理，易误解对方行为",uw:"工作正直尽责处事公平，收获信任尊重，易在涉及判断或裁决事务中得支持；做决策兼顾各方因素合理分配资源，权衡风险收益；凭借契合岗位的真实能力获职位，求职进程公正透明",rw:"遇不公平环境如成果被夺为他人错误背锅；资源分配失衡引发合作破裂或内部信任危机；求职存不诚实行为或行业潜规则使公平竞争受阻"},
{n:12,name:"倒吊人 The Hanged Man",suit:"大阿卡纳",el:"水",em:"🙃",u:"自愿牺牲、换角思考、灵性成长、耐心等待",r:"不愿付出、急躁焦虑、错失领悟、被动受害",ul:"愿暂时放下自我立场从对方视角理解分歧，用退让换取关系长久；不急于脱单借独处反思情感需求修炼内在吸引力；不盲目推进关系用持续的细节付出传递诚意让感情自然升温",rl:"一方被迫妥协心生不满，另一方习以为常忽视反馈，关系陷入付出-抱怨循环；因害怕受伤拒绝新接触错失相遇机会；急于确定关系忽视对方节奏用牺牲感绑架对方导致降温",uw:"主动承担基础且耗时的工作，看似吃亏实则积累经验与人脉为后续晋升铺路；暂时降低盈利预期投入资源打磨产品为长期品牌建设奠基；不执着于高薪高位选择能积累核心技能的岗位",rw:"被迫接手额外工作却无成长空间，因不敢拒绝无效任务陷入内耗；明知项目需调整却因不愿承认失败硬撑持续投入无回报；既不愿从基础做起又无匹配高薪岗位的能力在挑剔与不甘中错失offer"},
{n:13,name:"死神 Death",suit:"大阿卡纳",el:"水",em:"💀",u:"彻底变革、旧去新来、浴火重生、接纳终结",r:"拖延终结、藕断丝连、恐惧改变、重生受阻",ul:"若矛盾根深蒂固终结错配关系为新生铺路，若真心契合借告别旧模式升级亲密；彻底放下前任清空过往情感执念为新缘分腾出空间；终结模糊状态要么确定关系要么体面告别",rl:"明知关系已破裂仍因恐惧孤独强行维系陷入内耗纠缠难断；无法走出上一段感情伤害拒绝新接触困于过去阴影；因害怕失去不敢推进或终止关系陷入僵局反复无进展",uw:"旧工作内容僵化迎来岗位调整或工作方法升级，或告别不合适岗位开启新职业方向；旧业务模式亏损果断终止后基于经验启动新盈利项目；终结错误投递方向明确目标后迎来新面试机遇",rw:"明知当前工作无成长待遇不公仍因恐惧改变拒绝跳槽能力逐渐退化；旧项目持续赔钱却不愿接受失败投入更多资金填坑损失扩大；拒绝反思自身短板反复投递同类岗位始终无回应"},
{n:14,name:"节制 Temperance",suit:"大阿卡纳",el:"火",em:"🏺",u:"内在和谐、沟通顺畅、健康治愈、理财合理",r:"沟通阻滞、情感空虚、健康失衡、过度放纵",ul:"双方懂得付出与索取的调和，不过度依赖也不疏离，矛盾时能理性沟通各退一步；不急于脱单而降低标准也不封闭自我，以适度期待面对感情；不急躁表白施压也不冷淡拖延，用适度主动传递心意让关系自然升温",rl:"一方过度付出压抑需求另一方过度索取忽视对方，或因小事极端争吵冷战缺乏调和；要么因焦虑饥不择食要么因恐惧过度挑剔始终难遇契合之人；要么过度热情吓跑对方要么过度被动让关系降温",uw:"合理分配时间精力，不盲目加班透支健康也不敷衍工作，效率与状态双优；不过度投入某一环节也不吝啬必要成本，实现成本-收益平衡；不脱离自身能力空想高薪也不局限安全区放弃成长，精准投递稳步准备",rw:"要么工作狂式透支身体要么摆烂躺平荒废能力，或因过度在意他人评价焦虑内耗；要么盲目扩张投入全部资金要么过度保守错失发展机遇；要么眼高手低只投天花板岗位要么盲目海投无目标面试屡屡碰壁"},
{n:15,name:"恶魔 The Devil",suit:"大阿卡纳",el:"土",em:"😈",u:"物质沉迷、关系异化、自我奴役、隐秘禁忌",r:"挣脱束缚、反思欲望、虚假自由、更深堕落",ul:"靠物质占有欲维系关系缺乏真情，或陷入虐恋难抽身；因外貌财富忽视人品被欲望裹挟择偶；仅因对方有利用价值接近无真实情感联结利益化互动",rl:"认清关系本质主动结束消耗型感情，或共同摆脱欲望捆绑觉醒后解绑；不再被外在条件束缚重视内在契合摆脱择偶执念；识破利益伪装主动终止无意义互动清醒断联",uw:"为高薪忍受有毒环境或靠不正当手段竞争丧失职业底线；忽视长期规划靠投机取巧盈利风险极高沉溺短期利益；因表面光鲜选择不适合的行业忽视成长空间被诱惑选错路",rw:"拒绝无底线要求主动跳槽至健康环境坚守原则拒绝违规操作；放弃短期投机重新规划长期可持续方向觉醒转型；拒绝诱惑型岗位选择契合价值观与成长的工作明确核心需求"},
{n:16,name:"塔 The Tower",suit:"大阿卡纳",el:"火",em:"🗼",u:"意外灾难、全面崩塌、强制觉醒、信仰破灭",r:"灾难减轻、幸存者困境、虚假重建、延迟打击",ul:"背叛曝光核心矛盾爆发关系断崖式终结无法修复；认清暧昧对象的欺骗虚假关系破灭快速抽离；对方真实面目暴露幻想彻底打破无继续发展可能",rl:"明知关系已破裂仍因恐惧孤独强行维系陷入更深内耗；明知对方不合适仍不愿接受现实反复纠缠困于虚假期待；忽视对方的负面信号用幻想维持表面互动自欺欺人",uw:"公司裁员项目骤停行业政策巨变突发危机冲击原有工作模式失效；资金链断裂核心团队解散产品被市场淘汰项目彻底崩盘；已谈妥的offer取消目标公司突发经营危机机会突然落空",rw:"明知行业公司有风险仍拒绝学习新技能寻找新机会坐等危机降临；项目已无盈利可能仍靠借贷维持债务越积越多硬撑虚假运营；多次投递无果仍不调整目标或拒绝转型固守无效方向"},
{n:17,name:"星星 The Star",suit:"大阿卡纳",el:"风",em:"⭐",u:"灵性连接、希望笃定、创意灵感、纯净和谐",r:"理想幻灭、现实脱节、行动匮乏、迷茫无措",ul:"双方借沟通探索深层情感，相处平和浪漫互给予精神力量；易结识心灵契合者感情以灵魂吸引为起点；以积极心态看待关系不确定性成为期待双方愿探索可能",rl:"过度理想化关系无视矛盾问题积累破坏和谐乐观盲目；依不切实际标准择偶难与现实的人建立情感链接幻想阻碍缘分；因内心迷茫反复无常让对方感受不到稳定期待消极消耗热情",uw:"工作迸发创意契合发展方向获认可嘉奖灵感助力成就；于困境寻突破转机吸引资源支持事业现复苏曙光希望点亮前路；在漫长求职后迎来适配机会符合能力或理想方向曙光浮现",rw:"环境或心态消极灵感受抑对工作提不起实质兴趣消极压抑；无清晰规划滥用资源努力偏离需求难见回报资源错配迷茫；无明确求职方向投递行为盲目浪费时间精力方向迷失"},
{n:18,name:"月亮 The Moon",suit:"大阿卡纳",el:"水",em:"🌕",u:"潜意识显现、恐惧不安、欺骗隐瞒、情绪波动",r:"真相暴露、情绪爆发、恐惧消散、直面现实",ul:"被放大的恐惧主导判断过度解读对方言行，因隐性不安拒绝坦诚沟通猜忌引发冷战；因过往情感阴影放大焦虑拒绝新社交恐惧阻碍相遇；被混乱的直觉误导过度猜忌对方意图误解消耗好感",rl:"能感知对方未说出口的情绪借潜意识联结化解隐性矛盾深层情感共鸣；靠潜意识感知筛选契合对象易遇灵魂共振的伴侣直觉吸引缘分；眼神细节中传递心意靠直觉捕捉彼此好感隐性情愫流动",uw:"因害怕失败被否定不敢坚持直觉判断盲目跟风他人方案恐惧影响决策；过度怀疑市场反馈合作伙伴因隐性不安推迟行动错失发展窗口；忽视内心对岗位的排斥感仅因表面光鲜盲目投递自我欺骗",rw:"靠潜意识感知捕捉工作中的隐性问题用细腻观察找到突破口直觉破解难题；从市场未被言说的痛点切入开发契合深层需求的产品洞察隐性需求；凭内在感知选择与自身价值观潜力契合的方向入职后适配度高"},
{n:19,name:"太阳 The Sun",suit:"大阿卡纳",el:"火",em:"☀️",u:"生命力旺盛、快乐坦诚、成功荣耀、贵人相助",r:"自信受挫、热情减退、骄傲自负、人际隔阂",ul:"彼此毫无保留用热情与真诚维系关系，矛盾当面化解无隐藏隔阂坦诚甜蜜；因自身状态积极自然吸引同频者相处轻松无压力自信吸引良缘；双方主动表露心意不搞暧昧拉扯关系快速向确定方向推进明朗化升温",rl:"因生活琐事消磨活力沟通减少或隐藏不满导致关系降温热情消退冷战；因自我否定不敢主动或过度在意缺点难以展现真实魅力自卑错失缘分；一方态度闪躲另一方患得患失关系停滞在不确定状态模糊化内耗",uw:"凭借高效行动力与积极心态出色完成项目获领导认可与晋升奖励成果亮眼；市场反馈积极客户认可度高业务规模稳步扩张盈利显著项目蓬勃发展；面试中自信展现优势与岗位高度匹配快速收到录用通知顺利获offer",rw:"因心态消极动力不足工作频频出错或因害怕失败不敢挑战错失表现机会效率低下；市场遇冷或团队活力不足盈利增长停滞陷入运营困境项目遇瓶颈；因自信不足准备不充分或目标模糊面试难以打动面试官屡屡碰壁"},
{n:20,name:"审判 Judgement",suit:"大阿卡纳",el:"火",em:"📯",u:"因果显现、灵魂觉醒、公正裁决、重大转机",r:"拒绝反思、逃避责任、因果延迟、判断失误",ul:"正视感情中存在的问题共同反思相处模式主动修复裂痕让关系更稳固；清晰认知自身对感情的核心诉求告别盲目择偶明确想要什么适合什么；客观看待分开的原因不沉溺遗憾或怨恨接纳关系结局为新感情腾出空间",rl:"对感情中的问题视而不见用冷战敷衍掩盖分歧长期积压不满导致裂痕扩大；因过往感情挫折自我否定或在择偶中随波逐流不清楚自身需求反复错过适配对象；无法放下前任反复回忆过往甚至主动打扰对方陷入断联-纠缠循环",uw:"正视工作中存在的问题复盘反思寻求改进迎来重大职业转折；审视企业经营中的问题果断调整战略方向把握新机遇；反思过去求职中的不足明确方向做出关键职业决策",rw:"对工作中的问题视而不见拒绝反省过去的失误犹豫不决错过好机会；逃避企业经营中的核心问题延误调整时机因果延迟终将爆发；不愿面对自身短板盲目自信或过度自我否定判断失误"},
{n:21,name:"世界 The World",suit:"大阿卡纳",el:"土",em:"🌍",u:"终极成功、资源整合、内外和谐、长期稳定",r:"整合失败、停滞不前、美中不足、距离感",ul:"经历磨合后达成深度契合彼此支持成长形成良性循环如步入婚姻长期稳定共生；完成个人成长闭环内心丰盈自然吸引同频者无需刻意迎合自我圆满遇良缘；经历充分了解双方需求价值观高度匹配自然进入确定关系的圆满阶段水到渠成",rl:"因一方需求未被满足目标分歧导致付出回馈失衡如长期冷战承诺落空闭环断裂；个人成长未完成过度依赖外界认可择偶时要么妥协要么挑剔难寻匹配对象；只关注表面吸引忽视深层需求匹配始终无法推进到稳定阶段卡在瓶颈",uw:"凭借全局规划与资源整合高效达成目标获团队认可与成果回报项目圆满收尾；完成产品迭代市场验证或盈利闭环企业进入稳定发展期具备开启新业务基础；找到能力兴趣价值三者契合的岗位入职后快速融入实现双向成就职业适配圆满",rw:"因缺乏全局规划资源错配或中途放弃导致目标未达成甚至拖累后续工作项目烂尾；产品未达市场需求资金链断裂或团队协作失衡阶段目标落空企业陷入生存困境；仅看重薪资或稳定性忽视能力匹配与价值认同入职后难以融入频繁跳槽"},

{n:1,name:"权杖王牌 Ace of Wands",suit:"权杖",el:"火",em:"🔥",u:"新的开始、灵感迸发、创造力、充满热情",r:"缺乏动力、灵感枯竭、延迟启动、方向不明",ul:"一见钟情的心动，新恋情的萌芽，感情中注入新活力",rl:"对感情提不起兴趣，新关系迟迟没有进展",uw:"新项目新机遇，充满干劲，灵感爆棚想法多",rw:"项目启动困难，缺乏方向和动力，创意受阻"},
{n:2,name:"权杖二 Two of Wands",suit:"权杖",el:"火",em:"🔥",u:"规划未来、做出选择、远见卓识、掌握主动权",r:"恐惧未知、缺乏规划、犹豫不决、安于现状",ul:"主动规划感情方向，对关系有清晰愿景",rl:"对感情未来感到迷茫，害怕迈出下一步",uw:"制定长远规划，有远见地布局事业，考虑新发展",rw:"害怕改变不敢规划，局限于眼前安逸不愿突破"},
{n:3,name:"权杖三 Three of Wands",suit:"权杖",el:"火",em:"🔥",u:"拓展视野、等待成果、放眼长远、合作共赢",r:"眼界狭窄、成果延迟、计划受阻、缺乏远见",ul:"感情进入新阶段，异地恋有进展，共同展望未来",rl:"感情发展不如预期，异地带来的困扰，缺乏共同目标",uw:"项目初见成效，业务拓展顺利，放眼更大市场",rw:"扩展计划受挫，回报来得比预期慢，视野受限"},
{n:4,name:"权杖四 Four of Wands",suit:"权杖",el:"火",em:"🔥",u:"庆祝成功、和谐稳定、归属感、里程碑",r:"缺乏归属、不稳定感、庆祝被推迟、内部矛盾",ul:"感情稳定甜蜜，订婚或同居，关系得到祝福",rl:"关系缺乏安全感，重要节点被推迟，家庭压力",uw:"项目阶段性成功，团队庆祝，工作环境和谐",rw:"团队氛围紧张，成果未被认可，缺乏归属感"},
{n:5,name:"权杖五 Five of Wands",suit:"权杖",el:"火",em:"🔥",u:"竞争冲突、意见分歧、挑战对抗、各抒己见",r:"逃避冲突、内心挣扎、达成妥协、竞争退出",ul:"感情中争吵不断，各执己见互不相让，竞争对手出现",rl:"避免正面冲突冷处理，双方开始妥协，竞争结束",uw:"职场竞争激烈，团队意见不统一，项目面临挑战",rw:"竞争压力缓解，团队达成共识，或选择退出竞争"},
{n:6,name:"权杖六 Six of Wands",suit:"权杖",el:"火",em:"🔥",u:"胜利凯旋、获得认可、自信荣耀、公众赞誉",r:"失败挫折、缺乏认可、骄傲自大、名声受损",ul:"感情顺利令人羡慕，得到朋友祝福，关系中有成就感",rl:"感情不被看好，虚荣心作祟，过于在意他人眼光",uw:"获得晋升或嘉奖，项目成功被认可，业绩突出",rw:"努力不被认可，项目失利，因骄傲导致失误"},
{n:7,name:"权杖七 Seven of Wands",suit:"权杖",el:"火",em:"🔥",u:"坚守立场、捍卫成果、勇敢面对挑战、不退缩",r:"放弃抵抗、压力过大、失去优势、退缩妥协",ul:"为感情坚定立场，面对外界压力不退缩",rl:"在压力下放弃感情，无法继续坚持，筋疲力尽",uw:"面对竞争坚守阵地，捍卫自己的成果和地位",rw:"竞争中落败，扛不住压力选择退让，失去优势"},
{n:8,name:"权杖八 Eight of Wands",suit:"权杖",el:"火",em:"🔥",u:"快速推进、信息传递、旅行出差、事情加速",r:"延迟阻碍、信息混乱、计划推迟、仓促行事",ul:"感情快速发展，异地恋迎来好消息，关系加速推进",rl:"沟通不畅消息延迟，感情进展缓慢，误会未解",uw:"项目快速推进，出差或调动，效率大增",rw:"项目延期，信息传达混乱，计划被打乱"},
{n:9,name:"权杖九 Nine of Wands",suit:"权杖",el:"火",em:"🔥",u:"坚持到底、警惕防备、最后的考验、韧性",r:"精疲力尽、放弃坚持、过度防备、偏执多疑",ul:"感情经历考验但不放弃，保持警惕保护关系",rl:"在感情中身心俱疲，过度防备不信任对方",uw:"最后冲刺阶段，虽然疲惫但坚持就是胜利",rw:"工作压力到极限想要放弃，过度紧张影响状态"},
{n:10,name:"权杖十 Ten of Wands",suit:"权杖",el:"火",em:"🔥",u:"负担沉重、责任过多、硬撑到底、压力巨大",r:"卸下重担、学会放手、委托他人、减轻压力",ul:"感情成为负担，付出过多身心疲惫，关系压力大",rl:"学会放手不再硬撑，重新分配感情中的责任",uw:"工作量超负荷，一个人扛太多，需要学会分担",rw:"开始把任务分给别人，减轻工作负担，学会说不"},
{n:11,name:"权杖侍从 Page of Wands",suit:"权杖",el:"火",em:"🔥",u:"热情探索、好奇心旺盛、新消息、冒险精神",r:"三分钟热度、缺乏耐心、坏消息、鲁莽冲动",ul:"对新感情充满好奇和热情，大胆追求心动的人",rl:"对感情三分钟热度，新鲜感过后失去兴趣",uw:"积极学习新技能，对新项目充满热情，收到好消息",rw:"做事缺乏耐心虎头蛇尾，冲动决策缺乏思考"},
{n:12,name:"权杖骑士 Knight of Wands",suit:"权杖",el:"火",em:"🔥",u:"行动力强、冒险精神、热情澎湃、勇往直前",r:"急躁冲动、方向迷失、热情消退、鲁莽行事",ul:"热烈追求轰轰烈烈的爱情，充满激情和冒险",rl:"感情来得快去得也快，冲动之下做出后悔的决定",uw:"雷厉风行推进工作，行动力爆棚，敢于冒险创新",rw:"做事急躁不够周全，换工作太频繁，缺乏稳定性"},
{n:13,name:"权杖皇后 Queen of Wands",suit:"权杖",el:"火",em:"🔥",u:"自信魅力、热情大方、独立能干、社交达人",r:"嫉妒自私、控制欲强、情绪化、缺乏自信",ul:"在感情中自信且有魅力，热情经营关系，吸引力强",rl:"嫉妒心重控制对方，情绪化让关系紧张",uw:"工作中散发领导魅力，社交能力强，人缘好",rw:"职场中嫉妒同事，控制欲影响团队，情绪化办事"},

  const texts = ["请闭上眼睛，深呼吸三次...", "让心静下来，专注于你的问题...", "放下杂念，感受内心的声音...","当你准备好了，点击下方按钮。"];

function drawCards() {
  const shuffled = [...DECK].sort(() => Math.random() - 0.5);
  drawnCards = [];
  flippedCount = 0;
  for (let i = 0; i < currentSpread.count; i++) {
    drawnCards.push({
      card: shuffled[i],
      reversed: Math.random() < 0.5,
      position: currentSpread.positions[i]
    });
  }
  renderReading();
  showScreen("reading");
}

// ============ RENDER READING ============
function renderReading() {
  const q = document.getElementById("questionField").value.trim();
  document.getElementById("readingTitle").textContent = currentSpread.name;
  document.getElementById("readingQuestion").textContent = q ? "问题：" + q : "";
  
  const container = document.getElementById("readingCards");
  container.innerHTML = "";
  drawnCards.forEach((d, i) => {
    const div = document.createElement("div");
    div.className = "tarot-card" + (d.reversed ? " reversed" : "");
    div.setAttribute("data-suit", d.card.suit);
    div.innerHTML = `
      <div class="tarot-card-inner">
        <div class="tarot-card-back"></div>
        <div class="tarot-card-front">
          <div style="font-size:10px;color:var(--text2);letter-spacing:1px">${d.position}</div>
          <div class="emoji">${d.card.em}</div>
          <div class="name">${d.card.name.split(" ")[0]}</div>
          <div class="orient">${d.reversed ? "逆位 ↓" : "正位 ↑"}</div>
        </div>
      </div>`;
    div.onclick = () => flipCard(div, i);
    container.appendChild(div);
  });
  
  document.getElementById("readingResults").innerHTML = "";
  document.getElementById("readingAdvice").innerHTML = "";
}

function flipCard(el, index) {
  if (el.classList.contains("flipped")) return;
  el.classList.add("flipped");
  flippedCount++;
  
  const d = drawnCards[index];
  const c = d.card;
  const rev = d.reversed;
  const t = currentTopic;
  
  let keywords = rev ? c.r : c.u;
  let detail;
  if (t === "love") detail = rev ? c.rl : c.ul;
  else if (t === "work") detail = rev ? c.rw : c.uw;
  else detail = rev ? c.r : c.u;

  const html = `
    <div class="result-card">
      <div class="position-label">[ ${d.position} ]</div>
      <h3>${c.em} ${c.name} ${rev ? "(逆位)" : "(正位)"}</h3>
      <div style="font-size:12px;color:var(--text2)">元素：${c.el} | 牌组：${c.suit}</div>
      <div class="keywords">关键词：${keywords}</div>
      <div class="detail">${detail}</div>
    </div>`;
  document.getElementById("readingResults").innerHTML += html;
  
  if (flippedCount === drawnCards.length) {
    showAdvice();
  }
}

function getCardMeaning(card, reversed, topic) {
  if (topic === "love") return reversed ? card.rl : card.ul;
  if (topic === "work") return reversed ? card.rw : card.uw;
  return reversed ? card.r : card.u;
}

// 计算单张牌的正面/负面分数 (正位正面牌 +2, 正位中性 +1, 逆位 -1~-2)
function cardScore(card, reversed) {
  const positive = [0,1,3,4,6,8,10,14,17,19,21]; // 愚人,魔术师,女皇,皇帝,恋人,力量,命运之轮,节制,星星,太阳,世界
  const negative = [12,13,15,16,18]; // 倒吊人,死神,恶魔,塔,月亮
  const n = card.n;
  const suit = card.suit;

  let base = 0;
  if (suit === "大阿卡纳") {
    if (positive.includes(n)) base = 2;
    else if (negative.includes(n)) base = -1;
    else base = 1;
  } else {
    // 小阿卡纳: 1,3,4,6,9,10,13,14偏正面; 5,7,8,9(剑),10(杖)偏负面
    if ([1,2,3,4,6,14].includes(n)) base = 1.5;
    else if ([5,7,8,9,10].includes(n)) base = -0.5;
    else base = 0.5;
    // 圣杯和星币整体更正面
    if (suit === "圣杯" || suit === "星币") base += 0.3;
    // 宝剑整体更尖锐
    if (suit === "宝剑") base -= 0.3;
  }
  return reversed ? -base : base;
}

function showAdvice() {
  const q = document.getElementById("questionField").value.trim();
  const t = currentTopic;
  const revCount = drawnCards.filter(d => d.reversed).length;
  const total = drawnCards.length;

  // === 1. 计算总体得分，判断是/否/不确定 ===
  let totalScore = 0;
  drawnCards.forEach(d => { totalScore += cardScore(d.card, d.reversed); });
  const avgScore = totalScore / total;

  // 结果牌（最后一张）权重更高
  const lastCard = drawnCards[drawnCards.length - 1];
  const lastScore = cardScore(lastCard.card, lastCard.reversed);
  const finalScore = avgScore * 0.6 + (lastScore > 0 ? 1 : lastScore < 0 ? -1 : 0) * 0.4;

  let verdict, verdictEmoji, verdictColor;
  if (finalScore > 0.5) {
    verdict = "是 / 积极"; verdictEmoji = "✅"; verdictColor = "#50d080";
  } else if (finalScore > 0.1) {
    verdict = "偏向是，但需注意"; verdictEmoji = "🔅"; verdictColor = "#e0c040";
  } else if (finalScore > -0.1) {
    verdict = "不确定 / 需要更多时间"; verdictEmoji = "⚖️"; verdictColor = "#a0a0c0";
  } else if (finalScore > -0.5) {
    verdict = "偏向否，有阻碍"; verdictEmoji = "⚠️"; verdictColor = "#e0a040";
  } else {
    verdict = "否 / 需要调整方向"; verdictEmoji = "❌"; verdictColor = "#e06060";
  }

  // === 2. 能量判断 ===
  let energy;
  if (revCount === 0) energy = "所有牌正位，整体能量非常积极";
  else if (revCount === total) energy = "全部逆位，强烈提示需要暂停反思";
  else if (revCount > total/2) energy = "逆位偏多，部分方面需要调整";
  else energy = "正位为主，整体趋势向好";

  // === 3. 元素分析 ===
  const els = {};
  drawnCards.forEach(d => { els[d.card.el] = (els[d.card.el]||0) + 1; });
  const dominant = Object.keys(els).sort((a,b) => els[b]-els[a])[0];
  const elDetail = {
    "火": "行动力和热情是关键——需要大胆去做",
    "水": "情感和直觉是关键——倾听内心的声音",
    "风": "沟通和思考是重点——理清思路好好沟通",
    "土": "现实条件和稳定性是核心——脚踏实地"
  };
  const elHint = elDetail[dominant] || "涉及重要的人生课题";

  // === 4. 根据牌阵讲故事 ===
  let story = "";
  if (total === 1) {
    // 单牌
    const d = drawnCards[0];
    const m = getCardMeaning(d.card, d.reversed, t);
    story = `${d.card.em} ${d.card.name.split(" ")[0]}${d.reversed?"(逆位)":"(正位)"}告诉你：${m}`;
  } else if (total === 3) {
    // 时间之流: 过去-现在-未来
    const [past, now, future] = drawnCards;
    const pm = getCardMeaning(past.card, past.reversed, t).split("，")[0];
    const nm = getCardMeaning(now.card, now.reversed, t).split("，")[0];
    const fm = getCardMeaning(future.card, future.reversed, t);
    story = `过去，${past.card.name.split(" ")[0]}${past.reversed?"(逆)":""}显示「${pm}」；`
      + `现在，${now.card.name.split(" ")[0]}${now.reversed?"(逆)":""}的状态是「${nm}」；`
      + `未来走向，${future.card.name.split(" ")[0]}${future.reversed?"(逆)":""}指引：${fm}`;
  } else if (total === 5) {
    // 关系十字
    const [you, them, challenge, suggest, outcome] = drawnCards;
    const ym = getCardMeaning(you.card, you.reversed, t).split("，")[0];
    const tm2 = getCardMeaning(them.card, them.reversed, t).split("，")[0];
    const cm = getCardMeaning(challenge.card, challenge.reversed, t).split("，")[0];
    const sm = getCardMeaning(suggest.card, suggest.reversed, t).split("，")[0];
    const om = getCardMeaning(outcome.card, outcome.reversed, t);
    story = `你的状态：${ym}。对方的状态：${tm2}。`
      + `你们之间的挑战是：${cm}。`
      + `牌面建议你：${sm}。`
      + `最终走向：${om}`;
  } else {
    // 凯尔特十字或其他
    drawnCards.forEach(d => {
      const m = getCardMeaning(d.card, d.reversed, t).split("，")[0];
      story += `「${d.position}」${d.card.name.split(" ")[0]}${d.reversed?"(逆)":""}：${m}。`;
    });
    // 最终结果单独展开
    const last = drawnCards[drawnCards.length - 1];
    const lastM = getCardMeaning(last.card, last.reversed, t);
    story += `\n\n最终结果 ${last.card.name.split(" ")[0]} 的完整指引：${lastM}`;
  }

  // === 5. 组合输出 ===
  let html = `<div class="advice-box">`;

  // 直接结论
  if (q) {
    html += `<div style="text-align:center;margin-bottom:16px">
      <div style="font-size:14px;color:var(--text2);margin-bottom:6px">关于「${q}」</div>
      <div style="font-size:36px;margin:8px 0">${verdictEmoji}</div>
      <div style="font-size:22px;font-weight:bold;color:${verdictColor};letter-spacing:2px">${verdict}</div>
    </div>
    <hr style="border:none;border-top:1px solid rgba(212,168,67,0.2);margin:14px 0">`;
  } else {
    html += `<div style="text-align:center;margin-bottom:16px">
      <div style="font-size:36px;margin:8px 0">${verdictEmoji}</div>
      <div style="font-size:20px;font-weight:bold;color:${verdictColor};letter-spacing:2px">${verdict}</div>
    </div>
    <hr style="border:none;border-top:1px solid rgba(212,168,67,0.2);margin:14px 0">`;
  }

  // 牌阵故事解读
  html += `<h3 style="color:var(--gold);margin-bottom:10px;font-size:15px">📖 牌面解读</h3>
    <p style="text-align:left;line-height:1.9;font-size:14px;margin-bottom:12px">${story.replace(/\n/g,"<br>")}</p>
    <hr style="border:none;border-top:1px solid rgba(212,168,67,0.2);margin:14px 0">`;

  // 能量和元素
  html += `<p style="font-size:13px">${energy}。${elHint}。</p>`;

  html += `<p style="margin-top:14px;font-style:italic;font-size:12px;color:var(--text2)">
      塔罗从不给标准答案，而是帮你理清思绪，让你在迷茫中找到属于自己的方向。
    </p>
  </div>`;

  document.getElementById("readingAdvice").innerHTML = html;
}

function filterCards(suit, el) {
  if (el) {
    document.querySelectorAll("#browseTabs .tab").forEach(t => t.classList.remove("active"));
    el.classList.add("active");
  }
  const grid = document.getElementById("cardsGrid");
  const cards = suit === "全部" ? DECK : DECK.filter(c => c.suit === suit);
  grid.innerHTML = cards.map(c => `
    <div class="card-item" onclick="showCardDetail(${DECK.indexOf(c)})">
      <div class="emoji">${c.em}</div>
      <div class="name">${c.name.split(" ")[0]}</div>
      <div style="font-size:11px;color:var(--text2)">${c.el}元素</div>
    </div>`).join("");
}

function showCardDetail(idx) {
  const c = DECK[idx];
  document.getElementById("modalContent").innerHTML = `
    <div class="emoji">${c.em}</div>
    <h2>${c.name}</h2>
    <div style="text-align:center;color:var(--text2);font-size:13px;margin-bottom:16px">
      ${c.suit} | ${c.el}元素 | #${c.n}
    </div>
    <div class="modal-section"><h4>正位关键词</h4><p>${c.u}</p></div>
    <div class="modal-section"><h4>逆位关键词</h4><p>${c.r}</p></div>
    <div class="modal-section"><h4>💕 感情 · 正位</h4><p>${c.ul}</p></div>
    <div class="modal-section"><h4>💕 感情 · 逆位</h4><p>${c.rl}</p></div>
    <div class="modal-section"><h4>💼 事业 · 正位</h4><p>${c.uw}</p></div>
    <div class="modal-section"><h4>💼 事业 · 逆位</h4><p>${c.rw}</p></div>`;
  document.getElementById("cardModal").classList.add("active");
}

function closeModal() {
  document.getElementById("cardModal").classList.remove("active");
}

// ============ TIPS ============
function showTips() {
  showScreen("tips");
  const shuffled = [...TIPS].sort(() => Math.random() - 0.5).slice(0, 3);
  document.getElementById("tipsContent").innerHTML = shuffled.map((t,i) =>
    `<div class="tip-box">${i+1}. ${t}</div>`
  ).join("");
}

// ============ INIT ============
filterCards("全部");
</script>
