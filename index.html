<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>塔罗牌占卜系统</title>
<style>
:root {
  --bg: #0f0a1e;
  --bg2: #1a1333;
  --gold: #d4a843;
  --gold2: #f0d060;
  --purple: #6b3fa0;
  --text: #e8e0f0;
  --text2: #a89cc0;
  --card-bg: #231a3a;
  --card-border: #3d2a6e;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}
body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: -1;
  background: url('bg.jpeg') center center / cover no-repeat fixed;
  opacity: 0.25;
}
body::after {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: -1;
  background:
    linear-gradient(to bottom, rgba(15,10,30,0.3) 0%, transparent 30%, transparent 70%, rgba(15,10,30,0.5) 100%);
}
.container { max-width: 600px; margin: 0 auto; padding: 16px; }
h1, h2, h3 { color: var(--gold); }
button {
  background: linear-gradient(135deg, var(--purple), #4a2080);
  color: var(--gold2);
  border: 1px solid rgba(212,168,67,0.5);
  border-radius: 12px;
  padding: 14px 28px;
  font-size: 17px;
  cursor: pointer;
  width: 100%;
  margin: 6px 0;
  transition: all 0.3s;
  -webkit-tap-highlight-color: transparent;
  box-shadow: 0 2px 10px rgba(107,63,160,0.3);
  letter-spacing: 1px;
  position: relative;
  overflow: hidden;
}
button::after {
  content: "";
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: linear-gradient(transparent, rgba(255,255,255,0.03), transparent);
  transform: rotate(45deg);
  transition: 0.5s;
}
button:active {
  transform: scale(0.97);
  background: linear-gradient(135deg, #4a2080, var(--purple));
  box-shadow: 0 0 20px rgba(212,168,67,0.2);
}
.btn-sm { padding: 10px 18px; font-size: 15px; width: auto; display: inline-block; margin: 4px; }
.btn-back { background: transparent; border: 1px solid var(--text2); color: var(--text2); }
.screen { display: none; animation: fadeIn 0.4s; }
.screen.active { display: block; }
@keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

/* Banner */
.banner {
  text-align: center;
  padding: 40px 0 20px;
}
.banner h1 {
  font-size: 30px;
  margin-bottom: 8px;
  text-shadow: 0 0 20px rgba(212,168,67,0.4);
  letter-spacing: 4px;
}
.banner .subtitle { color: var(--text2); font-size: 14px; letter-spacing: 2px; }
.banner .crystal {
  font-size: 72px;
  margin: 20px 0;
  animation: crystalFloat 3s ease-in-out infinite;
  filter: drop-shadow(0 0 20px rgba(212,168,67,0.3));
}
@keyframes crystalFloat {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

/* Cards grid */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 12px;
  margin: 16px 0;
}
.card-item {
  background: linear-gradient(145deg, var(--card-bg), #1a1230);
  border: 1px solid var(--card-border);
  border-radius: 12px;
  padding: 14px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
}
.card-item::before {
  content: "";
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: conic-gradient(from 0deg, transparent, rgba(212,168,67,0.05), transparent, rgba(107,63,160,0.05), transparent);
  animation: cardShimmer 6s linear infinite;
}
@keyframes cardShimmer { 100% { transform: rotate(360deg); } }
.card-item:active { border-color: var(--gold); box-shadow: 0 0 15px rgba(212,168,67,0.3); }
.card-item .emoji { font-size: 36px; position: relative; z-index: 1; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }
.card-item .name { font-size: 13px; margin-top: 6px; color: var(--gold); position: relative; z-index: 1; }

/* Reading card display */
.reading-cards {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 12px;
  margin: 20px 0;
}
.tarot-card {
  width: 110px;
  height: 170px;
  perspective: 800px;
  cursor: pointer;
}
.tarot-card-inner {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.6s;
}
.tarot-card.flipped .tarot-card-inner { transform: rotateY(180deg); }
.tarot-card.reversed.flipped .tarot-card-inner { transform: rotateY(180deg) rotate(180deg); }
.tarot-card-front, .tarot-card-back {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  border-radius: 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.tarot-card-back {
  background: url('card-back.jpeg') center center / cover no-repeat;
  border: 2px solid var(--gold);
  box-shadow: inset 0 0 20px rgba(0,0,0,0.3), 0 4px 15px rgba(0,0,0,0.4), 0 0 10px rgba(212,168,67,0.15);
}
.tarot-card-back::before {
  content: "";
  position: absolute;
  inset: 4px;
  border: 1px solid rgba(212,168,67,0.4);
  border-radius: 6px;
}
.tarot-card-back::after {
  content: "";
}
.tarot-card-front {
  background: linear-gradient(170deg, #2a1e45 0%, #1a1230 50%, #231a3a 100%);
  border: 2px solid var(--card-border);
  transform: rotateY(180deg);
  padding: 8px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.4);
}
.tarot-card.flipped .tarot-card-front {
  border-color: var(--gold);
  box-shadow: 0 0 20px rgba(212,168,67,0.25), 0 4px 15px rgba(0,0,0,0.4);
}
.tarot-card-front .emoji { font-size: 40px; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.4)); }
.tarot-card-front .name { font-size: 11px; color: var(--gold); margin-top: 4px; text-align: center; text-shadow: 0 0 8px rgba(212,168,67,0.3); }
.tarot-card-front .orient { font-size: 12px; color: var(--text2); margin-top: 2px; }
/* Suit-colored glow on flip */
.tarot-card.flipped[data-suit="权杖"] .tarot-card-front { box-shadow: 0 0 20px rgba(255,100,30,0.3), 0 4px 15px rgba(0,0,0,0.4); border-color: #e07030; }
.tarot-card.flipped[data-suit="圣杯"] .tarot-card-front { box-shadow: 0 0 20px rgba(60,130,255,0.3), 0 4px 15px rgba(0,0,0,0.4); border-color: #4090e0; }
.tarot-card.flipped[data-suit="宝剑"] .tarot-card-front { box-shadow: 0 0 20px rgba(180,200,255,0.3), 0 4px 15px rgba(0,0,0,0.4); border-color: #90a8d0; }
.tarot-card.flipped[data-suit="星币"] .tarot-card-front { box-shadow: 0 0 20px rgba(80,200,80,0.3), 0 4px 15px rgba(0,0,0,0.4); border-color: #50b050; }
.tarot-card.flipped[data-suit="大阿卡纳"] .tarot-card-front { box-shadow: 0 0 25px rgba(212,168,67,0.4), 0 4px 15px rgba(0,0,0,0.4); border-color: var(--gold); }

/* Result */
.result-card {
  background: linear-gradient(145deg, var(--card-bg), #1a1230);
  border: 1px solid var(--card-border);
  border-radius: 14px;
  padding: 18px;
  margin: 14px 0;
  position: relative;
  overflow: hidden;
  animation: resultSlideIn 0.5s ease-out;
}
@keyframes resultSlideIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
.result-card::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}
.result-card h3 { font-size: 16px; margin-bottom: 10px; text-shadow: 0 0 10px rgba(212,168,67,0.2); }
.result-card .position-label {
  color: var(--gold);
  font-size: 12px;
  margin-bottom: 4px;
  letter-spacing: 2px;
  text-transform: uppercase;
}
.result-card .keywords {
  color: var(--gold2);
  font-size: 14px;
  margin: 8px 0;
  padding: 8px 12px;
  background: rgba(212,168,67,0.06);
  border-radius: 8px;
  border-left: 3px solid var(--gold);
}
.result-card .detail { color: var(--text); font-size: 14px; line-height: 1.8; }
.advice-box {
  background: linear-gradient(135deg, #1a1040, #2a1555, #1a1040);
  border: 1px solid var(--gold);
  border-radius: 14px;
  padding: 22px;
  margin: 16px 0;
  text-align: center;
  position: relative;
  overflow: hidden;
  box-shadow: 0 0 30px rgba(212,168,67,0.1);
}
.advice-box::before {
  content: "";
  position: absolute;
  inset: 4px;
  border: 1px solid rgba(212,168,67,0.15);
  border-radius: 10px;
  pointer-events: none;
}
.advice-box p { color: var(--text2); font-size: 14px; line-height: 1.8; }

/* Filter tabs */
.tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin: 12px 0;
}
.tab {
  padding: 8px 14px;
  border-radius: 20px;
  border: 1px solid var(--card-border);
  background: var(--card-bg);
  color: var(--text2);
  font-size: 13px;
  cursor: pointer;
}
.tab.active { border-color: var(--gold); color: var(--gold); background: #2a1a4a; }

/* Shuffle animation */
.shuffle-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(15,10,30,0.95);
  z-index: 100;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.shuffle-overlay.active { display: flex; }
.shuffle-text {
  color: var(--gold);
  font-size: 22px;
  margin-top: 24px;
  letter-spacing: 4px;
  text-shadow: 0 0 15px rgba(212,168,67,0.4);
  animation: textGlow 1.5s ease-in-out infinite;
}
@keyframes textGlow {
  0%,100% { opacity: 0.8; }
  50% { opacity: 1; text-shadow: 0 0 25px rgba(212,168,67,0.6); }
}
.shuffle-cards {
  position: relative;
  width: 120px;
  height: 170px;
}
.shuffle-cards .s-card {
  position: absolute;
  width: 80px;
  height: 120px;
  background: url('card-back.jpeg') center center / cover no-repeat;
  border: 2px solid var(--gold);
  border-radius: 8px;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  animation: shuffleAnim 0.5s infinite alternate;
  box-shadow: 0 4px 15px rgba(0,0,0,0.4), 0 0 10px rgba(212,168,67,0.1);
}
.shuffle-cards .s-card:nth-child(2) { animation-delay: 0.12s; }
.shuffle-cards .s-card:nth-child(3) { animation-delay: 0.24s; }
@keyframes shuffleAnim {
  0% { transform: translate(-50%, -50%) rotate(-8deg) translateX(-25px); }
  100% { transform: translate(-50%, -50%) rotate(8deg) translateX(25px); }
}

/* Meditation */
.meditation { text-align: center; padding: 30px 0; }
.meditation p {
  color: var(--text2);
  font-size: 18px;
  margin: 12px 0;
  line-height: 1.8;
  letter-spacing: 2px;
  animation: breathe 4s ease-in-out infinite;
}
@keyframes breathe {
  0%,100% { opacity: 0.7; }
  50% { opacity: 1; }
}

/* Tips */
.tip-box {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 12px;
  padding: 16px;
  margin: 10px 0;
  line-height: 1.7;
  font-size: 14px;
  color: var(--text);
}

/* Card detail modal */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(15,10,30,0.92);
  z-index: 200;
  overflow-y: auto;
  padding: 20px;
}
.modal-overlay.active { display: block; }
.modal-content {
  max-width: 500px;
  margin: 20px auto;
  background: linear-gradient(170deg, #1e1540, var(--bg2));
  border: 1px solid var(--gold);
  border-radius: 16px;
  padding: 24px;
  box-shadow: 0 0 40px rgba(212,168,67,0.1), 0 20px 40px rgba(0,0,0,0.5);
  position: relative;
  overflow: hidden;
}
.modal-content::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}
.modal-content .emoji { font-size: 56px; text-align: center; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4)); }
.modal-content h2 { text-align: center; font-size: 20px; margin: 8px 0 16px; text-shadow: 0 0 15px rgba(212,168,67,0.3); }
.modal-section { margin: 14px 0; padding: 10px 12px; background: rgba(255,255,255,0.02); border-radius: 8px; }
.modal-section h4 { color: var(--gold); font-size: 13px; margin-bottom: 6px; letter-spacing: 1px; }
.modal-section p { font-size: 14px; line-height: 1.7; color: var(--text2); }

input[type="text"] {
  width: 100%;
  padding: 12px 16px;
  border-radius: 10px;
  border: 1px solid var(--card-border);
  background: var(--card-bg);
  color: var(--text);
  font-size: 16px;
  margin: 8px 0;
}
input[type="text"]::placeholder { color: #665a80; }
</style>
</head>
<body>
<div class="container">

<!-- Home Screen -->
<div id="home" class="screen active">
  <div class="banner">
    <div class="crystal">🔮</div>
    <h1>塔罗牌占卜</h1>
    <div class="subtitle">基于韦特塔罗体系 · 78张完整牌组</div>
  </div>
  <button onclick="showScreen('spread-select')">🌙 开始占卜</button>
  <button onclick="showScreen('browse')">📖 浏览塔罗牌</button>
  <button onclick="showTips()">✨ 塔罗小知识</button>
</div>

<!-- Spread Select -->
<div id="spread-select" class="screen">
  <h2>选择牌阵</h2>
  <button onclick="selectSpread('single')">🎴 单牌占卜<br><small style="color:var(--text2)">快速洞察，1张牌</small></button>
  <button onclick="selectSpread('three')">🕐 时间之流<br><small style="color:var(--text2)">过去·现在·未来，3张牌</small></button>
  <button onclick="selectSpread('relationship')">💕 关系十字<br><small style="color:var(--text2)">自己·对方·挑战·建议·结果，5张牌</small></button>
  <button onclick="selectSpread('celtic')">🌟 凯尔特十字<br><small style="color:var(--text2)">全面深度解读，10张牌</small></button>
  <br>
  <button class="btn-back" onclick="showScreen('home')">返回</button>
</div>

<!-- Question Input -->
<div id="question-input" class="screen">
  <h2>输入你的问题</h2>
  <p style="color:var(--text2);font-size:13px;margin:10px 0;line-height:1.6">
    提示：问题要单一、具体、短期（3-6个月）<br>
    避免问生老病死、具体时间和数字
  </p>
  <input type="text" id="questionField" placeholder="你想问什么？（可留空）">
  <h3 style="margin:16px 0 8px;font-size:16px">选择解读方向</h3>
  <div class="tabs" id="topicTabs">
    <div class="tab active" onclick="selectTopic('general',this)">🔮 综合</div>
    <div class="tab" onclick="selectTopic('love',this)">💕 感情</div>
    <div class="tab" onclick="selectTopic('work',this)">💼 事业</div>
  </div>
  <button onclick="startMeditation()">开始冥想</button>
  <button class="btn-back" onclick="showScreen('spread-select')">返回</button>
</div>

<!-- Meditation -->
<div id="meditation" class="screen">
  <div class="meditation">
    <div style="font-size:60px;margin-bottom:20px">🧘</div>
    <p id="meditationText"></p>
    <button id="meditationBtn" style="display:none" onclick="startShuffle()">我准备好了</button>
  </div>
</div>

<!-- Shuffle -->
<div class="shuffle-overlay" id="shuffleOverlay">
  <div class="shuffle-cards">
    <div class="s-card"></div>
    <div class="s-card"></div>
    <div class="s-card"></div>
  </div>
  <div class="shuffle-text">洗牌中...</div>
</div>

<!-- Reading -->
<div id="reading" class="screen">
  <h2 id="readingTitle"></h2>
  <p id="readingQuestion" style="color:var(--text2);font-size:13px;margin:4px 0 12px"></p>
  <p style="color:var(--text2);font-size:13px;text-align:center;margin-bottom:8px">点击卡牌翻开</p>
  <div class="reading-cards" id="readingCards"></div>
  <div id="readingResults"></div>
  <div id="readingAdvice"></div>
  <button onclick="showScreen('home')" style="margin-top:12px">返回首页</button>
  <button class="btn-back" onclick="showScreen('spread-select')">再占一次</button>
</div>

<!-- Browse -->
<div id="browse" class="screen">
  <h2>浏览塔罗牌</h2>
  <div class="tabs" id="browseTabs">
    <div class="tab active" onclick="filterCards('全部',this)">全部(78)</div>
    <div class="tab" onclick="filterCards('大阿卡纳',this)">大阿卡纳(22)</div>
    <div class="tab" onclick="filterCards('权杖',this)">🔥权杖(14)</div>
    <div class="tab" onclick="filterCards('圣杯',this)">🏆圣杯(14)</div>
    <div class="tab" onclick="filterCards('宝剑',this)">⚔️宝剑(14)</div>
    <div class="tab" onclick="filterCards('星币',this)">💰星币(14)</div>
  </div>
  <div class="cards-grid" id="cardsGrid"></div>
  <button class="btn-back" onclick="showScreen('home')">返回</button>
</div>

<!-- Tips -->
<div id="tips" class="screen">
  <h2>✨ 塔罗小知识</h2>
  <div id="tipsContent"></div>
  <button onclick="showTips()">换一批</button>
  <button class="btn-back" onclick="showScreen('home')">返回</button>
</div>

<!-- Card Detail Modal -->
<div class="modal-overlay" id="cardModal">
  <div class="modal-content" id="modalContent"></div>
  <button style="max-width:500px;margin:10px auto;display:block" onclick="closeModal()">关闭</button>
</div>

</div>

{n:1,name:"圣杯王牌 Ace of Cups",suit:"圣杯",el:"水",em:"🏆",u:"新的情感、爱的萌芽、直觉涌现、内心充盈",r:"情感封闭、爱意受阻、内心空虚、直觉迟钝",ul:"新恋情降临，心中涌起强烈的爱意，情感连接深刻",rl:"对感情关上心门，害怕受伤不愿敞开自己",uw:"对工作充满热爱，新项目带来情感满足，创意灵感涌现",rw:"对工作失去热情，感到空虚无意义，缺乏情感投入"},
{n:2,name:"圣杯二 Two of Cups",suit:"圣杯",el:"水",em:"🏆",u:"相互吸引、伙伴关系、心灵连接、平等交流",r:"关系失衡、沟通断裂、互不理解、分离分手",ul:"两情相悦心灵契合，关系平等互相尊重，甜蜜恋爱",rl:"感情失衡一方付出多，沟通出问题，面临分离",uw:"找到好的合作伙伴，双方默契配合，互利共赢",rw:"合作关系出现裂痕，理念不合，伙伴关系破裂"},
{n:3,name:"圣杯三 Three of Cups",suit:"圣杯",el:"水",em:"🏆",u:"欢庆聚会、友情支持、团体和谐、分享喜悦",r:"社交疲惫、圈子矛盾、过度放纵、三角关系",ul:"朋友祝福的感情，社交中遇到心仪对象，快乐分享",rl:"第三者介入的风险，朋友圈影响感情，社交中的暧昧",uw:"团队合作愉快，项目庆功，同事关系融洽",rw:"办公室小团体矛盾，过度社交影响工作，团队不和"},
{n:4,name:"圣杯四 Four of Cups",suit:"圣杯",el:"水",em:"🏆",u:"冷漠无感、不满足、沉思内省、忽视机会",r:"重新振作、抓住机会、走出低迷、感恩珍惜",ul:"对感情麻木无感，身在福中不知福，忽视对方的好",rl:"重新发现对方的好，走出情感低谷，珍惜眼前人",uw:"对工作感到厌倦，眼前有机会却看不到，缺乏动力",rw:"走出倦怠期，重新发现工作的意义，抓住新机会"},
{n:5,name:"圣杯五 Five of Cups",suit:"圣杯",el:"水",em:"🏆",u:"悲伤失落、遗憾后悔、只看失去、沉浸悲痛",r:"走出悲伤、接受现实、看到希望、放下遗憾",ul:"感情中的伤痛和遗憾，只看到失去的忽略还拥有的",rl:"从失恋中走出来，接受结果，准备好迎接新感情",uw:"项目失败后沉浸在失落中，只关注损失忽视机会",rw:"从失败中恢复，吸取教训重新出发，看到新可能"},
{n:6,name:"圣杯六 Six of Cups",suit:"圣杯",el:"水",em:"🏆",u:"童年回忆、纯真美好、旧人重逢、怀旧温馨",r:"活在过去、不切实际的怀旧、成长之痛、放不下",ul:"初恋般的纯真感情，旧情人重逢，温馨甜蜜的回忆",rl:"沉溺于过去的感情无法前进，用过去标准衡量现在",uw:"回归初心找到工作热情，老客户回来，与旧同事合作",rw:"沉迷过去的辉煌不愿面对现实，怀旧心态阻碍进步"},
{n:7,name:"圣杯七 Seven of Cups",suit:"圣杯",el:"水",em:"🏆",u:"幻想迷雾、选择太多、白日梦、诱惑陷阱",r:"回归现实、做出选择、看清真相、脚踏实地",ul:"对感情有不切实际的幻想，选择太多反而迷失",rl:"看清感情真相，不再幻想，做出务实的选择",uw:"选择太多眼花缭乱，沉迷空想不付诸行动",rw:"从空想回到现实，明确目标专注执行"},
{n:8,name:"圣杯八 Eight of Cups",suit:"圣杯",el:"水",em:"🏆",u:"主动离开、追寻内心、放下已有、寻找更深意义",r:"害怕离开、随波逐流、不愿放手、逃避内心",ul:"主动离开不再满足的关系，追寻真正想要的感情",rl:"明知不合适却不舍得离开，害怕孤独将就凑合",uw:"离开不再满足的工作去追求真正热爱的事",rw:"在不喜欢的工作中将就，没有勇气做出改变"},
{n:9,name:"圣杯九 Nine of Cups",suit:"圣杯",el:"水",em:"🏆",u:"心愿达成、满足感、享受成果、幸福快乐",r:"贪心不足、虚荣炫耀、内心空虚、物质主义",ul:"感情中心愿达成，满足幸福的状态，如愿以偿",rl:"对感情期望过高永远不满足，用物质衡量爱情",uw:"工作目标达成，享受努力的成果，心满意足",rw:"取得成绩后骄傲自满，过度追求物质回报忽略初心"},
{n:10,name:"圣杯十 Ten of Cups",suit:"圣杯",el:"水",em:"🏆",u:"家庭幸福、情感圆满、和谐美满、长久之爱",r:"家庭矛盾、关系破裂、理想与现实落差、不和谐",ul:"感情圆满幸福，家庭和睦，长久稳定的爱情",rl:"家庭矛盾频发，理想中的爱情与现实差距大",uw:"团队如家般和谐，事业与生活平衡，工作带来幸福感",rw:"工作影响家庭关系，团队不和，对工作环境不满"},
{n:11,name:"圣杯侍从 Page of Cups",suit:"圣杯",el:"水",em:"🏆",u:"情感萌芽、浪漫天真、创意灵感、好消息",r:"情绪化、不成熟、幻想过多、逃避现实",ul:"初恋般的心动，纯真浪漫的表白，收到爱的信号",rl:"对感情过于幼稚天真，情绪化让对方难以招架",uw:"有创意新想法，收到好消息，用直觉解决问题",rw:"想法不成熟难以落地，情绪影响工作表现"},
{n:12,name:"圣杯骑士 Knight of Cups",suit:"圣杯",el:"水",em:"🏆",u:"浪漫追求、温柔体贴、带着爱意前行、理想主义",r:"不切实际、花言巧语、情感操控、逃避承诺",ul:"浪漫的追求者出现，用心呵护感情，温柔而坚定",rl:"嘴上说爱却不付诸行动，花言巧语不真诚，逃避承诺",uw:"带着热爱做事，用创意推动项目，追求理想工作",rw:"过于理想化不切实际，说得多做得少"},
{n:13,name:"圣杯皇后 Queen of Cups",suit:"圣杯",el:"水",em:"🏆",u:"温柔共情、直觉敏锐、情感丰富、关怀体贴",r:"情绪过载、过度敏感、忽视自我、情感依赖",ul:"深情且体贴的伴侣，直觉感知对方需求，温暖治愈",rl:"过度付出忽视自己需求，情绪化让关系疲惫",uw:"用同理心处理团队关系，直觉判断准确，创意工作出色",rw:"情绪影响判断力，过度在意他人看法，忽视自身需求"},
{n:14,name:"圣杯国王 King of Cups",suit:"圣杯",el:"水",em:"🏆",u:"情感成熟、冷静理性、包容大度、情商高手",r:"情感压抑、表面冷静内心波涛、情绪操控、逃避感受",ul:"成熟稳重的伴侣，理性处理感情问题，包容且深情",rl:"压抑真实感受不愿表达，用冷漠掩饰内心波动",uw:"高情商领导，善于平衡团队情绪，冷静决策",rw:"表面冷静内心焦虑，用情绪操控团队，不愿表达真实想法"},
// === SWORDS (14) ===
{n:1,name:"宝剑王牌 Ace of Swords",suit:"宝剑",el:"风",em:"⚔️",u:"真相大白、思维清晰、突破性想法、正义胜利",r:"思维混乱、真相被掩盖、沟通障碍、判断失误",ul:"看清感情真相，理性面对关系问题，清晰的沟通",rl:"感情中有误解和隐瞒，沟通不畅真相不明",uw:"头脑清晰找到解决方案，新想法突破瓶颈",rw:"思路混乱判断失误，信息不全导致错误决策"},
{n:2,name:"宝剑二 Two of Swords",suit:"宝剑",el:"风",em:"⚔️",u:"左右为难、僵持不下、逃避选择、内心矛盾",r:"打破僵局、做出决定、信息浮现、不再逃避",ul:"感情中左右为难，回避核心问题，两难抉择",rl:"终于面对感情问题做出选择，打破僵持状态",uw:"工作中面临两难选择，犹豫不决拖延决策",rw:"获得新信息打破僵局，终于做出工作上的决定"},
{n:3,name:"宝剑三 Three of Swords",suit:"宝剑",el:"风",em:"⚔️",u:"心碎伤痛、背叛打击、悲伤难过、真相刺痛",r:"伤痛愈合、原谅释怀、走出悲伤、自我修复",ul:"感情遭受重大打击，背叛或分手的痛苦，心碎时刻",rl:"从感情伤痛中恢复，选择原谅或释怀，开始愈合",uw:"工作中受到打击，被同事背后议论，项目失败的痛",rw:"从职场挫折中恢复，放下怨恨重新出发"},
{n:4,name:"宝剑四 Four of Swords",suit:"宝剑",el:"风",em:"⚔️",u:"休息恢复、暂停充电、冥想反思、养精蓄锐",r:"急于行动、无法放松、焦虑不安、强撑硬扛",ul:"感情需要冷静期，给彼此空间思考，休息后再决定",rl:"无法冷静下来，焦虑不安急于解决问题反而更糟",uw:"需要休息恢复精力，暂停项目重新规划",rw:"不懂休息强撑工作，焦虑导致效率低下，需要放慢"},
{n:5,name:"宝剑五 Five of Swords",suit:"宝剑",el:"风",em:"⚔️",u:"冲突争执、赢了面子输了里子、不择手段、自私",r:"和解认错、放下争斗、接受失败、吸取教训",ul:"感情中激烈争吵互相伤害，赢了吵架输了感情",rl:"双方放下争执选择和解，承认错误修复关系",uw:"职场争斗不择手段，同事间恶性竞争，赢了项目失了人心",rw:"放下职场纷争，承认失误寻求和解，不再恶性竞争"},
{n:6,name:"宝剑六 Six of Swords",suit:"宝剑",el:"风",em:"⚔️",u:"离开困境、过渡转变、走向平静、带着伤前行",r:"无法脱身、原地打转、抗拒改变、旧问题重现",ul:"离开不健康的关系走向新生活，虽有伤但在前进",rl:"想离开却走不了，反复纠缠，旧感情问题重现",uw:"离开不好的工作环境，过渡期虽难但在变好",rw:"想换工作却走不出去，被困在不满意的岗位上"},
{n:7,name:"宝剑七 Seven of Swords",suit:"宝剑",el:"风",em:"⚔️",u:"欺骗策略、偷偷行动、小聪明、不诚实",r:"谎言被揭穿、良心发现、坦诚面对、自欺欺人",ul:"感情中有欺骗或隐瞒，一方在偷偷做不诚实的事",rl:"谎言被揭穿真相大白，或良心发现选择坦诚",uw:"职场中有人耍小聪明，窃取成果或暗中算计",rw:"不诚实的行为被发现，或决定不再走捷径回归正道"},
{n:8,name:"宝剑八 Eight of Swords",suit:"宝剑",el:"风",em:"⚔️",u:"自我囚禁、思维受困、无力感、看不到出路",r:"解放自己、打破限制、换个角度、重获自由",ul:"在感情中感到被困住，自我限制看不到出路",rl:"意识到束缚来自自己，打破思维局限重获自由",uw:"工作中感到无能为力，被困在不喜欢的处境中",rw:"换个角度看到出路，突破自我设限，重拾信心"},
{n:9,name:"宝剑九 Nine of Swords",suit:"宝剑",el:"风",em:"⚔️",u:"焦虑失眠、噩梦恐惧、过度担忧、心理压力",r:"走出焦虑、面对恐惧、寻求帮助、最坏的已过去",ul:"对感情过度焦虑和担忧，失眠想太多，恐惧不安",rl:"开始走出感情焦虑，意识到很多担忧是多余的",uw:"工作压力导致焦虑失眠，对前途过度恐慌",rw:"走出工作焦虑期，寻求帮助或意识到没那么糟"},
{n:10,name:"宝剑十 Ten of Swords",suit:"宝剑",el:"风",em:"⚔️",u:"彻底结束、最痛的底部、背叛打击、否极泰来",r:"最坏已过、开始恢复、拒绝放手、苦难延续",ul:"感情走到尽头彻底结束，最痛的时刻但也是新开始",rl:"感情虽然很痛但拒绝接受结束，或最坏的已经过去",uw:"项目彻底失败或被裁员，到了最低谷但否极泰来",rw:"最困难的时期正在过去，或不愿接受失败继续硬撑"},
{n:11,name:"宝剑侍从 Page of Swords",suit:"宝剑",el:"风",em:"⚔️",u:"好奇心强、思维活跃、善于观察、新想法",r:"八卦多嘴、尖酸刻薄、狡猾不诚实、思维散乱",ul:"对感情充满好奇和探索欲，用理性分析关系",rl:"在感情中话太多管太宽，八卦或尖酸的言语伤人",uw:"善于调研分析，提出新颖观点，学习能力强",rw:"办公室八卦制造者，话多但不靠谱，想法散乱不落地"},
{n:12,name:"宝剑骑士 Knight of Swords",suit:"宝剑",el:"风",em:"⚔️",u:"思维敏捷、直言不讳、雷厉风行、追求真相",r:"言语伤人、冲动莽撞、不顾后果、思维偏激",ul:"直接表达心意不拐弯抹角，快速推进关系",rl:"说话太直伤害对方，冲动之下说出后悔的话",uw:"快速推进项目，直言不讳指出问题，效率极高",rw:"做事不考虑后果，言语冒犯同事，冲动决策"},
{n:13,name:"宝剑皇后 Queen of Swords",suit:"宝剑",el:"风",em:"⚔️",u:"独立理性、洞察力强、坦诚直率、经验智慧",r:"冷漠尖刻、过于挑剔、固执己见、情感隔离",ul:"理性看待感情，不被情绪左右，有清晰的底线和标准",rl:"对伴侣过于挑剔苛刻，用冷漠推开别人保护自己",uw:"专业能力强，独立解决问题，洞察力帮助做出正确判断",rw:"过于苛刻难以合作，冷漠的态度影响团队关系"},
{n:14,name:"宝剑国王 King of Swords",suit:"宝剑",el:"风",em:"⚔️",u:"理性权威、公正严明、逻辑清晰、决断果敢",r:"冷酷无情、滥用权力、独断偏见、操控他人",ul:"用理性守护感情，公正处理关系问题，值得信赖",rl:"感情中过于冷酷理性，缺乏温度，用道理压人",uw:"卓越的决策者，逻辑清晰公正管理，解决复杂问题",rw:"滥用职权独断专行，冷酷管理不近人情，以权谋私"},

{n:1,name:"星币王牌 Ace of Pentacles",suit:"星币",el:"土",em:"💰",u:"新的财运、物质机遇、务实开端、丰盛潜力",r:"错失良机、财务损失、计划落空、贪心不足",ul:"稳定踏实的新感情，物质基础良好，关系有安全感",rl:"因物质问题影响感情，过于看重金钱忽视情感",uw:"新的赚钱机会，项目有盈利前景，事业开局好",rw:"投资失利错过机会，项目资金不足，规划不切实际"},
{n:2,name:"星币二 Two of Pentacles",suit:"星币",el:"土",em:"💰",u:"灵活平衡、多任务处理、适应变化、资源调配",r:"失去平衡、顾此失彼、财务混乱、压力过大",ul:"在感情和其他事务间灵活平衡，适应关系中的变化",rl:"工作太忙顾不上感情，生活失衡影响关系",uw:"同时处理多个任务游刃有余，灵活应对变化",rw:"事情太多顾此失彼，财务管理混乱，压力山大"},
{n:3,name:"星币三 Three of Pentacles",suit:"星币",el:"土",em:"💰",u:"团队协作、专业技能、精益求精、获得认可",r:"合作不畅、技能不足、敷衍了事、不被认可",ul:"共同经营关系，彼此配合默契，一起建设未来",rl:"感情中缺乏配合，各做各的没有共同目标",uw:"团队协作出色，专业能力被认可，精品项目",rw:"团队配合差效率低，工作质量不达标，缺乏专业性"},
{n:4,name:"星币四 Four of Pentacles",suit:"星币",el:"土",em:"💰",u:"守财节俭、安全感、控制资源、保守稳定",r:"过度吝啬、放手释放、贪婪执着、财务不安",ul:"感情中追求安全稳定，牢牢守住已有的关系",rl:"控制欲太强让对方窒息，或终于学会放手",uw:"财务管理稳健，保守策略守住成果",rw:"过于保守错失发展机会，抠门影响业务拓展"},

// ============ SPREADS ============
const SPREADS = {
  single: {name:"单牌占卜",count:1,positions:["启示"]},
  three: {name:"时间之流",count:3,positions:["过去","现在","未来"]},
  relationship: {name:"关系十字",count:5,positions:["你的状态","对方状态","关系挑战","建议行动","未来走向"]},
  celtic: {name:"凯尔特十字",count:10,positions:["现状","挑战","潜意识","过去","可能性","近未来","自我态度","外界影响","希望与恐惧","最终结果"]}
};

const TIPS = [
  "塔罗牌共78张：22张大阿卡纳代表人生重大课题，56张小阿卡纳反映日常事件。",
  "四元素对应：火(权杖)-行动热情、水(圣杯)-情感直觉、风(宝剑)-思维沟通、土(星币)-物质稳定。",

  "灵数1-10对应事件发展阶段：1开始→5动荡→10完成新生。",

  "同一问题建议2周到1个月后再复占，以第一次专注状态下的结果为准。",
  "宫廷牌（国王、皇后、骑士、侍从）通常代表人物性格或角色互动。",
  "22张大牌是从愚人的出发到世界牌的圆满觉醒，串联起灵魂课题。",

];

// ============ STATE ============
let currentSpread = null;
let currentTopic = "general";
let drawnCards = [];
let flippedCount = 0;

// ============ NAVIGATION ============
function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  window.scrollTo(0, 0);
}

// ============ SPREAD SELECTION ============
function selectSpread(key) {
  currentSpread = SPREADS[key];
  showScreen("question-input");
}

function selectTopic(topic, el) {
  currentTopic = topic;
  document.querySelectorAll("#topicTabs .tab").forEach(t => t.classList.remove("active"));
  el.classList.add("active");
}

// ============ MEDITATION ============
function startMeditation() {
  showScreen("meditation");
  const texts = ["请闭上眼睛，深呼吸三次...", "让心静下来，专注于你的问题...", "放下杂念，感受内心的声音...","当你准备好了，点击下方按钮。"];
  const el = document.getElementById("meditationText");
  const btn = document.getElementById("meditationBtn");
  el.textContent = "";
  btn.style.display = "none";
  let i = 0;
  function next() {
    if (i < texts.length) {
      el.textContent = texts[i];
      i++;
      setTimeout(next, 1500);
    } else {
      btn.style.display = "block";
    }
  }
  next();
}

// ============ SHUFFLE & DRAW ============
function startShuffle() {
  const overlay = document.getElementById("shuffleOverlay");
  overlay.classList.add("active");
  setTimeout(() => {
    overlay.classList.remove("active");
    drawCards();
  }, 2000);
}

function drawCards() {
  const shuffled = [...DECK].sort(() => Math.random() - 0.5);
  drawnCards = [];
  flippedCount = 0;
  for (let i = 0; i < currentSpread.count; i++) {
    drawnCards.push({
      card: shuffled[i],
      reversed: Math.random() < 0.5,
      position: currentSpread.positions[i]
    });
  }
  renderReading();
  showScreen("reading");
}

// ============ RENDER READING ============
function renderReading() {
  const q = document.getElementById("questionField").value.trim();
  document.getElementById("readingTitle").textContent = currentSpread.name;
  document.getElementById("readingQuestion").textContent = q ? "问题：" + q : "";
  
  const container = document.getElementById("readingCards");
  container.innerHTML = "";
  drawnCards.forEach((d, i) => {
    const div = document.createElement("div");
    div.className = "tarot-card" + (d.reversed ? " reversed" : "");
    div.setAttribute("data-suit", d.card.suit);
    div.innerHTML = `
      <div class="tarot-card-inner">
        <div class="tarot-card-back"></div>
        <div class="tarot-card-front">
          <div style="font-size:10px;color:var(--text2);letter-spacing:1px">${d.position}</div>
          <div class="emoji">${d.card.em}</div>
          <div class="name">${d.card.name.split(" ")[0]}</div>
          <div class="orient">${d.reversed ? "逆位 ↓" : "正位 ↑"}</div>
        </div>
      </div>`;
    div.onclick = () => flipCard(div, i);
    container.appendChild(div);
  });
  
  document.getElementById("readingResults").innerHTML = "";
  document.getElementById("readingAdvice").innerHTML = "";
}

function flipCard(el, index) {
  if (el.classList.contains("flipped")) return;
  el.classList.add("flipped");
  flippedCount++;
  
  const d = drawnCards[index];
  const c = d.card;
  const rev = d.reversed;
  const t = currentTopic;
  
  let keywords = rev ? c.r : c.u;
  let detail;
  if (t === "love") detail = rev ? c.rl : c.ul;
  else if (t === "work") detail = rev ? c.rw : c.uw;
  else detail = rev ? c.r : c.u;

  const html = `
    <div class="result-card">
      <div class="position-label">[ ${d.position} ]</div>
      <h3>${c.em} ${c.name} ${rev ? "(逆位)" : "(正位)"}</h3>
      <div style="font-size:12px;color:var(--text2)">元素：${c.el} | 牌组：${c.suit}</div>
      <div class="keywords">关键词：${keywords}</div>
      <div class="detail">${detail}</div>
    </div>`;
  document.getElementById("readingResults").innerHTML += html;
  
  if (flippedCount === drawnCards.length) {
    showAdvice();
  }
}

function showAdvice() {
  const q = document.getElementById("questionField").value.trim();
  const t = currentTopic;
  const revCount = drawnCards.filter(d => d.reversed).length;
  const total = drawnCards.length;

  // 1. 能量判断
  let energy;
  if (revCount === 0) energy = "所有牌都是正位，整体能量非常积极正向";
  else if (revCount === total) energy = "全部逆位，牌面强烈提示你需要暂停、反思并调整当前方向";
  else if (revCount > total/2) energy = "逆位偏多，有些方面需要特别留意和调整";
  else energy = "正逆位交织，事情正在发展变化中";

  // 2. 元素分析
  const els = {};
  drawnCards.forEach(d => { els[d.card.el] = (els[d.card.el]||0) + 1; });
  const sorted = Object.keys(els).sort((a,b) => els[b]-els[a]);
  const dominant = sorted[0];
  const elDetail = {
    "火": "火元素主导，说明行动力、热情和勇气是核心——需要大胆去做，而非犹豫观望",
    "水": "水元素主导，说明情感、直觉和内心感受是关键——倾听内心比理性分析更重要",
    "风": "风元素主导，说明沟通、思考和信息是重点——理清思路、好好沟通是破局之道",
    "土": "土元素主导，说明现实条件、物质基础和稳定性是核心——脚踏实地比空想更有用"
  };
  const elHint = elDetail[dominant] || "大阿卡纳占主导，这个问题涉及你人生中重要的课题和转折";

  // 3. 根据牌阵位置做具体解读
  let storyLines = [];
  drawnCards.forEach(d => {
    const c = d.card;
    const rev = d.reversed;
    const pos = d.position;
    let meaning;
    if (t === "love") meaning = rev ? c.rl : c.ul;
    else if (t === "work") meaning = rev ? c.rw : c.uw;
    else meaning = rev ? c.r : c.u;
    // 取第一句话作为概要
    const shortMeaning = meaning.split("，")[0];
    storyLines.push(`「${pos}」位的${c.name.split(" ")[0]}${rev?"(逆位)":""}提示：${shortMeaning}`);
  });

  // 4. 针对问题的具体建议
  let questionAdvice = "";
  if (q) {
    // 分析问题中的关键词给出针对性建议
    const qLow = q;
    // 最后一张牌（结果牌）的关键信息
    const lastCard = drawnCards[drawnCards.length - 1];
    const lastRev = lastCard.reversed;
    const lc = lastCard.card;
    let lastMeaning;
    if (t === "love") lastMeaning = lastRev ? lc.rl : lc.ul;
    else if (t === "work") lastMeaning = lastRev ? lc.rw : lc.uw;
    else lastMeaning = lastRev ? lc.r : lc.u;

    questionAdvice = `关于「${q}」，最终位置的${lc.name.split(" ")[0]}${lastRev?"(逆位)":"(正位)"}给出的指引是：${lastMeaning}。`;

    // 如果有挑战牌（位置包含"挑战"）
    const challenge = drawnCards.find(d => d.position.includes("挑战"));
    if (challenge) {
      const cc = challenge.card;
      const cr = challenge.reversed;
      let cm;
      if (t === "love") cm = cr ? cc.rl : cc.ul;
      else if (t === "work") cm = cr ? cc.rw : cc.uw;
      else cm = cr ? cc.r : cc.u;
      questionAdvice += `\n需要注意的挑战是：${cm}。`;
    }

    // 如果有建议牌
    const suggest = drawnCards.find(d => d.position.includes("建议"));
    if (suggest) {
      const sc = suggest.card;
      const sr = suggest.reversed;
      let sm;
      if (t === "love") sm = sr ? sc.rl : sc.ul;
      else if (t === "work") sm = sr ? sc.rw : sc.uw;
      else sm = sr ? sc.r : sc.u;
      questionAdvice += `\n牌面给出的建议方向：${sm}。`;
    }
  }

  // 5. 组合输出
  let html = `<div class="advice-box">
    <h3 style="color:var(--gold);margin-bottom:14px">✨ 综合解读</h3>`;

  // 问题针对性解读
  if (questionAdvice) {
    html += `<p style="text-align:left;margin-bottom:12px">${questionAdvice.replace(/\n/g,"<br>")}</p>
    <hr style="border:none;border-top:1px solid rgba(212,168,67,0.2);margin:12px 0">`;
  }

  // 牌面故事线
  html += `<p style="text-align:left;font-size:13px;margin-bottom:12px">`;
  storyLines.forEach(s => { html += s + "<br>"; });
  html += `</p>
    <hr style="border:none;border-top:1px solid rgba(212,168,67,0.2);margin:12px 0">`;

  // 能量和元素
  html += `<p>${energy}。${elHint}。</p>`;

  html += `<p style="margin-top:14px;font-style:italic;font-size:13px;color:var(--text2)">
      塔罗从不给标准答案，而是帮你理清思绪，<br>让你在迷茫中找到属于自己的方向。
    </p>
  </div>`;

  document.getElementById("readingAdvice").innerHTML = html;
}

// ============ BROWSE ============
function filterCards(suit, el) {
  if (el) {
    document.querySelectorAll("#browseTabs .tab").forEach(t => t.classList.remove("active"));
    el.classList.add("active");
  }
  const grid = document.getElementById("cardsGrid");
  const cards = suit === "全部" ? DECK : DECK.filter(c => c.suit === suit);
  grid.innerHTML = cards.map(c => `
    <div class="card-item" onclick="showCardDetail(${DECK.indexOf(c)})">
      <div class="emoji">${c.em}</div>
      <div class="name">${c.name.split(" ")[0]}</div>
      <div style="font-size:11px;color:var(--text2)">${c.el}元素</div>
    </div>`).join("");
}

function showCardDetail(idx) {
  const c = DECK[idx];
  document.getElementById("modalContent").innerHTML = `
    <div class="emoji">${c.em}</div>
    <h2>${c.name}</h2>
    <div style="text-align:center;color:var(--text2);font-size:13px;margin-bottom:16px">
      ${c.suit} | ${c.el}元素 | #${c.n}
    </div>
    <div class="modal-section"><h4>正位关键词</h4><p>${c.u}</p></div>
    <div class="modal-section"><h4>逆位关键词</h4><p>${c.r}</p></div>
    <div class="modal-section"><h4>💕 感情 · 正位</h4><p>${c.ul}</p></div>
    <div class="modal-section"><h4>💕 感情 · 逆位</h4><p>${c.rl}</p></div>
    <div class="modal-section"><h4>💼 事业 · 正位</h4><p>${c.uw}</p></div>
    <div class="modal-section"><h4>💼 事业 · 逆位</h4><p>${c.rw}</p></div>`;
  document.getElementById("cardModal").classList.add("active");
}

function closeModal() {
  document.getElementById("cardModal").classList.remove("active");
}

function showTips() {
  showScreen("tips");
  const shuffled = [...TIPS].sort(() => Math.random() - 0.5).slice(0, 3);
  document.getElementById("tipsContent").innerHTML = shuffled.map((t,i) =>
    `<div class="tip-box">${i+1}. ${t}</div>`
  ).join("");
}
